<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>村庄模拟 - 塔防</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#101713; display:flex; justify-content:center; align-items:center;
  width:100vw; height:100vh; margin:0; padding:4px;
  font-family:'Microsoft YaHei',sans-serif; user-select:none; overflow:hidden;
}
#game-container { position:relative; display:grid; grid-template-columns:168px minmax(400px,1fr) 188px; gap:10px; width:100%; height:100%; }
canvas { border:2px solid #39483e; border-radius:4px; cursor:crosshair; flex:1; min-width:0; min-height:0; box-shadow:0 0 0 1px #0b0f0d; }

#topbar {
  position:absolute; top:8px; left:calc(50% - 10px); transform:translateX(-50%);
  display:flex; gap:15px; z-index:10;
  background:rgba(15,20,17,0.94); padding:7px 16px; border-radius:6px; color:#f1f0e8; font-size:13px;
  border:1px solid rgba(181,163,111,0.42); box-shadow:0 3px 14px rgba(0,0,0,0.35);
  pointer-events:none;
}
.top-res { display:flex; align-items:center; gap:5px; min-width:40px; }
.top-res .icon { width:12px; height:12px; display:inline-block; position:relative; flex:none; }
.top-res .val { font-weight:bold; color:#ffd700; }
.top-res.full .val { color:#f07162; text-shadow:0 0 5px rgba(240,113,98,0.42); }
.top-res.full .resource-mark { filter:sepia(1) saturate(6) hue-rotate(320deg); }
.resource-mark { width:14px; height:14px; display:inline-block; position:relative; flex:none; vertical-align:-2px; }
.resource-mark.food { width:11px; height:11px; top:2px; background:#d9574d; border:1px solid #f39a86; border-radius:48% 48% 52% 52%; }
.resource-mark.food::before { content:''; position:absolute; width:2px; height:4px; left:4px; top:-4px; background:#805338; border-radius:2px; transform:rotate(-12deg); }
.resource-mark.food::after { content:''; position:absolute; width:5px; height:3px; left:6px; top:-3px; background:#6eaa5d; border-radius:5px 1px 5px 1px; transform:rotate(-24deg); }
.resource-mark.wood { width:14px; height:8px; top:3px; background:#a8643b; border:1px solid #d79c67; border-radius:4px; }
.resource-mark.wood::before { content:''; position:absolute; width:5px; height:5px; right:-3px; top:0; background:#dfad73; border:1px solid #80502f; border-radius:50%; }
.resource-mark.wood::after { content:''; position:absolute; width:2px; height:2px; right:-1px; top:2px; background:#b47747; border-radius:50%; }
.resource-mark.stone { width:14px; height:13px; background:#99a39e; border:1px solid #d0d7d0; clip-path:polygon(50% 0,92% 28%,82% 86%,27% 100%,0 56%,16% 17%); box-shadow:inset 2px 2px rgba(255,255,255,0.4); }
.resource-mark.iron { width:14px; height:13px; background:#75564c; border:1px solid #d78d62; clip-path:polygon(52% 0,100% 33%,79% 100%,20% 92%,0 43%); }
.resource-mark.iron::after { content:''; position:absolute; width:4px; height:4px; left:4px; top:4px; background:#e8b178; border-radius:50%; box-shadow:4px -2px 0 -1px #c87852; }
.resource-mark.ingot { width:15px; height:10px; top:2px; background:#779caf; border:1px solid #d4edf5; clip-path:polygon(18% 0,86% 0,100% 100%,0 100%); box-shadow:inset 0 2px rgba(255,255,255,0.45); }
.resource-cost { display:inline-flex; align-items:center; gap:3px; white-space:nowrap; color:#d9ddd1; }
.resource-cost + .resource-cost { margin-left:6px; }
.resource-cost .resource-mark { transform:scale(0.88); transform-origin:center; }
.resource-mark.population { border:2px solid #c7d0c7; border-radius:50%; width:11px; height:11px; }
.resource-mark.population::after { content:''; position:absolute; width:12px; height:5px; left:-3px; bottom:-5px; border:2px solid #c7d0c7; border-bottom:0; border-radius:8px 8px 0 0; }
.resource-mark.guard { border:2px solid #d38a59; transform:rotate(45deg) scale(0.72); }
.resource-mark.day { border:2px solid #e0c36e; border-radius:50%; }
.resource-mark.day::after { content:''; position:absolute; width:4px; height:4px; background:#e0c36e; border-radius:50%; left:2px; top:2px; }
.resource-mark.day.night { border-color:#8da5b7; }
.resource-mark.day.night::after { background:#8da5b7; border-radius:1px; width:4px; height:4px; left:2px; top:2px; }
.resource-mark.day.dusk { border-color:#d89162; }
.resource-mark.day.dusk::after { background:#d89162; }
.resource-mark.day.dawn { border-color:#d9bd6c; }
.resource-mark.day.dawn::after { background:#d9bd6c; }

#building-panel {
  width:auto; min-width:0; background:#171d1a; border:1px solid #354138; border-radius:6px; padding:10px;
  display:flex; flex-direction:column; gap:4px; color:#fff; font-size:12px;
  overflow-y:auto; overflow-x:hidden;
}
.time-controls { display:flex; align-items:center; gap:3px; padding-left:5px; border-left:1px solid #596158; pointer-events:auto; }
.time-control { min-width:30px; height:23px; padding:0 6px; border:1px solid #566158; background:#28342d; color:#dbe4d5; cursor:pointer; font:inherit; font-size:11px; }
.time-control:hover { color:#fff0a5; border-color:#a7975d; }
.time-control.active { background:#59613b; color:#fff4bd; border-color:#a7975d; }
.time-control.icon-control { min-width:23px; padding:0; font-size:13px; font-weight:bold; }
.time-control.settings-control { font-size:22px; line-height:18px; padding:0 4px; }
#building-panel h3 { text-align:left; font-size:13px; margin:0 2px 6px; color:#e1c878; letter-spacing:1px; }
.panel-title { display:flex; align-items:center; gap:7px; font-size:13px; color:#e1c878; letter-spacing:1px; padding:2px 2px 7px; border-bottom:1px solid #344239; }
.panel-title::before { content:''; width:4px; height:15px; background:#c3a65e; border-radius:1px; }
.panel-section { padding:7px 0 5px; border-bottom:1px solid #2c3830; }
.section-label { color:#87968a; font-size:10px; letter-spacing:1px; margin-bottom:5px; }
.bld-btn { display:flex; align-items:center; gap:7px; width:100%; min-height:38px; }
.bld-btn .bld-copy { min-width:0; line-height:1.25; }
.bld-mark { width:22px; height:22px; display:grid; place-items:center; flex:none; border:1px solid #8c9a8e; color:#e5e7df; font:700 11px/1 'Microsoft YaHei',sans-serif; letter-spacing:0; background:#2d3931; border-radius:3px; }
.bld-mark.production { border-color:#a9ae67; color:#e0d783; }
.bld-mark.storage { border-color:#a6815e; color:#e1bf91; }
.bld-mark.defense { border-color:#b97c5d; color:#e8a87a; }
.bld-mark.facility { border-color:#b9a768; color:#e6d18b; }
.bld-btn {
  background:#222b26; border:1px solid #3c4941; color:#e5e7df;
  padding:8px 6px; border-radius:4px; cursor:pointer;
  font-size:11px; font-family:inherit; text-align:left; transition:all 0.15s;
}
.bld-btn:hover { background:#303c35; border-color:#718176; }
.bld-btn.selected { background:#3e432a; border-color:#e1c878; }
.bld-btn .cost { font-size:10px; color:#aaa; }
.bld-btn.locked { filter:grayscale(1); opacity:0.5; cursor:not-allowed; }
.bld-btn.locked:hover { background:#222b26; border-color:#3c4941; }
.bld-btn .unlock-condition { font-size:10px; color:#d5a85c; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

#context-menu {
  position:fixed; display:none; flex-direction:column; gap:2px;
  background:rgba(18,24,20,0.97); padding:5px; border-radius:6px;
  border:1px solid #536158; z-index:20; min-width:140px; box-shadow:0 8px 24px rgba(0,0,0,0.42);
}
#context-menu button {
  background:#26312b; border:1px solid #46544c; color:#e8e9e3;
  padding:6px 10px; border-radius:3px; cursor:pointer;
  font-size:12px; font-family:inherit; text-align:left;
}
#context-menu button:hover { background:#35443b; }
#context-menu .info-line {
  color:#aaa; font-size:11px; padding:4px 8px;
  text-align:center; border-bottom:1px solid #333; margin-bottom:2px;
}

#time-indicator {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  font-size:48px; font-weight:bold; color:#fff;
  text-shadow:0 0 20px rgba(255,200,0,0.6);
  pointer-events:none; z-index:5; opacity:0; transition:opacity 0.5s;
}
#resource-full-notice {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  color:#f07162; font-size:28px; font-weight:bold; letter-spacing:0;
  text-shadow:0 2px 10px rgba(92,18,14,0.88); pointer-events:none; z-index:6; opacity:0;
}
#resource-full-notice.show { animation:resource-full-float 1.65s ease-out forwards; }
@keyframes resource-full-float {
  0% { opacity:0; transform:translate(-50%,-38%); }
  14% { opacity:1; }
  100% { opacity:0; transform:translate(-50%,-145%); }
}
#debug-panel {
  width:auto; background:#171d1a; border:1px solid #354138; border-radius:6px; padding:10px;
  color:#fff; font-size:11px; display:flex; flex-direction:column; gap:2px;
  position:relative; z-index:1; flex-shrink:0;
}
.debug-actions { display:grid; grid-template-columns:1fr 1fr; gap:4px; }
.debug-actions .full { grid-column:1 / -1; }
.debug-stepper { grid-column:1 / -1; display:grid; grid-template-columns:32px 1fr 32px; gap:4px; align-items:center; }
.debug-stepper span { color:#cbd5c7; text-align:center; font-size:11px; }
.control-label { color:#87968a; font-size:10px; letter-spacing:1px; padding:3px 0 2px; }
.dbg-btn { min-height:27px; }
.dbg-btn {
  background:#28342d; border:1px solid #46544c; color:#e1e3dc;
  padding:3px 6px; border-radius:3px; cursor:pointer;
  font-size:11px; font-family:inherit;
}
.dbg-btn:hover { background:#3b4a41; }
.dbg-btn.active { background:#3f5948; border-color:#9bc68c; color:#efffcf; box-shadow:inset 3px 0 #b7e894; }
.dbg-row { display:flex; align-items:center; gap:3px; }
.dbg-row input {
  width:50px; background:#222; border:1px solid #555; color:#fff;
  padding:2px 4px; border-radius:3px; font-size:11px; font-family:inherit;
}
.tool-bar { position:absolute; right:198px; bottom:10px; display:flex; gap:7px; z-index:10; align-items:center; background:rgba(15,22,18,0.92); border:1px solid #435248; padding:5px 7px; border-radius:5px; color:#edf0e5; font-size:11px; box-shadow:0 4px 18px rgba(0,0,0,0.3); }
.tool-btn { border:0; border-left:1px solid #48564b; padding:1px 7px; background:none; color:#d7dfd3; cursor:pointer; font:inherit; }
.tool-btn:first-child { border-left:0; }
.tool-btn:hover { color:#e5c66c; }
.tool-btn.active { color:#e5c66c; background:#35402e; }
.engineer-bar { position:absolute; right:198px; bottom:53px; display:flex; gap:7px; z-index:10; align-items:center; background:rgba(15,22,18,0.92); border:1px solid #435248; padding:5px 8px; border-radius:5px; color:#edf0e5; font-size:11px; box-shadow:0 4px 18px rgba(0,0,0,0.3); }
.bar-action { color:#d6c477; cursor:pointer; font-weight:bold; padding:0 4px; }
.bar-action:hover { color:#fff0a5; }
.overlay-panel { background:#171d1a !important; border:1px solid #536158 !important; border-radius:6px !important; box-shadow:0 12px 36px rgba(0,0,0,0.5); }
#config-overlay select,#config-overlay input { background:#222b26 !important; border-color:#46544c !important; color:#edf0e5 !important; }
#config-overlay button { border-radius:4px !important; }
@media (max-width:900px) { #game-container { grid-template-columns:140px minmax(320px,1fr) 154px; gap:6px; } #debug-panel,#building-panel { padding:7px; } .bld-btn { min-height:32px; padding:5px 4px; } #topbar { gap:8px; left:calc(50% - 6px); } .tool-bar,.engineer-bar { right:164px; } }
</style>
</head>
<body>

<div id="game-container">
  <div id="debug-panel">
    <div class="panel-title">开发控制</div>
    <div class="panel-section"><button class="dbg-btn full" style="min-height:34px;background:#3b5b49;color:#fff0a5;border-color:#7e9a68;" onclick="openConfigPanel()">编辑配置</button></div>
    <div class="panel-section"><div class="section-label">调试倍率</div><div class="debug-actions">
      <button class="dbg-btn" data-speed="10" onclick="setSpeed(10)">10 倍</button><button class="dbg-btn" data-speed="20" onclick="setSpeed(20)">20 倍</button>
    </div></div>
    <div class="panel-section"><div class="section-label">快速操作</div><div class="debug-actions">
      <button class="dbg-btn full" onclick="setAllRes()">无限资源</button>
      <div class="debug-stepper"><button class="dbg-btn" onclick="addPop(-1)" aria-label="减少居民" title="减少居民">-</button><span>居民</span><button class="dbg-btn" onclick="addPop(1)" aria-label="增加居民" title="增加居民">+</button></div>
      <div class="debug-stepper"><button class="dbg-btn" onclick="addDebugGuard(-1)" aria-label="减少守卫" title="减少守卫">-</button><span>守卫</span><button class="dbg-btn" onclick="addDebugGuard(1)" aria-label="增加守卫" title="增加守卫">+</button></div>
      <button class="dbg-btn" onclick="skipToDay()">跳至白天</button><button class="dbg-btn" onclick="skipToNight()">跳至夜晚</button>
      <button class="dbg-btn" onclick="unlockAll()">全部解锁</button><button class="dbg-btn" onclick="upgradeTH()">升级大本营</button>
      <button class="dbg-btn full" onclick="debugRevealAllFog()">去除迷雾</button>
      <button id="debug-navigation-btn" class="dbg-btn full active" onclick="toggleDebugNavigation()">隐藏寻路</button>
      <button class="dbg-btn full" onclick="restartGame()">重新开始</button>
    </div></div>
    <div class="panel-section"><div class="section-label">资源注入</div>
      <div class="dbg-row"><span class="resource-mark food"></span><input id="dbg-food" type="number" value="50" size="4"><button class="dbg-btn" onclick="setRes('food')">设定</button></div>
      <div class="dbg-row"><span class="resource-mark wood"></span><input id="dbg-wood" type="number" value="40" size="4"><button class="dbg-btn" onclick="setRes('wood')">设定</button></div>
      <div class="dbg-row"><span class="resource-mark stone"></span><input id="dbg-stone" type="number" value="20" size="4"><button class="dbg-btn" onclick="setRes('stone')">设定</button></div>
      <div class="dbg-row"><span class="resource-mark iron"></span><input id="dbg-iron" type="number" value="0" size="4"><button class="dbg-btn" onclick="setRes('iron')">设定</button></div>
    </div>
  </div>
  <canvas id="game"></canvas>
  <div id="building-panel">
    <div class="panel-title">建筑目录</div>
    <div class="panel-section"><div class="section-label">基础设施</div>
      <button class="bld-btn" data-type="floor"><span class="bld-copy">地板<div class="cost">1 木</div></span></button>
      <button class="bld-btn" data-type="house"><span class="bld-copy">住房<div class="cost">10 木 5 石</div></span></button>
      <button class="bld-btn" data-type="nursery"><span class="bld-mark facility">产</span><span class="bld-copy">产房<div class="cost">10 木</div></span></button>
      <button class="bld-btn" data-type="barracks"><span class="bld-mark facility">兵</span><span class="bld-copy">兵营<div class="cost">10 木 5 石</div></span></button>
      <button class="bld-btn" data-type="training_ground"><span class="bld-mark facility">练</span><span class="bld-copy">练兵房<div class="cost">15 木 10 石</div></span></button>
      <button class="bld-btn" data-type="lamp"><span class="bld-mark facility">灯</span><span class="bld-copy">灯<div class="cost">5 木</div></span></button>
    </div><div class="panel-section"><div class="section-label">生产设施</div>
      <button class="bld-btn" data-type="farm"><span class="bld-mark production">农</span><span class="bld-copy">农场<div class="cost">5 木</div></span></button>
      <button class="bld-btn" data-type="forester"><span class="bld-mark production">林</span><span class="bld-copy">护林员小屋<div class="cost">15 木 10 石</div></span></button>
      <button class="bld-btn" data-type="quarry"><span class="bld-mark production">石</span><span class="bld-copy">采石场<div class="cost">10 木 5 石</div></span></button>
      <button class="bld-btn" data-type="iron_mine"><span class="bld-mark production">矿</span><span class="bld-copy">铁矿<div class="cost">15 木 10 石</div></span></button>
      <button class="bld-btn" data-type="smelter"><span class="bld-mark production">炉</span><span class="bld-copy">炼铁机<div class="cost">20 木 15 石</div></span></button>
    </div><div class="panel-section"><div class="section-label">仓储设施</div>
      <button class="bld-btn" data-type="wood_storage"><span class="bld-mark storage">木</span><span class="bld-copy">木材仓库<div class="cost">10 木 5 石</div></span></button>
      <button class="bld-btn" data-type="food_storage"><span class="bld-mark storage">食</span><span class="bld-copy">食物仓库<div class="cost">10 木 5 石</div></span></button>
      <button class="bld-btn" data-type="stone_storage"><span class="bld-mark storage">石</span><span class="bld-copy">石材仓库<div class="cost">10 木 5 石</div></span></button>
      <button class="bld-btn" data-type="iron_storage"><span class="bld-mark storage">铁</span><span class="bld-copy">铁矿仓库<div class="cost">10 木 10 石</div></span></button>
      <button class="bld-btn" data-type="ingot_storage"><span class="bld-mark storage">锭</span><span class="bld-copy">铁锭仓库<div class="cost">10 木 10 石</div></span></button>
    </div><div class="panel-section"><div class="section-label">防御设施</div>
      <button class="bld-btn" data-type="arrow_tower"><span class="bld-mark defense">塔</span><span class="bld-copy">箭塔<div class="cost">20 木 10 石</div></span></button>
      <button class="bld-btn" data-type="auto_arrow_tower"><span class="bld-mark defense">自</span><span class="bld-copy">自动箭塔<div class="cost">30 木 20 石</div></span></button>
      <button class="bld-btn" data-type="wall"><span class="bld-mark defense">墙</span><span class="bld-copy">城墙<div class="cost">5 石</div></span></button>
    </div>
  </div>

  <div id="topbar">
    <div class="top-res" id="top-res-food"><span class="resource-mark food"></span><span class="val" id="r-food">50</span></div>
    <div class="top-res" id="top-res-wood"><span class="resource-mark wood"></span><span class="val" id="r-wood">40</span></div>
    <div class="top-res" id="top-res-stone"><span class="resource-mark stone"></span><span class="val" id="r-stone">20</span></div>
    <div class="top-res" id="top-res-iron"><span class="resource-mark iron"></span><span class="val" id="r-iron">0</span></div>
    <div class="top-res" id="top-res-ingot"><span class="resource-mark ingot"></span><span class="val" id="r-ingot">0</span></div>
    <div style="color:#aaa;">|</div>
    <div class="top-res"><span class="resource-mark population"></span><span class="val" id="r-pop">4/4</span></div>
    <div class="top-res"><span class="resource-mark guard"></span><span class="val" id="r-guard-top">0</span></div>
    <div style="color:#aaa;">|</div>
    <div class="top-res"><span class="resource-mark day" id="day-icon"></span><span class="val" id="r-time">第 1 天</span></div>
    <div class="time-controls" aria-label="时间控制">
      <button id="time-pause" class="time-control icon-control" data-speed="0" onclick="togglePause()" title="暂停游戏" aria-label="暂停游戏">Ⅱ</button>
      <button class="time-control" data-speed="1" onclick="setSpeed(1)" title="正常速度">1×</button>
      <button class="time-control" data-speed="2" onclick="setSpeed(2)" title="两倍速度">2×</button>
      <button class="time-control" data-speed="4" onclick="setSpeed(4)" title="四倍速度">4×</button>
      <button class="time-control settings-control" onclick="openSettingsPanel()" title="游戏设置" aria-label="游戏设置">⚙</button>
    </div>
  </div>

  <div id="time-indicator"></div>
  <div id="resource-full-notice" aria-live="polite"></div>

  <div id="chop-bar" class="tool-bar"><span class="section-label">林务</span>
    <button id="chop-btn" class="tool-btn" onclick="toggleChopMode()" title="框选砍伐">标记砍伐</button>
    <button id="unchop-btn" class="tool-btn" onclick="toggleUnchopMode()" title="取消砍伐">取消标记</button>
  </div>
  <div id="eng-bar" class="engineer-bar">
    <span class="section-label">施工班组</span><span id="eng-minus" class="bar-action" onclick="unassignEngineer()" title="取消工程师">−</span>
    <span>工程师 <span id="r-eng">0/0</span></span><span id="eng-plus" class="bar-action" onclick="assignEngineer()" title="指派工程师">+</span>
  </div>

</div>

<div id="config-overlay" style="display:none; position:fixed; top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.8); z-index:100; justify-content:center;align-items:center;">
  <div class="overlay-panel" style="background:#1a1a2e; border:2px solid #555; border-radius:12px; padding:20px;
    width:600px; max-height:85vh; overflow-y:auto; color:#fff; font-size:12px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <h2 style="color:#ffd700; margin:0;">配置编辑器</h2>
      <button onclick="closeConfigPanel()" style="background:#a44; color:#fff; border:none; padding:6px 14px;
        border-radius:4px; cursor:pointer; font-size:14px; font-family:inherit;">关闭</button>

const RESOURCE_STORAGE_TYPES={food:'food_storage',wood:'wood_storage',stone:'stone_storage',iron:'iron_storage',ingot:'ingot_storage'};
function resourceIcon(type) { return `<span class="resource-mark ${type}" title="${RESOURCE_NAMES[type]||type}" aria-label="${RESOURCE_NAMES[type]||type}"></span>`; }
function formatResourceCost(cost) {
  return Object.entries(cost||{}).filter(([,amount])=>amount>0).map(([type,amount])=>`<span class="resource-cost" title="${amount} ${RESOURCE_NAMES[type]||type}">${amount}${resourceIcon(type)}</span>`).join('');
}
function cloneResourceMap(value) { return {...(value||{})}; }
function buildingUnlockStatus(def, townHallLevel=1) {
  const unlockLevel=Math.max(1,Math.floor(Number(def?.unlock)||1));
  const treeNeed=Math.max(0,Math.floor(Number(def?.unlockTreesChopped)||0));
  const treesChopped=Math.min(treeNeed,Math.max(0,G.treesChopped||0));
  const levelMet=townHallLevel>=unlockLevel;
  const extraMet=treesChopped>=treeNeed;
  let text='';
  if(!levelMet) text=`需要${unlockLevel}级大本营${treeNeed>0?'与？':''}`;
  else if(!extraMet) text=`砍伐树木 ${treesChopped}/${treeNeed}`;
  return {visible:unlockLevel<=townHallLevel+1,unlocked:levelMet&&extraMet,text};
}
function buildingLevelOverrides(type, level) { return BLD_DEFS[type]?.levels?.[level]||{}; }
function defaultBuildingLevelValue(type, level, key) {
  const def=BLD_DEFS[type];
  if (!def) return undefined;
  const base=def[key];
  if (level<=1) return base;
  if (key==='hp') return Math.floor(def.hp*Math.pow(1.3,level-1));
  if (key==='capacity' && def.capacity) return def.capacity+(level-1)*(def.levelCapacityBonus||0);
  if (key==='damage' && type==='arrow_tower') return def.damage*(1+(level-1)*(def.levelDamageBonus||0));
  if (key==='range' && type==='auto_arrow_tower') return def.range+(level-1)*(def.levelRangeBonus||0);
  if (key==='vision' && type==='lamp') return def.vision+(level-1)*(def.levelVisionBonus||0);
  if (key==='popBonus' && type==='house') return def.popBonus+(level-1)*2;
  if (key==='guardBonus' && type==='barracks') return def.guardBonus+(level-1)*2;
  return base;
}
function buildingLevelValue(type, level, key) {
  const override=buildingLevelOverrides(type,level);
  const value=Object.prototype.hasOwnProperty.call(override,key) ? override[key] : defaultBuildingLevelValue(type,level,key);
  return (value && typeof value==='object' && !Array.isArray(value)) ? cloneResourceMap(value) : value;
}
function buildingRuntimeDef(b) {
  const def=BLD_DEFS[b.type];
  const runtime={...def,...buildingLevelOverrides(b.type,b.level)};
  for (const key of ['hp','maxWorkers','baseTime','capacity','range','damage','cooldown','vision','foresterRadius','sourceRadius','popBonus','guardBonus','recruitTime','buildTime','startResources','storageCaps','batchSize','levelSpeedBonus','levelBufferBonus','levelCapacityBonus','levelDamageBonus','levelRangeBonus','levelVisionBonus','levelDamageReduction','chopTime','saplingGrowTime','growJitter']) runtime[key]=buildingLevelValue(b.type,b.level,key);
  return runtime;
}

function isResourceAvailable(type) {

}

  const resources=cloneResourceMap(buildingLevelValue('town_hall',1,'startResources'));
  for(const type of RESOURCE_TYPES) if (townHallResourceCapacity(type,1)<=0) resources[type]=0;

}
function floorMovementMultiplier() { return Math.max(0,buildingLevelValue('floor',1,'moveSpeedMultiplier')||1); }
function defaultUpgradeCost(type, nextLevel) {
  if (type==='town_hall') return ({2:{wood:20},3:{wood:50},4:{wood:200,stone:50}})[nextLevel]||{wood:500,stone:200};
  return {wood:10*(nextLevel-1),stone:5*(nextLevel-1)};
}

const SETTINGS_VERSION = 3;
const SHORTCUT_ACTIONS = [
  { id:'pause', label:'暂停 / 继续', defaultCode:'Space' },

];
const DEFAULT_SHORTCUTS = Object.fromEntries(SHORTCUT_ACTIONS.map(action => [action.id, action.defaultCode]));
const DEFAULT_CAMERA_DRAG_THRESHOLD = 12;
let gameSettings = { version:SETTINGS_VERSION, shortcuts:{...DEFAULT_SHORTCUTS}, cameraDragThreshold:DEFAULT_CAMERA_DRAG_THRESHOLD };
let pendingShortcutAction = null;

function loadGameSettings() {
  let migrated=false;
  try {
    const saved=JSON.parse(localStorage.getItem(SETTINGS_STORAGE_KEY));
    if (saved && saved.shortcuts && typeof saved.shortcuts==='object') {
      for (const action of SHORTCUT_ACTIONS) {
        if (typeof saved.shortcuts[action.id]==='string') gameSettings.shortcuts[action.id]=saved.shortcuts[action.id];
      }
      if (saved.shortcuts.speedNormal==='Numpad1') { gameSettings.shortcuts.speedNormal='Digit1'; migrated=true; }
      if (saved.shortcuts.speed2==='Numpad2') { gameSettings.shortcuts.speed2='Digit2'; migrated=true; }
      if (saved.shortcuts.speed4==='Numpad3') { gameSettings.shortcuts.speed4='Digit3'; migrated=true; }
    }
    if (saved && Number.isFinite(Number(saved.cameraDragThreshold))) {
      gameSettings.cameraDragThreshold=clamp(Math.round(Number(saved.cameraDragThreshold)),4,32);
    }
  } catch (error) { console.warn('Game settings could not be loaded.', error); }
  if (migrated) saveGameSettings();
}
function saveGameSettings() {
  try { localStorage.setItem(SETTINGS_STORAGE_KEY, JSON.stringify(gameSettings)); }
  catch (error) { console.warn('Game settings could not be saved.', error); }
}
function cameraDragThreshold() { return gameSettings.cameraDragThreshold||DEFAULT_CAMERA_DRAG_THRESHOLD; }
function cameraDragExceeded(dx,dy) { return Math.hypot(dx,dy)>=cameraDragThreshold(); }
function setCameraDragThreshold(value) {
  gameSettings.cameraDragThreshold=clamp(Math.round(Number(value)||DEFAULT_CAMERA_DRAG_THRESHOLD),4,32);
  const input=document.getElementById('settings-camera-drag');
  const label=document.getElementById('settings-camera-drag-value');
  if (input) input.value=String(gameSettings.cameraDragThreshold);
  if (label) label.textContent=gameSettings.cameraDragThreshold+' px';
  saveGameSettings();
}
function shortcutLabel(code) {
  const labels={Space:'空格',Escape:'Esc',Digit1:'1',Digit2:'2',Digit3:'3',KeyC:'C',KeyX:'X'};
  return labels[code] || code.replace(/^Key/, '').replace(/^Digit/, '');
}
loadGameSettings();

// The development server serves the saved overrides. Direct file opening keeps
// using the defaults above, so the game remains portable.
function applyBalanceData(data) {
  if (!data || typeof data !== 'object') return;
  if (data.globals && typeof data.globals === 'object') {
    for (const [key, value] of Object.entries(data.globals)) {
      if (Object.prototype.hasOwnProperty.call(CFG, key) && Number.isFinite(value)) CFG[key] = value;
    }
  }
  if (data.buildings && typeof data.buildings === 'object') {
    for (const [key, values] of Object.entries(data.buildings)) {
      if (!BLD_DEFS[key] || !values || typeof values !== 'object') continue;
      Object.assign(BLD_DEFS[key], values);
      if (values.cost && typeof values.cost === 'object') BLD_DEFS[key].cost = {...values.cost};
      if (Array.isArray(values.sz)) BLD_DEFS[key].sz = [...values.sz];
      if (values.levels && typeof values.levels==='object') BLD_DEFS[key].levels=JSON.parse(JSON.stringify(values.levels));
    }
  }
  if (data.enemies && typeof data.enemies === 'object') {
    for (const [key, values] of Object.entries(data.enemies)) {
      if (!ENEMY_DEFS[key] || !values || typeof values !== 'object') continue;
      Object.assign(ENEMY_DEFS[key], values);
    }
  }
}
function loadSavedBalance() {
  if (typeof location === 'undefined' || location.protocol === 'file:') return;
  try {
    const request = new XMLHttpRequest();
    request.open('GET', '/api/balance', false);
    request.send();
    if (request.status === 200) applyBalanceData(JSON.parse(request.responseText));
  } catch (error) {
    console.warn('Saved balance could not be loaded; using inline defaults.', error);
  }
}

class SpatialHash {
  constructor(cellSize) { this.cellSize = cellSize; this.buckets = new Map(); }
  clear() { this.buckets.clear(); }
  key(col, row) { return col+','+row; }
  insert(item, minX, minY, maxX, maxY) {
    const minCol=Math.floor(minX/this.cellSize), maxCol=Math.floor(maxX/this.cellSize);
    const minRow=Math.floor(minY/this.cellSize), maxRow=Math.floor(maxY/this.cellSize);
    for (let col=minCol; col<=maxCol; col++) for (let row=minRow; row<=maxRow; row++) {
      const key=this.key(col,row);
      if (!this.buckets.has(key)) this.buckets.set(key,[]);
      this.buckets.get(key).push(item);
    }
  }
  query(minX, minY, maxX, maxY) {
    const found=[], seen=new Set();
    const minCol=Math.floor(minX/this.cellSize), maxCol=Math.floor(maxX/this.cellSize);
    const minRow=Math.floor(minY/this.cellSize), maxRow=Math.floor(maxY/this.cellSize);
    for (let col=minCol; col<=maxCol; col++) for (let row=minRow; row<=maxRow; row++) {
      const bucket=this.buckets.get(this.key(col,row));
      if (!bucket) continue;
      for (const item of bucket) if (!seen.has(item)) { seen.add(item); found.push(item); }
    }
    return found;
  }
}

function storedAmount(b, type) { return b.stored[type] || 0; }

  return Math.max(0, storageCapacity(b,type) - storedAmount(b,type));
}
function resourceStorageStatus(type) {

  for(const b of G.buildings) {
    if(!storageAcceptsResource(b,type)||b.hp<=0||b.blueprint||b.constructionTimer>0) continue;
    capacity+=storageCapacity(b,type);

}

}

  if (deposited <= 0) return 0;
  b.stored[type] = storedAmount(b, type) + deposited;
  G.resources[type] = (G.resources[type] || 0) + deposited;
  return deposited;
}
function withdrawFromStorage(b, type, amount) {
  if (!storageAcceptsResource(b,type)) return 0;
  const withdrawn = Math.min(amount, storedAmount(b, type));

  b.stored[type] = storedAmount(b, type) - withdrawn;

}
function withdrawFromAnyStorage(type, amount) {

}

function initFloorMask() {

      if (nc < 0 || nr < 0 || nc >= CFG.WORLD_COLS || nr >= CFG.WORLD_ROWS) continue;

function generateResources() {
  G.resourceNodes = [];
  G.wildTreeTarget=null; G.wildTreeSpawnTimer=0;
  const townCenter=G.townHall ? G.townHall.center() : {x:CFG.WORLD_W/2,y:CFG.WORLD_H/2};
  const treeVisibleRadius=buildingLevelValue('town_hall',1,'vision');
  let visibleTrees=0;

  while (visibleTrees<CFG.START_VISIBLE_TREE_MIN && attempts++<2000) {
    const col=Math.floor(Math.random()*CFG.WORLD_COLS), row=Math.floor(Math.random()*CFG.WORLD_ROWS);

  }
  let treeCount=G.resourceNodes.filter(node=>node.type==='tree').length;
  while (treeCount<CFG.TREE_INITIAL_COUNT && attempts++<12000) {
    const added=spawnInitialResourceCluster('tree',townCenter,CFG.TREE_MIN_SPAWN_RADIUS,Infinity,CFG.TREE_CLUSTER_AVERAGE,CFG.TREE_CLUSTER_MAX,CFG.TREE_INITIAL_COUNT-treeCount);
    treeCount+=added;
  }
  for(let i=0;i<CFG.STONE_CLUSTER_COUNT;i++) {
    spawnInitialResourceCluster('stone',townCenter,CFG.STONE_MIN_SPAWN_RADIUS,Infinity,CFG.STONE_CLUSTER_AVERAGE,CFG.STONE_CLUSTER_MAX);
  }
  for(let i=0;i<CFG.IRON_CLUSTER_COUNT;i++) {

  }
}
function initialResourceDistance(col,row,townCenter) {
  const x=gridX(col)+CFG.CELL/2, y=gridY(row)+CFG.CELL/2;
  return Math.hypot(x-townCenter.x,y-townCenter.y)/CFG.CELL;
}
function tryAddInitialResource(type,col,row,townCenter,minRadius,maxRadius=Infinity) {
  if (col<0||row<0||col>=CFG.WORLD_COLS||row>=CFG.WORLD_ROWS) return false;
  const distance=initialResourceDistance(col,row,townCenter);
  if (distance<=minRadius||distance>maxRadius||isCellBlocked(col,row)) return false;
  const centered=type==='tree';
  G.resourceNodes.push({type,col,row,x:gridX(col)+(centered?CFG.CELL/2:0),y:gridY(row)+(centered?CFG.CELL/2:0),hp:centered?1:undefined,alive:true,marked:false});

}
function randomBetween(min,max) { return min+Math.random()*(max-min); }
function wildTreeCount() {

}
function findWildTreePlantCell() {
  const townCenter=G.townHall ? G.townHall.center() : {x:CFG.WORLD_W/2,y:CFG.WORLD_H/2};
  for(let attempt=0;attempt<160;attempt++) {
    const col=Math.floor(Math.random()*CFG.WORLD_COLS), row=Math.floor(Math.random()*CFG.WORLD_ROWS);
    if(initialResourceDistance(col,row,townCenter)<=CFG.TREE_MIN_SPAWN_RADIUS||isCellBlocked(col,row)) continue;
    return {col,row,x:gridX(col)+CFG.CELL/2,y:gridY(row)+CFG.CELL/2};
  }
  return null;
}
function updateWildTreeRegrowth(dt) {
  const min=Math.max(0,Math.floor(CFG.TREE_WILD_MIN_COUNT));
  const max=Math.max(min,Math.floor(CFG.TREE_WILD_MAX_COUNT));
  const count=wildTreeCount();
  if(G.wildTreeTarget===null&&count<min) {
    G.wildTreeTarget=Math.floor(randomBetween(min,max+1));
    G.wildTreeSpawnTimer=randomBetween(CFG.WILD_TREE_SPAWN_INTERVAL_MIN,CFG.WILD_TREE_SPAWN_INTERVAL_MAX);
  }
  if(G.wildTreeTarget===null||count>=G.wildTreeTarget) {
    if(G.wildTreeTarget!==null&&count>=G.wildTreeTarget) G.wildTreeTarget=null;
    return;
  }
  G.wildTreeSpawnTimer-=dt;
  if(G.wildTreeSpawnTimer>0) return;
  const cell=findWildTreePlantCell();
  if(cell) {
    const growTimer=randomBetween(CFG.WILD_TREE_GROW_TIME_MIN,CFG.WILD_TREE_GROW_TIME_MAX);
    G.resourceNodes.push({type:'sapling',col:cell.col,row:cell.row,x:cell.x,y:cell.y,hp:1,alive:true,marked:false,growTimer,growDuration:growTimer,ownerForester:null});
  }
  G.wildTreeSpawnTimer=randomBetween(CFG.WILD_TREE_SPAWN_INTERVAL_MIN,CFG.WILD_TREE_SPAWN_INTERVAL_MAX);
}
function sampleClusterSize(average,max,rareClusterChance=0) {
  if (average<=1) {
    if (max>1&&Math.random()<rareClusterChance) return 2+Math.floor(Math.random()*(max-1));
    return 1;
  }
  const target=clamp(average,1,max);
  let low=-12, high=12;
  for(let pass=0;pass<24;pass++) {
    const lambda=(low+high)/2;
    let total=0, weighted=0;
    for(let n=1;n<=max;n++) { const weight=Math.exp(-lambda*(n-1)); total+=weight; weighted+=n*weight; }
    if (weighted/total>target) low=lambda; else high=lambda;
  }
  const lambda=(low+high)/2;
  let total=0;
  for(let n=1;n<=max;n++) total+=Math.exp(-lambda*(n-1));
  let roll=Math.random()*total;
  for(let n=1;n<=max;n++) { roll-=Math.exp(-lambda*(n-1)); if(roll<=0) return n; }
  return max;
}
function spawnInitialResourceCluster(type,townCenter,minRadius,maxRadius,average,max,limit=Infinity) {
  const count=Math.min(limit,sampleClusterSize(average,max,type==='iron'?CFG.IRON_RARE_CLUSTER_CHANCE:0));
  const baseCol=Math.floor(Math.random()*CFG.WORLD_COLS), baseRow=Math.floor(Math.random()*CFG.WORLD_ROWS);
  let added=0;
  for(let i=0;i<count;i++) {
    const spread=Math.max(1,Math.ceil(Math.sqrt(count)));
    const col=baseCol+Math.round((Math.random()-0.5)*spread*2);
    const row=baseRow+Math.round((Math.random()-0.5)*spread*2);
    if (tryAddInitialResource(type,col,row,townCenter,minRadius,maxRadius)) added++;

  return added;
}

function resourceObstacle(node) {

function ensureObstacleSpatialHash() {
  if (!G.obstacleSpatial) G.obstacleSpatial = new SpatialHash(CFG.SPATIAL_CELL_SIZE);
  if (G.obstacleIndexRevision === G.navigationRevision) return;
  G.obstacleSpatial.clear();

    const c=b.center(), radius=b.collisionRadius()+RESIDENT_RADIUS+16;

    const radius=obstacle.collisionRadius()+RESIDENT_RADIUS+16;

function segmentHitsBuilding(x1, y1, x2, y2, b, r) {
  if (!b || (b.resourceNode ? !b.resourceNode.alive : !buildingBlocksMovement(b))) return false;
  if (b.resourceNode && !isResourceObstacleNode(b.resourceNode)) return false;
  if (b === r.workplace || b === r.home || b === r.buildTarget) return false;
  const goalDist = Math.hypot(x2 - b.center().x, y2 - b.center().y);
  if (goalDist < b.collisionRadius() + RESIDENT_RADIUS + 4) return false;
  const c = b.center();
  const vx = x2 - x1, vy = y2 - y1;
  const lenSq = vx * vx + vy * vy;
  const t = lenSq > 0 ? clamp(((c.x - x1) * vx + (c.y - y1) * vy) / lenSq, 0, 1) : 0;
  const px = x1 + vx * t, py = y1 + vy * t;
  return Math.hypot(px - c.x, py - c.y) < b.collisionRadius() + RESIDENT_RADIUS + 8;

function firstBlockingObstacle(r, tx, ty) {
  let blocker = null, best = Infinity;

  const obstacles=G.obstacleSpatial.query(Math.min(r.x,tx),Math.min(r.y,ty),Math.max(r.x,tx),Math.max(r.y,ty));
  for (const b of obstacles) {

  ny = clamp(ny, RESIDENT_RADIUS, CFG.WORLD_H - RESIDENT_RADIUS);
  return { x: nx, y: ny };
}
function findNearestStorage(pos, resType, options={}) {
  const { requireAmount=0, requireSpace=0 } = options;
  let best=null, bestD=Infinity;
  for (const b of G.buildings) {
    if (!storageAcceptsResource(b,resType) || b.hp<=0 || b.blueprint || b.constructionTimer>0) continue;
    if (requireAmount > 0 && storedAmount(b, resType) < requireAmount) continue;
    if (requireSpace > 0 && storageFreeSpace(b, resType) < requireSpace) continue;
    const access = b.center();
    const d=Math.hypot(pos.x-access.x, pos.y-access.y);
    if (d<bestD) { bestD=d; best=b; }
  }
  return best;
}

function findResourceNode(b, type) {
  const def = buildingRuntimeDef(b);
  if (!def.sourceType) return null;
  const center = b.center();
  const maxDist = (def.sourceRadius || 0) * CFG.CELL;
  let best = null, bestDist = Infinity;
  for (const node of G.resourceNodes) {
    if (!node.alive || node.type !== type) continue;
    const nodeX = node.x + (type === 'tree' ? 0 : CFG.CELL / 2);
    const nodeY = node.y + (type === 'tree' ? 0 : CFG.CELL / 2);
    const d = Math.hypot(center.x - nodeX, center.y - nodeY);
    if (d <= maxDist && d < bestDist) { best = node; bestDist = d; }
  }
  return best;
}

function canResidentHandHarvest(node) {
  // Trees are the only natural resource residents can harvest directly.
  return !!node && node.alive && node.type === 'tree';
}

function isFinishableResidentTask(r) {
  return r.state==='CHOPPING' || r.state==='HAULING' || r.state==='GATHERING' ||
    r.state==='BUILDING' || r.state==='CONSTRUCTING';
}
function beginEating(r) {
  if ((G.resources.food||0) <= 0) return false;
  const storage=findNearestStorage(r, 'food', {requireAmount:1});
  if (storage) {
    r.state='GOING_TO_EAT';
    const sc=storage.center(); r.targetX=sc.x; r.targetY=sc.y;
  } else {
    r.state='EATING'; r.eatTimer=1.5;
  }
  return true;
}
function eatAfterFinishingTask(r) {
  if (!r.finishBeforeEating || !r.mealPending) return false;
  r.finishBeforeEating=false;
  return beginEating(r);
}

function findForesterTree(r, forester) {
  if (!forester || forester.type!=='forester' || forester.hp<=0) return null;
  const carryCapacity=productionBufferCapacity(forester);
  const carried=r.carrying?.amount||0;
  if (!findNearestStorage(r,'wood',{requireSpace:Math.max(1,carryCapacity-carried)})) return null;
  const radius = (buildingRuntimeDef(forester).foresterRadius || 4) * CFG.CELL;
  const center = forester.center();
  let best=null, bestDist=Infinity;
  for (const node of G.resourceNodes) {
    if (!node.alive || node.type!=='tree' || !node.marked || node.ownerForester!==forester) continue;
    if (Math.hypot(node.x-center.x,node.y-center.y)>radius) continue;
    if (G.targetedTrees.has(node) && r.chopTarget!==node) continue;
    const d=Math.hypot(r.x-node.x,r.y-node.y);
    if (d<bestDist) { best=node; bestDist=d; }
  }
  return best;
}
function foresterGrowthSlots(b) {
  const def=buildingRuntimeDef(b);
  return Math.max(1, Math.ceil(def.maxWorkers * def.saplingGrowTime / (def.chopTime/productionSpeedMultiplier(b))));
}
function foresterPlantInterval(b) {
  return buildingRuntimeDef(b).saplingGrowTime / foresterGrowthSlots(b);
}
function findForesterPlantCell(b) {
  const def=buildingRuntimeDef(b), radius=(def.foresterRadius||4)*CFG.CELL, center=b.center();
  const candidates=[];
  const minCol=Math.max(0,Math.floor((center.x-radius)/CFG.CELL)), maxCol=Math.min(CFG.WORLD_COLS-1,Math.floor((center.x+radius)/CFG.CELL));
  const minRow=Math.max(0,Math.floor((center.y-radius)/CFG.CELL)), maxRow=Math.min(CFG.WORLD_ROWS-1,Math.floor((center.y+radius)/CFG.CELL));
  for(let col=minCol;col<=maxCol;col++) for(let row=minRow;row<=maxRow;row++) {
    const x=gridX(col)+CFG.CELL/2, y=gridY(row)+CFG.CELL/2;
    if (Math.hypot(x-center.x,y-center.y)>radius-CFG.CELL*0.5 || isCellBlocked(col,row)) continue;
    candidates.push({col,row,x,y});
  }
  return candidates.length ? candidates[Math.floor(Math.random()*candidates.length)] : null;
}
function maxBuildingLevel(type) {
  const th = G.townHall;
  const cap=BLD_DEFS[type]?.maxLevel||1;
  return type==='town_hall' ? cap : Math.min(th ? th.level : 1,cap);
}

function houseCapacity(h) {
  if (h.type==='town_hall') return CFG.MAX_POP_BASE + (h.level-1)*4;
  if (h.type==='house') return buildingLevelValue('house',h.level,'popBonus');
  if (h.type==='barracks') return buildingLevelValue('barracks',h.level,'guardBonus');
  return 0;
}
function guardCapacity(h) {
  if (h.type==='town_hall') return CFG.MAX_GUARD_BASE;
  return h.type==='barracks' ? houseCapacity(h) : 0;
}
function recalculatePopulationLimits() {
  G.maxPop=0; G.maxGuards=0;
  for (const b of G.buildings) {
    if (b.blueprint||b.constructionTimer>0||b.hp<=0) continue;
    if (b.type==='town_hall'||b.type==='house') G.maxPop+=houseCapacity(b);
    if (b.type==='town_hall'||b.type==='barracks') G.maxGuards+=guardCapacity(b);
  }
}
function findNearestHome(pos, isGuard=false, excludeBld=null) {
  let best=null, bestD=Infinity;
  for (const b of G.buildings) {
    const validHome=isGuard ? (b.type==='town_hall'||b.type==='barracks') : (b.type==='town_hall'||b.type==='house');
    if (!validHome || b===excludeBld || b.hp<=0) continue;
    const capacity=isGuard ? guardCapacity(b) : houseCapacity(b);
    const occupied=isGuard ? (b.guardResidentCount||0) : b.residentCount;
    if (occupied >= capacity) continue;
    const cx=b.x+BLD_DEFS[b.type].sz[0]*CFG.CELL/2;
    const cy=b.y+BLD_DEFS[b.type].sz[1]*CFG.CELL/2;
    const d=Math.hypot(pos.x-cx, pos.y-cy);
    if (d<bestD) { bestD=d; best=b; }
  }
  return best;
}

function getFarmAdjacencyBonus(b) {
  return b.type === 'farm' && !b.blueprint ? (b.farmAdjacencyBonus || 1) : 1;
}
function refreshFarmAdjacency() {
  const farms = G.buildings.filter(b => b.type === 'farm' && b.hp > 0 && !b.blueprint && b.constructionTimer <= 0);
  G.farmLinks = [];
  for (const farm of farms) farm.farmAdjacencyBonus = 1;
  for (let i=0; i<farms.length; i++) {
    for (let j=i+1; j<farms.length; j++) {
      const a=farms[i], b=farms[j];
      const horizontal = a.row === b.row && (a.col + 2 === b.col || b.col + 2 === a.col);
      const vertical = a.col === b.col && (a.row + 2 === b.row || b.row + 2 === a.row);
      if (!horizontal && !vertical) continue;
      a.farmAdjacencyBonus += 0.15;
      b.farmAdjacencyBonus += 0.15;
      G.farmLinks.push([a,b]);
    }
  }
}
function getIdleResidents() {
  return G.residents.filter(r=>(r.state==='IDLE'||r.state==='PATROL') && !r.isEngineer);
}
function residentCount(isGuard) {
  return G.residents.filter(r=>r.isGuard===isGuard).length;
}
function queuedRecruitCount(role) {
  return G.buildings.reduce((sum,b)=>sum+(buildingRuntimeDef(b).recruits===role?(b.recruitQueue||0):0),0);
}
function availableRecruitSlots(role) {
  const isGuard=role==='guard';
  const capacity=isGuard ? G.maxGuards : G.maxPop;
  return capacity-residentCount(isGuard)-queuedRecruitCount(role);
}
function assignHome(r, house) {
  if (r.home && r.home.hp>0) {
    if (r.isGuard) r.home.guardResidentCount=Math.max(0,(r.home.guardResidentCount||0)-1);
    else r.home.residentCount=Math.max(0,r.home.residentCount-1);
  }
  r.home = house;
  if (house) {
    if (r.isGuard) house.guardResidentCount=(house.guardResidentCount||0)+1;
    else house.residentCount++;
  }
}
function removeHome(r) {
  if (r.home) {
    if (r.isGuard) r.home.guardResidentCount=Math.max(0,(r.home.guardResidentCount||0)-1);
    else r.home.residentCount=Math.max(0,r.home.residentCount-1);
  }
  r.home = null;
}
function returnCarriedOutput(r) {
  const source = r.carryingFrom;
  if (r.carrying && source && source.hp > 0) {
    source.pendingOutput += r.carrying.amount;
    if (source.outputHauler === r) source.outputHauler = null;
  }
  r.carrying = null;
  r.carryingFrom = null;
}
function removeResident(r) {
  returnCarriedOutput(r);
  if (r.workplace) {
    r.workplace.assignedWorkers = Math.max(0, r.workplace.assignedWorkers - 1);
    if (r.workplace.outputHauler === r) r.workplace.outputHauler = null;
  }
  if (r.assignedTower && r.assignedTower.assignedGuard === r) r.assignedTower.assignedGuard = null;
  if (r.manningTower && r.manningTower.assignedGuard === r) r.manningTower.assignedGuard = null;
  for (const enemy of G.enemies) {
    if (enemy.fightingGuard === r) enemy.fightingGuard = null;
    if (enemy.guardTarget === r) enemy.guardTarget = null;
  }
  if (G.selectedGuards.includes(r)) setSelectedGuards(G.selectedGuards.filter(guard=>guard!==r));
  if (r.buildTarget) r.buildTarget.assignedEngineer = null;
  r.hidden = true;
  removeHome(r);
  G.residents = G.residents.filter(other => other !== r);
}

  }
  def() { return BLD_DEFS[this.type]; }
}

function initGame() {

function addBuilding(type, col, row, skipBlueprint) {
  const def = BLD_DEFS[type];
  const townHallLevel=G.townHall ? G.townHall.level : 1;
  if (!def||!buildingUnlockStatus(def,townHallLevel).unlocked||!canPlaceBuilding(type, col, row)) return null;
  const hasCost = Object.keys(def.cost||{}).length > 0;
  const b = new Building(type, col, row);
  if (hasCost && !skipBlueprint) {
    b.blueprint = true;
    b.constructCost = Object.assign({}, def.cost);
    b.constructDelivered = {};
    for (const k of Object.keys(def.cost)) b.constructDelivered[k] = 0;
    b.hp = 1; b.maxHp = def.hp;
  }
  G.buildings.push(b);
  invalidateNavigation();
  if (type==='house' && !b.blueprint) G.maxPop += BLD_DEFS[type].popBonus;
  if (type==='barracks' && !b.blueprint) G.maxGuards += BLD_DEFS[type].guardBonus;
  if (type==='farm') refreshFarmAdjacency();
  if (!b.blueprint) refreshFogVisibility();
  return b;
}

class ArrowProjectile {
  constructor(source, target, damage) {
    this.x=source.x; this.y=source.y;
    this.target=target; this.damage=damage;
    this.speed=CFG.ARROW_SPEED; this.life=0; this.maxLife=2.5;
