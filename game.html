<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>殖民模拟 - 塔防</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#1a1a2e; display:flex; justify-content:center; align-items:center;
  height:100vh; font-family:'Microsoft YaHei',sans-serif; user-select:none; overflow:hidden;
}
#game-container { position:relative; display:flex; gap:8px; }
canvas { border:2px solid #333; border-radius:4px; cursor:crosshair; }

#topbar {
  position:absolute; top:8px; left:50%; transform:translateX(-50%);
  display:flex; gap:16px; z-index:10;
  background:rgba(0,0,0,0.85); padding:6px 16px; border-radius:8px; color:#fff; font-size:13px;
  pointer-events:none;
}
.top-res { display:flex; align-items:center; gap:4px; }
.top-res .icon { font-size:16px; }
.top-res .val { font-weight:bold; color:#ffd700; }

#building-panel {
  width:120px; background:rgba(0,0,0,0.85); border-radius:8px; padding:8px;
  display:flex; flex-direction:column; gap:4px; color:#fff; font-size:12px;
}
#building-panel h3 { text-align:center; font-size:14px; margin-bottom:4px; color:#ffd700; }
.bld-btn {
  background:#2a2a4a; border:1px solid #444; color:#ddd;
  padding:8px 6px; border-radius:4px; cursor:pointer;
  font-size:11px; font-family:inherit; text-align:left; transition:all 0.15s;
}
.bld-btn:hover { background:#3a3a6a; border-color:#888; }
.bld-btn.selected { background:#4a4a2a; border-color:#ffd700; }
.bld-btn .cost { font-size:10px; color:#aaa; }

#context-menu {
  position:fixed; display:none; flex-direction:column; gap:2px;
  background:rgba(0,0,0,0.92); padding:4px; border-radius:6px;
  border:1px solid #555; z-index:20; min-width:130px;
}
#context-menu button {
  background:#2a2a4a; border:1px solid #444; color:#ddd;
  padding:6px 10px; border-radius:3px; cursor:pointer;
  font-size:12px; font-family:inherit; text-align:left;
}
#context-menu button:hover { background:#3a3a6a; }
#context-menu .info-line {
  color:#aaa; font-size:11px; padding:4px 8px;
  text-align:center; border-bottom:1px solid #333; margin-bottom:2px;
}

#time-indicator {
  position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
  font-size:48px; font-weight:bold; color:#fff;
  text-shadow:0 0 20px rgba(255,200,0,0.6);
  pointer-events:none; z-index:5; opacity:0; transition:opacity 0.5s;
}
#debug-panel {
  width:120px; background:rgba(0,0,0,0.85); border-radius:8px; padding:8px;
  color:#fff; font-size:11px; display:flex; flex-direction:column; gap:2px;
  position:relative; z-index:1; flex-shrink:0;
}
.dbg-btn {
  background:#3a3a5a; border:1px solid #555; color:#ddd;
  padding:3px 6px; border-radius:3px; cursor:pointer;
  font-size:11px; font-family:inherit;
}
.dbg-btn:hover { background:#5a5a7a; }
.dbg-row { display:flex; align-items:center; gap:3px; }
.dbg-row input {
  width:50px; background:#222; border:1px solid #555; color:#fff;
  padding:2px 4px; border-radius:3px; font-size:11px; font-family:inherit;
}
</style>
</head>
<body>

<div id="game-container">
  <div id="debug-panel">
    <div style="font-size:12px;color:#ffd700;margin-bottom:2px;">🔧 调试</div>
    <div style="display:flex;gap:2px;margin-bottom:3px;flex-wrap:wrap;">
      <button class="dbg-btn" onclick="setSpeed(0)">⏸</button>
      <button class="dbg-btn" onclick="setSpeed(1)">▶</button>
      <button class="dbg-btn" onclick="setSpeed(2)">2x</button>
      <button class="dbg-btn" onclick="setSpeed(5)">5x</button>
      <button class="dbg-btn" onclick="setSpeed(20)">20x</button>
    </div>
    <div style="display:flex;gap:2px;margin-bottom:3px;">
      <button class="dbg-btn" onclick="setAllRes()" style="flex:1">💰 无限资源</button>
    </div>
    <div style="display:flex;gap:2px;margin-bottom:3px;">
      <button class="dbg-btn" onclick="addPop(1)" style="flex:1">+👤</button>
      <button class="dbg-btn" onclick="addPop(-1)" style="flex:1">-👤</button>
    </div>
    <div style="display:flex;gap:2px;margin-bottom:3px;">
      <button class="dbg-btn" onclick="skipToDay()" style="flex:1">☀️ 白天</button>
      <button class="dbg-btn" onclick="skipToNight()" style="flex:1">🌙 夜晚</button>
    </div>
      <div style="display:flex;gap:2px;margin-bottom:3px;">
        <button class="dbg-btn" onclick="unlockAll()" style="flex:1">🔓解锁</button>
        <button class="dbg-btn" onclick="upgradeTH()" style="flex:1">⬆升本</button>
      </div>
      <div style="display:flex;gap:2px;margin-bottom:3px;">
        <button class="dbg-btn" onclick="restartGame()" style="flex:1">🔄重新开始</button>
      </div>
      <div style="display:flex;gap:2px;margin-bottom:3px;">
        <button class="dbg-btn" onclick="openConfigPanel()" style="flex:1">✏️编辑配置</button>
      </div>
    <div style="display:flex;flex-wrap:wrap;gap:2px;">
      <div class="dbg-row"><span>🍗</span><input id="dbg-food" type="number" value="50" size="4"><button class="dbg-btn" onclick="setRes('food')">设</button></div>
      <div class="dbg-row"><span>🪵</span><input id="dbg-wood" type="number" value="30" size="4"><button class="dbg-btn" onclick="setRes('wood')">设</button></div>
      <div class="dbg-row"><span>🪨</span><input id="dbg-stone" type="number" value="20" size="4"><button class="dbg-btn" onclick="setRes('stone')">设</button></div>
      <div class="dbg-row"><span>⚒</span><input id="dbg-iron" type="number" value="0" size="4"><button class="dbg-btn" onclick="setRes('iron')">设</button></div>
    </div>
  </div>
  <canvas id="game"></canvas>
  <div id="building-panel">
    <h3>🏘 建筑</h3>
    <button class="bld-btn" data-type="farm">🌾 农场<div class="cost">5木</div></button>
    <button class="bld-btn" data-type="lumber">🪓 伐木场<div class="cost">5木</div></button>
    <button class="bld-btn" data-type="arrow_tower">🏹 箭塔<div class="cost">20木 10石</div></button>
    <button class="bld-btn" data-type="house">🏠 住房<div class="cost">10木 5石</div></button>
    <button class="bld-btn" data-type="wood_storage">🪵 木材仓库<div class="cost">10木 5石</div></button>
    <button class="bld-btn" data-type="food_storage">🍗 食物仓库<div class="cost">10木 5石</div></button>
    <button class="bld-btn" data-type="quarry">⛏ 采石场<div class="cost">10木 5石</div></button>
    <button class="bld-btn" data-type="stone_storage">🪨 石材仓库<div class="cost">10木 5石</div></button>
    <button class="bld-btn" data-type="wall">🧱 城墙<div class="cost">5石</div></button>
    <button class="bld-btn" data-type="iron_mine">⚒ 铁矿<div class="cost">15木 10石</div></button>
    <button class="bld-btn" data-type="smelter">🔥 炼铁机<div class="cost">20木 15石</div></button>
    <button class="bld-btn" data-type="iron_storage">⚒ 铁矿仓库<div class="cost">10木 10石</div></button>
    <button class="bld-btn" data-type="ingot_storage">🔩 铁锭仓库<div class="cost">10木 10石</div></button>
  </div>

  <div id="topbar">
    <div class="top-res"><span class="icon">🍗</span><span class="val" id="r-food">50</span></div>
    <div class="top-res"><span class="icon">🪵</span><span class="val" id="r-wood">30</span></div>
    <div class="top-res"><span class="icon">🪨</span><span class="val" id="r-stone">20</span></div>
    <div class="top-res"><span class="icon">⚒</span><span class="val" id="r-iron">0</span></div>
    <div style="color:#aaa;">|</div>
    <div class="top-res"><span class="icon">👤</span><span class="val" id="r-pop">4/8</span></div>
    <div style="color:#aaa;">|</div>
    <div class="top-res"><span class="icon" id="day-icon">☀️</span><span class="val" id="r-time">Day 1</span></div>
  </div>

  <div id="time-indicator"></div>

  <div id="eng-bar" style="position:absolute; bottom:8px; right:132px;
  display:flex; gap:6px; z-index:10; align-items:center;
  background:rgba(0,0,0,0.7); padding:3px 10px; border-radius:6px; color:#fff; font-size:12px;">
  <span id="eng-minus" style="cursor:pointer;color:#a44;display:none" onclick="unassignEngineer()" title="取消工程师">➖</span>
  <span>👷 <span id="r-eng">0/0</span></span>
  <span id="eng-plus" style="cursor:pointer;color:#4a4;display:none" onclick="assignEngineer()" title="指派工程师">➕</span>
</div>
</div>

<input type="file" id="config-file-import" accept=".json" style="display:none">
<div id="config-overlay" style="display:none; position:fixed; top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.8); z-index:100; justify-content:center;align-items:center;">
  <div style="background:#1a1a2e; border:2px solid #555; border-radius:12px; padding:20px;
    width:600px; max-height:85vh; overflow-y:auto; color:#fff; font-size:12px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <h2 style="color:#ffd700; margin:0;">✏️ 配置编辑</h2>
      <button onclick="closeConfigPanel()" style="background:#a44; color:#fff; border:none; padding:6px 14px;
        border-radius:4px; cursor:pointer; font-size:14px; font-family:inherit;">✖ 关闭</button>
    </div>
    <div style="display:flex; gap:8px; margin-bottom:10px;">
      <select id="cfg-category" onchange="cfgSelectCategory()" style="background:#2a2a3a;color:#fff;border:1px solid #555;padding:4px 8px;border-radius:4px;font-size:12px;font-family:inherit;">
        <option value="buildings">🏗 建筑</option>
        <option value="resources">💰 资源</option>
      </select>
      <select id="cfg-item" onchange="cfgSelectItem()" style="background:#2a2a3a;color:#fff;border:1px solid #555;padding:4px 8px;border-radius:4px;font-size:12px;font-family:inherit;flex:1;"></select>
    </div>
    <div id="cfg-fields" style="display:flex; flex-direction:column; gap:5px; margin-bottom:10px;"></div>
    <div style="display:flex; gap:8px;">
      <button onclick="cfgApply()" style="flex:1; padding:8px; background:#4a4; color:#fff;
        border:none; border-radius:6px; cursor:pointer; font-size:13px; font-family:inherit;">✅ 应用</button>
      <button onclick="cfgExportJSON()" style="flex:1; padding:8px; background:#4a6aaa; color:#fff;
        border:none; border-radius:6px; cursor:pointer; font-size:13px; font-family:inherit;">💾 导出JSON</button>
      <button onclick="cfgImportJSON()" style="flex:1; padding:8px; background:#6a5a2a; color:#fff;
        border:none; border-radius:6px; cursor:pointer; font-size:13px; font-family:inherit;">📂 导入JSON</button>
    </div>
  </div>
</div>
<div id="context-menu"></div>
<div id="gameover-overlay" style="display:none; position:fixed; top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.7); z-index:100; justify-content:center;align-items:center;flex-direction:column;gap:16px;">
  <div style="font-size:36px;color:#f44;font-weight:bold;">💀 游戏结束</div>
  <div id="gameover-msg" style="font-size:18px;color:#fff;"></div>
  <button onclick="restartGame()" style="padding:12px 32px;font-size:18px;background:#4a4;color:#fff;
    border:none;border-radius:8px;cursor:pointer;font-family:inherit;">🔄 重新开始</button>
</div>


<script>
window.onerror = function(msg, src, line, col, err) {
  const stack = err ? err.stack : '';
  document.body.innerHTML += `<div style="position:fixed;top:0;left:0;right:0;background:#f44;color:#fff;padding:10px;z-index:9999;font-size:12px;">JS ERROR line ${line}: ${msg}<br><textarea onclick="this.select()" style="width:100%;height:60px;background:#600;color:#fff;border:none;margin-top:4px;font-size:11px;">${stack}</textarea></div>`;
};
// ============================================================
// CONFIG
// ============================================================
const CFG = {
  CANVAS_W: 1200, CANVAS_H: 800,
  CELL: 40, WORLD_COLS: 80, WORLD_ROWS: 50,
  WORLD_W: 3200, WORLD_H: 2000,
  DAY_DURATION: 162, NIGHT_DURATION: 78, TRANSITION: 8,
  START_FOOD: 50, START_WOOD: 40, START_STONE: 20, START_IRON: 0,
  START_POP: 4, MAX_POP_BASE: 4,
  HUNGER_RATE: 0.6, HUNGER_THRESHOLD: 60,
  TIRED_RATE: 0.4, TIRED_THRESHOLD: 100,
  ENEMY_BASE_HP: 40, ENEMY_SPEED: 50, ENEMY_DAMAGE: 8, ENEMY_ATTACK_RANGE: 30,
  TOWER_RANGE: 150, TOWER_DAMAGE: 15, TOWER_COOLDOWN: 0.8,
  RESIDENT_SPEED: 60,
};

// ============================================================
// BUILDING DEFINITIONS
// ============================================================
const BLD_DEFS = {
  house:       { name:'住房', icon:'🏠', cat:'facility',  sz:[2,2], cost:{wood:10,stone:5}, hp:200, maxWorkers:0, popBonus:4, unlock:2 , buildTime:5 },

  farm:        { name:'农场', icon:'🌾', cat:'production',sz:[2,2], cost:{wood:5},          hp:100, maxWorkers:2, produces:'food',  baseTime:8, unlock:1 , buildTime:2 },

  lumber:      { name:'伐木场',icon:'🪓', cat:'production',sz:[2,2], cost:{wood:5},          hp:100, maxWorkers:2, produces:'wood',  baseTime:6, unlock:1 , buildTime:2 },

  quarry:      { name:'采石场',icon:'⛏', cat:'production',sz:[2,2], cost:{wood:10,stone:5}, hp:120, maxWorkers:3, produces:'stone', baseTime:10, unlock:3 , buildTime:8 },

  iron_mine:   { name:'铁矿', icon:'⚒', cat:'production',sz:[2,2], cost:{wood:15,stone:10},hp:150, maxWorkers:4, produces:'iron',  baseTime:12, unlock:4 , buildTime:11 },

  smelter:     { name:'炼铁机',icon:'🔥', cat:'production',sz:[2,2], cost:{wood:20,stone:15},hp:120, maxWorkers:2, produces:'ingot', baseTime:8, unlock:4 , buildTime:11 },

  food_storage:{ name:'食物仓库',icon:'🍗', cat:'storage', sz:[2,2], cost:{wood:10,stone:5}, hp:150, maxWorkers:0, capacity:50, unlock:2 , buildTime:5 },

  wood_storage:{ name:'木材仓库',icon:'🪵', cat:'storage', sz:[2,2], cost:{wood:10,stone:5}, hp:150, maxWorkers:0, capacity:50, unlock:2 , buildTime:5 },

  stone_storage:{name:'石材仓库',icon:'🪨', cat:'storage', sz:[2,2], cost:{wood:10,stone:5}, hp:150, maxWorkers:0, capacity:50, unlock:3 , buildTime:8 },

  iron_storage:{ name:'铁矿仓库',icon:'⚒', cat:'storage', sz:[2,2], cost:{wood:10,stone:10},hp:150, maxWorkers:0, capacity:50, unlock:4 , buildTime:11 },

  ingot_storage:{name:'铁锭仓库',icon:'🔩', cat:'storage', sz:[2,2], cost:{wood:10,stone:10},hp:150, maxWorkers:0, capacity:50, unlock:4 , buildTime:11 },

  arrow_tower: { name:'箭塔', icon:'🏹', cat:'defense',   sz:[1,1], cost:{wood:20,stone:10},hp:120, maxWorkers:0, range:150, damage:15, cooldown:0.8, unlock:1 , buildTime:2 },

  town_hall:   { name:'大本营',icon:'🏛', cat:'facility',  sz:[2,2], cost:{},           hp:500, maxWorkers:0, recruitTime:10, recruitCost:{food:5}, unlock:1 , buildTime:2 },

  wall:        { name:'城墙', icon:'🧱', cat:'defense',   sz:[1,1], cost:{stone:5},         hp:250, maxWorkers:0, unlock:3 , buildTime:8 },

};


// ============================================================
// GAME STATE
// ============================================================
const G = {
  tick: 0, dt: 0, day: 1, dayTime: 0, phase: 'day', totalTime: 0,
  resources: { food:CFG.START_FOOD, wood:CFG.START_WOOD, stone:CFG.START_STONE, iron:CFG.START_IRON },
  buildings: [], residents: [], enemies: [], particles: [],
  selectedBldType: null, selectedBuilding: null, hoveredCell: null,
  mouseX: 0, mouseY: 0,
  placingMode: false, movingBuilding: null,
  maxPop: CFG.MAX_POP_BASE, popGrowthTimer: 0,
  engineerCount: 0,
  enemySpawnQueue: [], enemySpawnTimer: 0,
  cam: { x:CFG.WORLD_W/2, y:CFG.WORLD_H/2, zoom:1 },
  dragging: false, dragStartX:0, dragStartY:0, dragCamStartX:0, dragCamStartY:0,
};

// ============================================================
// UTILITY
// ============================================================
function dist(a,b) { return Math.hypot(a.x-b.x, a.y-b.y); }
function lerp(a,b,t) { return a+(b-a)*t; }
function clamp(v,lo,hi) { return Math.max(lo,Math.min(hi,v)); }
function gridCol(px) { return Math.floor(px/CFG.CELL); }
function gridRow(py) { return Math.floor(py/CFG.CELL); }
function gridX(col) { return col*CFG.CELL; }
function gridY(row) { return row*CFG.CELL; }

function canAfford(cost) {
  for (const [k,v] of Object.entries(cost||{}))
    if ((G.resources[k]||0) < v) return false;
  return true;
}
function payCost(cost) {
  for (const [k,v] of Object.entries(cost||{})) G.resources[k] -= v;
}

function isCellBlocked(col, row, excludeBld) {
  if (col<0 || row<0 || col>=CFG.WORLD_COLS || row>=CFG.WORLD_ROWS) return true;
  for (const b of G.buildings) {
    if (b === excludeBld) continue;
    const def = BLD_DEFS[b.type];
    if (col>=b.col && col<b.col+def.sz[0] && row>=b.row && row<b.row+def.sz[1]) return true;
  }
  return false;
}
function centerPlacement(type, col, row) {
  const def = BLD_DEFS[type];
  return { col: col - Math.floor(def.sz[0]/2), row: row - Math.floor(def.sz[1]/2) };
}
// World <-> Screen coordinate conversion
function worldToScreen(wx, wy) {
  return {
    x: (wx - G.cam.x) * G.cam.zoom + CFG.CANVAS_W/2,
    y: (wy - G.cam.y) * G.cam.zoom + CFG.CANVAS_H/2
  };
}
function screenToWorld(sx, sy) {
  return {
    x: (sx - CFG.CANVAS_W/2) / G.cam.zoom + G.cam.x,
    y: (sy - CFG.CANVAS_H/2) / G.cam.zoom + G.cam.y
  };
}

function pixelCenterPlacement(type, mx, my) {
  const def = BLD_DEFS[type];
  return {
    col: Math.round((mx - def.sz[0]*CFG.CELL/2) / CFG.CELL),
    row: Math.round((my - def.sz[1]*CFG.CELL/2) / CFG.CELL)
  };
}
function canPlaceBuilding(type, col, row, excludeBld) {
  const def = BLD_DEFS[type];
  for (let dc=0; dc<def.sz[0]; dc++)
    for (let dr=0; dr<def.sz[1]; dr++)
      if (isCellBlocked(col+dc, row+dr, excludeBld)) return false;
  return true;
}

function isStorage(type) { return BLD_DEFS[type] && (BLD_DEFS[type].cat==='storage' || type==='town_hall'); }
const RESIDENT_RADIUS = 7;


function neededMaterials(bp) {
  if (!bp.constructCost) return null;
  for (const [k, v] of Object.entries(bp.constructCost)) {
    const delivered = bp.constructDelivered[k] || 0;
    if (delivered < v) return { type: k, amount: v - delivered };
  }
  return null;
}
function findNearestBlueprint(resident) {
  let best = null, bestD = Infinity;
  for (const b of G.buildings) {
    if (!b.blueprint || b.hp <= 0 || b.assignedEngineer) continue;
    const bc = b.center();
    const d = Math.hypot(resident.x - bc.x, resident.y - bc.y);
    if (d < bestD) { bestD = d; best = b; }
  }
  return best;
}
function resolveCollisions(r, nx, ny) {
  for (const b of G.buildings) {
    if (b.hp <= 0) continue;
    if (r.workplace === b || r.home === b) continue;
    const c = b.center();
    const minDist = b.collisionRadius() + RESIDENT_RADIUS;
    const dx = nx - c.x, dy = ny - c.y;
    const dist = Math.hypot(dx, dy);
    if (dist < minDist && dist > 0.01) {
      nx = c.x + (dx / dist) * minDist;
      ny = c.y + (dy / dist) * minDist;
    }
  }
  for (const other of G.residents) {
    if (other === r || other.hidden) continue;
    const minDist = RESIDENT_RADIUS * 2;
    const dx = nx - other.x, dy = ny - other.y;
    const dist = Math.hypot(dx, dy);
    if (dist < minDist && dist > 0.01) {
      // Push apart along collision axis
      const overlap = minDist - dist;
      nx += (dx / dist) * overlap * 0.5;
      ny += (dy / dist) * overlap * 0.5;
      // Slide: add perpendicular offset to help pass each other
      const px = -dy / dist;
      const py = dx / dist;
      nx += px * overlap * 0.3;
      ny += py * overlap * 0.3;
    }
  }
  nx = clamp(nx, RESIDENT_RADIUS, CFG.WORLD_W - RESIDENT_RADIUS);
  ny = clamp(ny, RESIDENT_RADIUS, CFG.WORLD_H - RESIDENT_RADIUS);
  return { x: nx, y: ny };
}
function findNearestStorage(pos, resType) {
  let best=null, bestD=Infinity;
  for (const b of G.buildings) {
    if (!isStorage(b.type) || b.hp<=0) continue;
    if (resType === 'food' && b.type !== 'food_storage' && b.type !== 'town_hall') continue;
    if (resType === 'wood' && b.type !== 'wood_storage' && b.type !== 'town_hall') continue;
    if (resType === 'stone' && b.type !== 'stone_storage' && b.type !== 'town_hall') continue;
    if (resType === 'iron' && b.type !== 'iron_storage' && b.type !== 'town_hall') continue;
    if (resType === 'ingot' && b.type !== 'ingot_storage' && b.type !== 'town_hall') continue;
    const cx=b.x+BLD_DEFS[b.type].sz[0]*CFG.CELL/2;
    const cy=b.y+BLD_DEFS[b.type].sz[1]*CFG.CELL/2;
    const d=Math.hypot(pos.x-cx, pos.y-cy);
    if (d<bestD) { bestD=d; best=b; }
  }
  return best;
}
function maxBuildingLevel(type) {
  const th = G.townHall;
  return th ? th.level : 1;
}

function houseCapacity(h) {
  if (h.type==='town_hall') return 4 + (h.level-1)*4;
  if (h.type==='house') return BLD_DEFS.house.popBonus + (h.level-1)*2;
  return 0;
}
function findNearestHome(pos) {
  let best=null, bestD=Infinity;
  for (const b of G.buildings) {
    if ((b.type!=='house' && b.type!=='town_hall') || b.hp<=0) continue;
    if (b.residentCount >= houseCapacity(b)) continue;
    const cx=b.x+BLD_DEFS[b.type].sz[0]*CFG.CELL/2;
    const cy=b.y+BLD_DEFS[b.type].sz[1]*CFG.CELL/2;
    const d=Math.hypot(pos.x-cx, pos.y-cy);
    if (d<bestD) { bestD=d; best=b; }
  }
  return best;
}

function getIdleResidents() {
  return G.residents.filter(r=>(r.state==='IDLE'||r.state==='PATROL') && !r.isEngineer);
}
function assignHome(r, house) {
  if (r.home && r.home.hp>0) r.home.residentCount--;
  r.home = house;
  if (house) house.residentCount++;
}
function removeHome(r) {
  if (r.home) { r.home.residentCount = Math.max(0, r.home.residentCount-1); }
  r.home = null;
}

// ============================================================
// BUILDING CLASS
// ============================================================
class Building {
  constructor(type, col, row) {
    const def = BLD_DEFS[type];
    this.type = type; this.col = col; this.row = row;
    this.x = gridX(col); this.y = gridY(row);
    this.hp = def.hp; this.maxHp = def.hp;
    this.level = 1;
    this.assignedWorkers = 0;
    this.productionProgress = 0;
    this.upgradeProgress = 0; this.upgrading = false;
    this.stored = {};
    this.attackCooldown = 0;
    this.size = def.sz;
    this.recruitQueue = 0;
    this.recruitProgress = 0;
    this.residentCount = 0;
    this.blueprint = false;
    this.constructCost = null;
    this.constructDelivered = null;
    this.assignedEngineer = null;
    this.constructionTimer = 0;
  }
  center() {
    return { x:this.x+this.size[0]*CFG.CELL/2, y:this.y+this.size[1]*CFG.CELL/2 };
  }
  collisionRadius() {
    return Math.min(this.size[0], this.size[1]) * CFG.CELL / 2 - 6;
  }
  efficiency() {
    const def = BLD_DEFS[this.type];
    if (!def.maxWorkers) return 0;
    let eff = Math.min(1, this.assignedWorkers/def.maxWorkers);
    return eff;
  }
  def() { return BLD_DEFS[this.type]; }
}

// ============================================================
// RESIDENT CLASS
// ============================================================
class Resident {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.state = 'IDLE';
    this.workplace = null; this.home = null;
    this.hunger = 0; this.tired = 0;
    this.carrying = null;
    this.targetX = x; this.targetY = y;
    this.patrolAngle = Math.random()*Math.PI*2;
    this.patrolTimer = 0;
    this.eatTimer = 0; this.prodTimer = 0;
    this.hidden = false;
    this.buildTarget = null;
    this.isEngineer = false;
  }
}

// ============================================================
// ENEMY CLASS
// ============================================================
class Enemy {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.hp = CFG.ENEMY_BASE_HP; this.maxHp = CFG.ENEMY_BASE_HP;
    this.speed = CFG.ENEMY_SPEED * (0.8+Math.random()*0.4);
    // 目标：大本营位置
    const th = G.townHall;
    if (th) { this.targetX = th.x+th.size[0]*CFG.CELL/2; this.targetY = th.y+th.size[1]*CFG.CELL/2; }
    else { this.targetX = CFG.WORLD_W/2; this.targetY = CFG.WORLD_H/2; }
    this.attacking = null; this.attackTimer = 0;
    this.alive = true;
    this.size = 8 + Math.random()*4;
  }
}

// ============================================================
// PARTICLE CLASS
// ============================================================
class Particle {
  constructor(x,y,color,life) {
    this.x=x; this.y=y; this.color=color; this.life=life; this.maxLife=life;
    this.vx=(Math.random()-0.5)*60; this.vy=(Math.random()-0.5)*60;
  }
}

// ============================================================
// INITIALIZE
// ============================================================
function initGame() {
  // 大本营在正中央
  const th = new Building('town_hall', 39, 24);
  G.buildings.push(th);
  G.townHall = th;
  G.cam.x = th.x + CFG.CELL; G.cam.y = th.y + CFG.CELL;

  addBuilding('lumber', 36, 24, true);
  G.buildings[1].assignedWorkers = 2; // lumber
  G.maxPop = CFG.MAX_POP_BASE;

  for (let i=0; i<CFG.START_POP; i++) {
    const r = new Resident(
      th.x + 40 + (Math.random()-0.5)*100,
      th.y + 40 + (Math.random()-0.5)*100
    );
    assignHome(r, th);
    G.residents.push(r);
  }
  G.residents[0].workplace = G.buildings[1]; G.residents[0].state = 'GOING_TO_WORK';
  G.residents[1].workplace = G.buildings[1]; G.residents[1].state = 'GOING_TO_WORK';
}

function addBuilding(type, col, row, skipBlueprint) {
  if (!canPlaceBuilding(type, col, row)) return null;
  const def = BLD_DEFS[type];
  const hasCost = Object.keys(def.cost||{}).length > 0;
  const b = new Building(type, col, row);
  if (hasCost && !skipBlueprint) {
    b.blueprint = true;
    b.constructCost = Object.assign({}, def.cost);
    b.constructDelivered = {};
    for (const k of Object.keys(def.cost)) b.constructDelivered[k] = 0;
    b.hp = 1; b.maxHp = def.hp;
  }
  G.buildings.push(b);
  if (type==='house') G.maxPop += BLD_DEFS[type].popBonus;
  return b;
}

function demolishBuilding(b) {
  if (b.type==='town_hall') return; // 大本营不可拆除
  const idx = G.buildings.indexOf(b);
  if (idx===-1) return;
  for (const r of G.residents) {
    if (r.workplace===b) { r.workplace=null; r.state='IDLE'; }
    if (r.home===b) { assignHome(r, findNearestHome(r)); }
  }
  if (b.type==='house') G.maxPop = Math.max(CFG.MAX_POP_BASE, G.maxPop - BLD_DEFS[b.type].popBonus - (b.level-1)*2);
  G.buildings.splice(idx,1);
}

// ============================================================
// UPDATE
// ============================================================
function updateDayNight(dt) {
  const phaseDuration = G.phase==='day' ? CFG.DAY_DURATION :
    G.phase==='night' ? CFG.NIGHT_DURATION : CFG.TRANSITION;
  G.dayTime += dt;
  G.totalTime += dt;
  if (G.dayTime >= phaseDuration) {
    G.dayTime = 0;
    if (G.phase==='day') {
      G.phase='dusk'; showTimeIndicator('🌅 黄昏');
      spawnEnemyWave();
      // 让居民回家睡觉
      for (const r of G.residents) {
        r.tired = CFG.TIRED_THRESHOLD;
        const home = r.home || findNearestHome(r);
        if (home) {
          r.state = 'GOING_HOME';
          const hc = home.center();
          r.targetX = hc.x; r.targetY = hc.y;
          if (!r.home) assignHome(r, home);
        }
        // homeless residents stay IDLE → vulnerable to enemies
      }
    } else if (G.phase==='dusk') {
      G.phase='night'; showTimeIndicator('🌙 夜晚');
    } else if (G.phase==='night') {
      G.phase='dawn'; showTimeIndicator('🌄 黎明');
      G.enemies=[];
    } else if (G.phase==='dawn') {
      G.phase='day'; G.day++; showTimeIndicator('☀️ 第'+G.day+'天');
      for (const r of G.residents) { r.state='IDLE'; r.tired=0; r.hidden=false; }
    }
  }
}

function spawnEnemyWave() {
  const count = 3 + G.day * 2;
  G.enemySpawnTimer = 0;
  G.enemySpawnQueue = [];
  for (let i=0; i<count; i++)
    G.enemySpawnQueue.push({ delay: i*1.5 + Math.random()*2 });
}

function spawnEnemy() {
  const side = Math.floor(Math.random()*4);
  const pad=20;
  let x, y;
  if (side===0)      { x=Math.random()*CFG.WORLD_W; y=-pad; }
  else if (side===1) { x=CFG.WORLD_W+pad; y=Math.random()*CFG.WORLD_H; }
  else if (side===2) { x=Math.random()*CFG.WORLD_W; y=CFG.WORLD_H+pad; }
  else               { x=-pad; y=Math.random()*CFG.WORLD_H; }
  G.enemies.push(new Enemy(x,y));
}

function updateEnemies(dt) {
  G.enemySpawnTimer += dt;
  for (let i=G.enemySpawnQueue.length-1; i>=0; i--) {
    if (G.enemySpawnQueue[i].delay <= G.enemySpawnTimer) {
      spawnEnemy(); G.enemySpawnQueue.splice(i,1);
    }
  }
  for (const e of G.enemies) {
    if (!e.alive) continue;
    if (e.attacking && e.attacking.hp>0) {
      e.attackTimer += dt;
      if (e.attackTimer >= 0.5) {
        e.attackTimer = 0;
        e.attacking.hp -= CFG.ENEMY_DAMAGE;
        spawnParticles(e.x,e.y,'#ff4444',3);
        if (e.attacking.hp <= 0) { e.attacking.hp = 0; e.attacking = null; }
      }
    } else {
      let blocked=false;
      for (const b of G.buildings) {
        if (b.hp<=0) continue;
        const c = b.center();
        if (Math.hypot(e.x-c.x, e.y-c.y) < b.collisionRadius() + CFG.ENEMY_ATTACK_RANGE + 5) {
          e.attacking=b; e.attackTimer=0; blocked=true; break;
        }
      }
      if (!blocked) {
        const dx=e.targetX-e.x, dy=e.targetY-e.y;
        const dd=Math.hypot(dx,dy)||1;
        e.x+=(dx/dd)*e.speed*dt;
        e.y+=(dy/dd)*e.speed*dt;
      }
    }
  }
  G.enemies = G.enemies.filter(e=>e.alive && e.hp>0);

  if (G.phase==='night') {
    for (const e of G.enemies) {
      if (!e.alive || e.attacking) continue;
      for (const r of G.residents) {
        if (r.state==='SLEEPING') continue;
        if (r.home) continue;
        const d = Math.hypot(e.x-r.x, e.y-r.y);
        if (d < 12) {
          G.residents = G.residents.filter(rr => rr !== r);
          if (r.workplace) { r.workplace.assignedWorkers--; }
          removeHome(r);
          spawnParticles(r.x, r.y, '#ff0000', 8);
          break;
        }
      }
    }
  }

  // Homeless residents at night can be attacked by enemies
  if (G.phase==='night') {
    for (const e of G.enemies) {
      if (!e.alive || e.attacking) continue;
      for (const r of G.residents) {
        if (r.state==='SLEEPING') continue; // safe in bed
        if (r.home) continue; // has home, safe
        const d = Math.hypot(e.x-r.x, e.y-r.y);
        if (d < 20) { // enemy close enough to attack
          G.residents = G.residents.filter(rr => rr !== r);
          if (r.workplace) { r.workplace.assignedWorkers--; }
          removeHome(r);
          spawnParticles(r.x, r.y, '#ff0000', 8);
          break; // one kill per enemy per frame
        }
      }
    }
  }
}

function updateTowers(dt) {
  for (const b of G.buildings) {
    if (b.type!=='arrow_tower'||b.hp<=0) continue;
    b.attackCooldown -= dt;
    if (b.attackCooldown > 0) continue;
    const def=BLD_DEFS[b.type], center=b.center();
    const range = def.range + 0;
    const damage = def.damage + 0;
    let closest=null, closestD=Infinity;
    for (const e of G.enemies) {
      if (!e.alive) continue;
      const d=dist(center,e);
      if (d<range && d<closestD) { closestD=d; closest=e; }
    }
    if (closest) {
      closest.hp -= damage;
      b.attackCooldown = def.cooldown;
      spawnParticles(closest.x, closest.y, '#ffaa00', 2);
      if (closest.hp<=0) {
        closest.alive=false;
        spawnParticles(closest.x, closest.y, '#ff6600', 6);
      }
    }
  }
}

function updateResidents(dt) {
  for (const r of G.residents) {
    if (r.state!=='SLEEPING') {
      r.hunger += CFG.HUNGER_RATE * dt;
      r.tired += CFG.TIRED_RATE * dt;
      if (G.phase==='night') r.tired += CFG.TIRED_RATE*2*dt;
    }
  }

  for (const r of G.residents) {
    if (r.state==='SLEEPING') {
      if (G.phase==='day'||G.phase==='dawn') { r.state='IDLE'; r.tired=0; }
      continue;
    }

    // Priority 1: Hungry
    if (r.hunger >= CFG.HUNGER_THRESHOLD && r.state!=='GOING_TO_EAT' && r.state!=='EATING') {
      const storage = findNearestStorage(r, 'food');
      if ((G.resources.food||0) > 0) {
        if (storage) {
          r.state = 'GOING_TO_EAT';
          const sc = storage.center(); r.targetX = sc.x; r.targetY = sc.y;
        } else {
          // No storage — eat directly
          r.state = 'EATING'; r.eatTimer = 1.5;
        }
      }
    }

    // Priority 2: Tired
    if (r.tired >= CFG.TIRED_THRESHOLD && r.state!=='GOING_HOME' && r.state!=='SLEEPING'
        && r.state!=='GOING_TO_EAT' && r.state!=='EATING') {
      const home = r.home || findNearestHome(r);
      if (home) {
        r.state = 'GOING_HOME';
        const hc = home.center();
        r.targetX = hc.x; r.targetY = hc.y;
        assignHome(r, home);
      }
    }

    // Execute state
    switch (r.state) {
      case 'GOING_TO_EAT': {
        // Recalculate target each frame
        const storage = findNearestStorage(r, 'food');
        if (!storage) { r.state='EATING'; r.eatTimer=0.5; break; }
        const sc=storage.center(); r.targetX=sc.x; r.targetY=sc.y;
        if (Math.hypot(r.x-sc.x, r.y-sc.y) < storage.collisionRadius() + RESIDENT_RADIUS + 2) { r.state='EATING'; r.eatTimer=1.5; }
        else { const edx=r.targetX-r.x, edy=r.targetY-r.y, edd=Math.hypot(edx,edy)||1; const nx=r.x+(edx/edd)*(CFG.RESIDENT_SPEED)*dt; const ny=r.y+(edy/edd)*(CFG.RESIDENT_SPEED)*dt; const rs=resolveCollisions(r,nx,ny); r.x=rs.x; r.y=rs.y; }
        break;
      }
      case 'EATING':
        if ((r.eatTimer-=dt)<=0) {
          if (G.resources.food>0) { G.resources.food--; r.hunger=0; }
          r.state = (G.phase==='night'||G.phase==='dusk') ? 'IDLE'
            : r.carrying?'HAULING' : r.workplace?'GOING_TO_WORK':'IDLE';
        }
        break;
      case 'GOING_HOME': {
        const home = r.home || findNearestHome(r);
        if (home) { const hc=home.center(); r.targetX=hc.x; r.targetY=hc.y; }
        const dx=r.targetX-r.x, dy=r.targetY-r.y, dd=Math.hypot(dx,dy)||1;
        if (home && Math.hypot(r.x-home.center().x, r.y-home.center().y) < home.collisionRadius() + RESIDENT_RADIUS + 2) { r.state='SLEEPING'; r.tired=0; r.hidden=true; }
        else { const nx=r.x+(dx/dd)*(CFG.RESIDENT_SPEED)*dt; const ny=r.y+(dy/dd)*(CFG.RESIDENT_SPEED)*dt; const rs=resolveCollisions(r,nx,ny); r.x=rs.x; r.y=rs.y; }
        break;
      }
      case 'GOING_TO_WORK': {
        if (!r.workplace||r.workplace.hp<=0) { r.state='IDLE'; r.workplace=null; break; }
        const wc=r.workplace.center();
        const dx=wc.x-r.x, dy=wc.y-r.y, dd=Math.hypot(dx,dy)||1;
        if (Math.hypot(r.x-wc.x, r.y-wc.y) < r.workplace.collisionRadius() + RESIDENT_RADIUS + 2) { r.state='WORKING'; r.prodTimer=0; }
        else { const nx=r.x+(dx/dd)*(CFG.RESIDENT_SPEED)*dt; const ny=r.y+(dy/dd)*(CFG.RESIDENT_SPEED)*dt; const rs=resolveCollisions(r,nx,ny); r.x=rs.x; r.y=rs.y; }
        break;
      }
      case 'WORKING': {
        if (!r.workplace||r.workplace.hp<=0) { r.state='IDLE'; r.workplace=null; break; }
        if (r.carrying) { r.state='HAULING'; break; } // still carrying, go deliver
        const b=r.workplace, def=BLD_DEFS[b.type];
        const eff=b.efficiency();
        if (eff<=0) break;
        b.productionProgress += dt / (def.baseTime/eff);
        if (b.productionProgress >= 1) {
          b.productionProgress = 0;
          const res = def.produces;
          if (!b.stored[res]) b.stored[res]=0;
          b.stored[res]++;
          r.state = 'HAULING';
          r.carrying = { type:res, amount:1 };
          const storage = findNearestStorage(r, def.produces);
          if (storage) { const sc=storage.center(); r.targetX=sc.x; r.targetY=sc.y; }
        }
        break;
      }
      case 'HAULING': {
        const storage = findNearestStorage(r, r.carrying.type);
        if (!storage) { r.carrying=null; r.state='IDLE'; break; }
        const sc=storage.center(); r.targetX=sc.x; r.targetY=sc.y;
        if (Math.hypot(r.x-sc.x, r.y-sc.y) < storage.collisionRadius() + RESIDENT_RADIUS + 2) {
          if (r.carrying) {
            G.resources[r.carrying.type] = (G.resources[r.carrying.type]||0) + r.carrying.amount;
            if (!storage.stored[r.carrying.type]) storage.stored[r.carrying.type]=0;
            storage.stored[r.carrying.type] += r.carrying.amount;
            if (r.workplace && r.workplace.stored[r.carrying.type])
              r.workplace.stored[r.carrying.type] = Math.max(0, (r.workplace.stored[r.carrying.type]||0)-1);
          }
          r.carrying=null;
          r.state = (G.phase==='night'||G.phase==='dusk') ? 'IDLE'
            : r.workplace&&r.workplace.hp>0?'GOING_TO_WORK':'IDLE';
        } else { const hdx=r.targetX-r.x, hdy=r.targetY-r.y, hdd=Math.hypot(hdx,hdy)||1; const nx=r.x+(hdx/hdd)*(CFG.RESIDENT_SPEED)*dt; const ny=r.y+(hdy/hdd)*(CFG.RESIDENT_SPEED)*dt; const rs=resolveCollisions(r,nx,ny); r.x=rs.x; r.y=rs.y; }
        break;
      }
      case 'GATHERING': {
        if (!r.buildTarget || r.buildTarget.hp <= 0) { if(r.buildTarget)r.buildTarget.assignedEngineer=null; r.buildTarget=null; r.state='IDLE'; break; }
        const need = neededMaterials(r.buildTarget);
        if (!need) { if(r.buildTarget.constructionTimer>0){r.state='CONSTRUCTING';}else{r.buildTarget.assignedEngineer=null;r.buildTarget=null;r.state=(r.workplace&&r.workplace.hp>0)?'GOING_TO_WORK':'IDLE';} break; }
        const gs = findNearestStorage(r, need.type);
        if (!gs) { r.buildTarget.assignedEngineer=null; r.buildTarget=null; r.state='IDLE'; break; }
        const gsc = gs.center(); r.targetX = gsc.x; r.targetY = gsc.y;
        if (Math.hypot(r.x-gsc.x, r.y-gsc.y) < gs.collisionRadius() + RESIDENT_RADIUS + 3) {
          const take = Math.min(5, need.amount);
          if (!r.carrying) r.carrying = { type: need.type, amount: 0 };
          r.carrying.type = need.type; r.carrying.amount = take;
          G.resources[need.type] = Math.max(0, (G.resources[need.type]||0) - take);
          if (gs.stored[need.type]) gs.stored[need.type] = Math.max(0, gs.stored[need.type] - take);
          r.state = 'BUILDING'; break;
        }
        const gdx = r.targetX-r.x, gdy = r.targetY-r.y, gdd = Math.hypot(gdx,gdy)||1;
        const gnx = r.x+(gdx/gdd)*CFG.RESIDENT_SPEED*dt, gny = r.y+(gdy/gdd)*CFG.RESIDENT_SPEED*dt;
        const grs = resolveCollisions(r, gnx, gny); r.x = grs.x; r.y = grs.y;
        break;
      }
      case 'BUILDING': {
        if (!r.buildTarget || r.buildTarget.hp <= 0) { if(r.buildTarget)r.buildTarget.assignedEngineer=null; r.buildTarget=null; r.carrying=null; r.state='IDLE'; break; }
        const bc = r.buildTarget.center(); r.targetX = bc.x; r.targetY = bc.y;
        if (Math.hypot(r.x-bc.x, r.y-bc.y) < r.buildTarget.collisionRadius() + RESIDENT_RADIUS + 3) {
          if (r.carrying && r.carrying.amount > 0) {
            const t = r.carrying.type;
            r.buildTarget.constructDelivered[t] = (r.buildTarget.constructDelivered[t]||0) + r.carrying.amount;
            r.carrying = null;
            let done = true;
            for (const [k, v] of Object.entries(r.buildTarget.constructCost)) {
              if ((r.buildTarget.constructDelivered[k]||0) < v) { done = false; break; }
            }
            if (done) {
              r.buildTarget.blueprint = false;
              r.buildTarget.constructCost = null; r.buildTarget.constructDelivered = null;
              r.buildTarget.constructionTimer = BLD_DEFS[r.buildTarget.type].buildTime || 2;
              r.state = 'CONSTRUCTING';
              break;
            }
          }
          r.state = 'GATHERING'; break;
        }
        const bdx = r.targetX-r.x, bdy = r.targetY-r.y, bdd = Math.hypot(bdx,bdy)||1;
        const bnx = r.x+(bdx/bdd)*CFG.RESIDENT_SPEED*dt, bny = r.y+(bdy/bdd)*CFG.RESIDENT_SPEED*dt;
        const brs = resolveCollisions(r, bnx, bny); r.x = brs.x; r.y = brs.y;
        break;
      }
      case 'CONSTRUCTING': {
        if (!r.buildTarget || r.buildTarget.hp <= 0 || r.buildTarget.constructionTimer <= 0) {
          if (r.buildTarget && r.buildTarget.hp>0) r.buildTarget.assignedEngineer = null;
          r.buildTarget = null;
          const nbp = findNearestBlueprint(r);
          if (nbp) { r.buildTarget = nbp; nbp.assignedEngineer = r; r.state = 'GATHERING'; }
          else { r.state = 'IDLE'; }
          break;
        }
        const cc = r.buildTarget.center();
        if (Math.hypot(r.x-cc.x, r.y-cc.y) < r.buildTarget.collisionRadius() + RESIDENT_RADIUS + 5) {
          // Stay near building while timer counts down
        } else {
          const cx = cc.x - r.x, cy = cc.y - r.y, cd = Math.hypot(cx,cy)||1;
          const nx = r.x + (cx/cd)*CFG.RESIDENT_SPEED*dt;
          const ny = r.y + (cy/cd)*CFG.RESIDENT_SPEED*dt;
          const rs = resolveCollisions(r, nx, ny); r.x = rs.x; r.y = rs.y;
        }
        break;
      }
      default: { // IDLE / PATROL
        if (G.phase==='night' || G.phase==='dusk') {
          const home = r.home || findNearestHome(r);
          if (home) { r.state='GOING_HOME'; r.targetX=home.center().x; r.targetY=home.center().y; }
          else r.state='SLEEPING';
          break;
        }
        if (r.workplace && r.workplace.hp>0) { r.state='GOING_TO_WORK'; break; }
        if (r.isEngineer) {
          if (r.buildTarget && r.buildTarget.hp>0 && r.buildTarget.constructionTimer>0) { r.state='CONSTRUCTING'; break; }
          const ebp = findNearestBlueprint(r);
          if (ebp) { r.buildTarget = ebp; ebp.assignedEngineer = r; r.state = 'GATHERING'; break; }
        }
        r.state='PATROL';
        if ((r.patrolTimer-=dt)<=0) {
          r.patrolTimer=2+Math.random()*4;
          r.patrolAngle=Math.random()*Math.PI*2;
        }
        const pnx=r.x+Math.cos(r.patrolAngle)*30*dt;
        const pny=r.y+Math.sin(r.patrolAngle)*30*dt;
        const prs=resolveCollisions(r,pnx,pny);
        r.x=prs.x; r.y=prs.y;
        break;
      }
    }
  }

  // Population growth
  G.popGrowthTimer += dt;
  if (G.popGrowthTimer >= 30 && G.residents.length < G.maxPop && G.resources.food>0) {
    G.popGrowthTimer = 0;
    const home = G.buildings.find(b=>b.type==='house'&&b.hp>0);
    if (home) {
      const hc=home.center();
      const r = new Resident(hc.x+(Math.random()-0.5)*40, hc.y+(Math.random()-0.5)*40);
      assignHome(r, home);
      G.residents.push(r);
    }
  }
}

function updateBuildings(dt) {
  for (const b of G.buildings) {
    if (b.constructionTimer > 0) {
      const hasEng = G.residents.some(r => r.buildTarget === b && (r.state==='CONSTRUCTING'||r.state==='GATHERING'||r.state==='BUILDING'));
      if (hasEng) {
        b.constructionTimer -= dt;
        if (b.constructionTimer <= 0) { b.constructionTimer = 0; b.hp = b.maxHp; b.assignedEngineer = null; }
      }
    }
    if (b.upgrading) {
      b.upgradeProgress += dt/(BLD_DEFS[b.type].buildTime||15);
      if (b.upgradeProgress>=1) {
        b.upgradeProgress=0; b.upgrading=false;
        b.level++;
        b.maxHp=Math.floor(b.maxHp*1.3);
        b.hp=b.maxHp;
        if (b.type==='house') G.maxPop += 2;
        if (b.type==='town_hall') updateBuildingPanel();
      }
    }
    // Recruiting (大本营)
    if (b.type==='town_hall' && b.recruitQueue > 0) {
      b.recruitProgress += dt / BLD_DEFS[b.type].recruitTime;
      if (b.recruitProgress >= 1) {
        b.recruitProgress = 0; b.recruitQueue--;
        if (G.residents.length < G.maxPop) {
          const hc = b.center();
          const nr = new Resident(hc.x+(Math.random()-0.5)*40, hc.y+(Math.random()-0.5)*40);
          assignHome(nr, findNearestHome(nr));
          G.residents.push(nr);
        }
      }
    }
  }
  G.buildings = G.buildings.filter(b=>{
    if (b.hp<=0) {
      if (b.type==='town_hall') { gameOver('大本营被摧毁！'); return false; }
      for (const r of G.residents) {
        if (r.workplace===b) { r.workplace=null; r.state='IDLE'; }
        if (r.home===b) removeHome(r);
      }
      if (b.type==='house') G.maxPop=Math.max(CFG.MAX_POP_BASE, G.maxPop-BLD_DEFS[b.type].popBonus-(b.level-1)*2);
      return false;
    }
    return true;
  });
}

function updateParticles(dt) {
  for (const p of G.particles) { p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; }
  G.particles=G.particles.filter(p=>p.life>0);
}

function cfgSelectItem() {
  const cat=document.getElementById('cfg-category').value;

  const container=document.getElementById('cfg-fields');
  let html='';
  if(cat==='buildings'&&BLD_DEFS[key]) {

      let val=d[f.k];

    }
  } else if(cat==='resources') {

    html += `<div style="display:flex;align-items:center;gap:8px;"><label style="width:100px;text-align:right;color:#aaa;">${resNames[key]||key}</label><input id="cfg-fld-res" type="num" value="${CFG['START_'+key.toUpperCase()]||0}" style="flex:1;background:#2a2a3a;color:#fff;border:1px solid #555;padding:4px 6px;border-radius:3px;font-size:12px;font-family:inherit;"></div>`;
  }

function cfgApply() {
  const cat=document.getElementById('cfg-category').value;
  const key=document.getElementById('cfg-item').value;
  if(cat==='buildings'&&BLD_DEFS[key]) {
    const d=BLD_DEFS[key];
    const oldHp=d.hp;
    for(const f of BLD_EDIT_FIELDS) {
      const el=document.getElementById('cfg-fld-'+f.k);
      if(!el) continue;
      const raw=el.value.trim();
      if(f.type==='num') { if(raw!=='') d[f.k]=+raw; }
      else if(f.k==='cost') {
        d.cost={};
        if(raw) { for(const p of raw.split(/[,;\s]+/)) { const [k,v]=p.split(':'); if(k&&v!=null) d.cost[k.trim()]=+v; } }
      } else { d[f.k]=raw; }
    }
    for(const b of G.buildings) {
      if(b.type!==key) continue;
      b.maxHp=Math.floor(b.maxHp*(d.hp/oldHp));
      b.hp=Math.min(b.hp,b.maxHp);
    }
    const btn=document.querySelector(`.bld-btn[data-type="${key}"]`);
    if(btn&&d.cost) {
      const costDiv=btn.querySelector('.cost');
      if(costDiv) costDiv.textContent=Object.entries(d.cost).map(([k,v])=>v+({wood:'木',stone:'石',iron:'铁',ingot:'锭'}[k]||k)).join(' ');
    }
    updateBuildingPanel();
    showTimeIndicator('✅ '+d.name+' 配置已应用');
  } else if (cat==='resources') {
    const el = document.getElementById('cfg-fld-res');
    if (el) { CFG['START_'+key.toUpperCase()] = parseInt(el.value) || 0; }
    showTimeIndicator('✅ '+key+' 初始值已更新');
  }
}
function cfgExportJSON() {
  const data={buildings:BLD_DEFS,resources:{start:{}}};
  for(const r of ['food','wood','stone','iron']) data.resources.start[r]=CFG['START_'+r.toUpperCase()];
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');

function cfgImportJSON() { document.getElementById('config-file-import').click(); }
document.getElementById('config-file-import').addEventListener('change',function(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev) {
    try {
      const data=JSON.parse(ev.target.result);
      if(data.buildings) {
        for(const [k,d] of Object.entries(data.buildings)) {
          if(BLD_DEFS[k]) { Object.assign(BLD_DEFS[k],d); if(d.cost&&typeof d.cost==='object') BLD_DEFS[k].cost=Object.assign({},d.cost); }
        }
        updateBuildingPanel();
      }
      if(data.resources&&data.resources.start) {
        for(const [k,v] of Object.entries(data.resources.start)) {
          const key='START_'+k.toUpperCase();
          if(CFG[key]!==undefined) CFG[key]=v;
        }
      }
      cfgSelectItem();
      showTimeIndicator('✅ JSON配置已导入并应用');
    } catch(ex) { showTimeIndicator('⚠ JSON解析失败'); }
  };
  reader.readAsText(file);
  this.value='';
});

function assignEngineer() {
  const idle = G.residents.find(r => (r.state === 'IDLE' || r.state === 'PATROL') && !r.workplace && !r.isEngineer);
  if (idle) {
    idle.isEngineer = true;
    const bp = findNearestBlueprint(idle);
    if (bp) {
      idle.buildTarget = bp; bp.assignedEngineer = idle; idle.state = 'GATHERING';
    }
  }
}
function unassignEngineer() {
  const eng = G.residents.find(r => r.isEngineer);
  if (eng) {
    eng.isEngineer = false;
    if (eng.buildTarget) eng.buildTarget.assignedEngineer = null;
    eng.buildTarget = null; eng.carrying = null; eng.state = 'IDLE';
  }
}
function addPop(n) {
  if (n > 0) {
    for (let i=0; i<n; i++) {
      const th = G.townHall;
      const r = new Resident(th.x+40+(Math.random()-0.5)*60, th.y+40+(Math.random()-0.5)*60);
      assignHome(r, findNearestHome(r)); G.residents.push(r);
    }
  } else {
    for (let i=0; i<-n && G.residents.length>0; i++) {
      const r = G.residents[G.residents.length-1];
      if (r.workplace) { r.workplace.assignedWorkers--; }
      G.residents.pop();
    }
  }
  G.popGrowthTimer = 0;
}

}

// ============================================================
// RENDERER
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = CFG.CANVAS_W;
canvas.height = CFG.CANVAS_H;

function getAlpha() {
  if (G.phase==='day') return 0;
  if (G.phase==='night') return 0.55;
  if (G.phase==='dusk') return 0.55*(G.dayTime/CFG.TRANSITION);
  return 0.55*(1-G.dayTime/CFG.TRANSITION);
}

function render() {
  const alpha=getAlpha();
  ctx.clearRect(0,0,CFG.CANVAS_W,CFG.CANVAS_H);

  // Camera transform
  ctx.save();
  ctx.translate(CFG.CANVAS_W/2, CFG.CANVAS_H/2);
  ctx.scale(G.cam.zoom, G.cam.zoom);
  ctx.translate(-G.cam.x, -G.cam.y);

  // Ground
  ctx.fillStyle=lerpColor('#3d5a3d','#1a2a1a',alpha);
  ctx.fillRect(0,0,CFG.WORLD_W,CFG.WORLD_H);

  // Grid
  ctx.strokeStyle=alpha>0.3?'rgba(255,255,255,0.04)':'rgba(255,255,255,0.08)';
  ctx.lineWidth=1/G.cam.zoom;
  for (let c=0;c<=CFG.WORLD_COLS;c++) { ctx.beginPath(); ctx.moveTo(c*CFG.CELL,0); ctx.lineTo(c*CFG.CELL,CFG.WORLD_H); ctx.stroke(); }
  for (let r=0;r<=CFG.WORLD_ROWS;r++) { ctx.beginPath(); ctx.moveTo(0,r*CFG.CELL); ctx.lineTo(CFG.WORLD_W,r*CFG.CELL); ctx.stroke(); }

  // Placement hover
  if (G.hoveredCell && !G.placingMode && G.selectedBldType) {
    const def=BLD_DEFS[G.selectedBldType];
    const wp=screenToWorld(G.mouseX, G.mouseY);
    const cp=pixelCenterPlacement(G.selectedBldType, wp.x, wp.y);
    const ok=canPlaceBuilding(G.selectedBldType, cp.col, cp.row);
    ctx.fillStyle=ok?'rgba(0,255,0,0.25)':'rgba(255,0,0,0.25)';
    ctx.fillRect(gridX(cp.col),gridY(cp.row),def.sz[0]*CFG.CELL,def.sz[1]*CFG.CELL);
  }

  // Moving ghost
  if (G.placingMode && G.movingBuilding && G.hoveredCell) {
    const b=G.movingBuilding, def=BLD_DEFS[b.type];
    const wp=screenToWorld(G.mouseX, G.mouseY);
    const cp=pixelCenterPlacement(b.type, wp.x, wp.y);
    const ok=canPlaceBuilding(b.type, cp.col, cp.row, b);
    ctx.fillStyle=ok?'rgba(0,255,0,0.35)':'rgba(255,0,0,0.35)';
    ctx.fillRect(gridX(cp.col),gridY(cp.row),def.sz[0]*CFG.CELL,def.sz[1]*CFG.CELL);
    ctx.globalAlpha=0.5; drawBuilding(b,gridX(cp.col),gridY(cp.row)); ctx.globalAlpha=1;
  }

  // Buildings
  for (const b of G.buildings) {
    if (!(G.placingMode && b===G.movingBuilding)) drawBuilding(b,b.x,b.y);
  }

  // Residents
  for (const r of G.residents) if (!r.hidden) drawResident(r);

  // Enemies
  for (const e of G.enemies) if(e.alive) drawEnemy(e);

  // Particles
  for (const p of G.particles) {
    ctx.fillStyle=p.color; ctx.globalAlpha=p.life/p.maxLife;
    ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  }

  ctx.restore();

  // Night overlay (screen space)
  if (alpha>0) { ctx.fillStyle=`rgba(10,10,40,${alpha})`; ctx.fillRect(0,0,CFG.CANVAS_W,CFG.CANVAS_H); }

  // Clock (screen space)
  drawClock();

  // Selection outline & range
  if (G.selectedBuilding && !G.placingMode) {
    const b=G.selectedBuilding;
    // Attack range for defense buildings
    if (b.type==='arrow_tower') {
      const def=BLD_DEFS[b.type];
      const center=b.center();
      ctx.fillStyle='rgba(255,255,255,0.08)';
      ctx.beginPath(); ctx.arc(center.x, center.y, (def.range + 0), 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.arc(center.x, center.y, (def.range + 0), 0, Math.PI*2); ctx.stroke();
    }
    ctx.strokeStyle='#ffd700'; ctx.lineWidth=2; ctx.setLineDash([4,4]);
    ctx.strokeRect(b.x-2,b.y-2,b.size[0]*CFG.CELL+4,b.size[1]*CFG.CELL+4);
    ctx.setLineDash([]);
  }
}

function drawBuilding(b, x, y) {
  const def=BLD_DEFS[b.type], w=def.sz[0]*CFG.CELL, h=def.sz[1]*CFG.CELL, cx=x+w/2, cy=y+h/2;
  const cr = b.collisionRadius();
  ctx.fillStyle='rgba(255,255,255,0.04)'; ctx.fillRect(x, y, w, h);
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1; ctx.setLineDash([3,6]); ctx.strokeRect(x+1,y+1,w-2,h-2); ctx.setLineDash([]);
  if (b.blueprint) ctx.globalAlpha = 0.5;
  ctx.fillStyle=buildingColor(b.type); ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.4)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI*2); ctx.stroke();
  if (b.blueprint) ctx.globalAlpha = 1;
  if (b.hp<b.maxHp && !b.blueprint) {
    const bw=w-8, bh=4;
    ctx.fillStyle='#333'; ctx.fillRect(x+4,y-8,bw,bh);
    ctx.fillStyle=b.hp/b.maxHp>0.5?'#4a4':'#a44'; ctx.fillRect(x+4,y-8,bw*(b.hp/b.maxHp),bh);
  }
  if (b.blueprint) {
    ctx.fillStyle='#fff'; ctx.font='14px sans-serif'; ctx.textAlign='center'; ctx.fillText(def.icon,cx,cy+5);
    const totalCost = Object.values(b.constructCost||{}).reduce((a,v)=>a+v,0);
    const totalDone = Object.values(b.constructDelivered||{}).reduce((a,v)=>a+v,0);
    const ratio = totalCost > 0 ? totalDone / totalCost : 0;
    const barW = w - 8, barH = 5;
    ctx.fillStyle = '#333'; ctx.fillRect(x+4, y+h-12, barW, barH);
    ctx.fillStyle = '#4af'; ctx.fillRect(x+4, y+h-12, barW * ratio, barH);
    ctx.fillStyle = '#fff'; ctx.font = '7px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(Math.floor(totalDone)+'/'+totalCost, cx, y+h-7);
  }
  // Construction progress (bottom-to-top fill)
  if (!b.blueprint && b.constructionTimer > 0) {
    const bt = BLD_DEFS[b.type].buildTime || 2;
    const prog = 1 - b.constructionTimer / bt;
    ctx.fillStyle = 'rgba(100,180,255,0.5)';
    ctx.fillRect(x, y + h*(1-prog), w, h*prog);
    ctx.fillStyle = '#fff'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(Math.floor(prog*100)+'%', cx, cy);
  }
  if (!b.blueprint && b.constructionTimer <= 0) {
    ctx.fillStyle='#fff'; ctx.font='14px sans-serif'; ctx.textAlign='center'; ctx.fillText(def.icon,cx,cy+5);
  }

  // Storage capacity bar (per-building)
  if (isStorage(b.type) && def.capacity) {
    const stored = Object.values(b.stored||{}).reduce((a,v)=>a+v, 0);
    const cap = def.capacity;
    const ratio = cap > 0 ? Math.min(1, stored / cap) : 0;
    const barW = w - 8, barH = 6;
    ctx.fillStyle = '#333'; ctx.fillRect(x+4, y+h-12, barW, barH);
    ctx.fillStyle = ratio > 0.8 ? '#f84' : ratio > 0.5 ? '#fa4' : '#4a4';
    ctx.fillRect(x+4, y+h-12, barW * ratio, barH);
    ctx.fillStyle = '#fff'; ctx.font = '7px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(`${stored}/${cap}`, cx, y+h-7);
  }

  if (b.upgrading) { ctx.fillStyle='rgba(255,255,0,0.5)'; ctx.beginPath(); ctx.arc(cx,cy,cr,-Math.PI/2,-Math.PI/2+Math.PI*2*b.upgradeProgress); ctx.lineTo(cx,cy); ctx.fill(); }
  if (b.type==='town_hall' && b.recruitQueue>0) { ctx.fillStyle='rgba(100,255,100,0.4)'; ctx.beginPath(); ctx.arc(cx,cy,cr,-Math.PI/2,-Math.PI/2+Math.PI*2*b.recruitProgress); ctx.lineTo(cx,cy); ctx.fill(); }
  if (def.maxWorkers>0) {
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(x+2,y+h-14,w-4,12);
    ctx.fillStyle='#fff'; ctx.font='9px sans-serif'; ctx.textAlign='center';
    ctx.fillText(`👤${b.assignedWorkers}/${def.maxWorkers}`,cx,cy+h/2-6);
  }
  if (b.type==='house'||b.type==='town_hall') {
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(x+2,y+h-14,w-4,12);
    ctx.fillStyle='#fff'; ctx.font='9px sans-serif'; ctx.textAlign='center';
    ctx.fillText(`🏠${b.residentCount}/${houseCapacity(b)}`,cx,cy+h/2-6);
  }
  const ts=b.stored?Object.values(b.stored).reduce((a,c)=>a+c,0):0;
  if (ts>0) { ctx.fillStyle='rgba(255,200,0,0.9)'; ctx.font='9px sans-serif'; ctx.fillText(`📦${ts}`,cx,y-4); }
}

function buildingColor(t) {
  return {town_hall:'#8a7a4a',house:'#5b8c5a',farm:'#8b9a4b',lumber:'#7a6b4a',quarry:'#8a8a8a',iron_mine:'#6a5a4a',smelter:'#c86428',food_storage:'#8a6a3a',wood_storage:'#8a7a3a',stone_storage:'#7a7a6a',iron_storage:'#6a5a3a',ingot_storage:'#5a6a7a',arrow_tower:'#8a5a4a',wall:'#7a7a6a'}[t]||'#777';
}

function drawResident(r) {
  const bodyColor = !r.home && (G.phase==='night'||G.phase==='dusk')?'#ff4444'
    :r.state==='SLEEPING'||r.state==='GOING_HOME'?'#8899cc'
    :r.state==='GOING_TO_EAT'||r.state==='EATING'?'#ffcc44'
    :r.state==='HAULING'?'#44ccff'
    :r.state==='WORKING'||r.state==='GOING_TO_WORK'?'#44cc88'
	    :r.state==='GATHERING'?'#ff8800'
	    :r.state==='BUILDING'?'#ff6600'
		    :r.state==='CONSTRUCTING'?'#cc6600'
	    :r.isEngineer?'#ff8800'
    :'#aaaaaa';
  const cr = RESIDENT_RADIUS;
  ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.beginPath(); ctx.arc(r.x,r.y,cr,0,Math.PI*2); ctx.fill();
  ctx.save(); ctx.translate(r.x, r.y + cr/2 - 10); ctx.scale(0.5, 1.0);
  ctx.fillStyle=bodyColor; ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=0.8; ctx.stroke();
  ctx.restore();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(r.x+2, r.y-14, 1.5, 0, Math.PI*2); ctx.fill();
  if (r.carrying) { ctx.fillStyle=rc(r.carrying.type); ctx.beginPath(); ctx.arc(r.x, r.y-22, 3, 0, Math.PI*2); ctx.fill(); }
  if (r.hunger>CFG.HUNGER_THRESHOLD*0.8) { ctx.fillStyle='#fff'; ctx.font='8px sans-serif'; ctx.fillText('🍗',r.x-8,r.y-20); }
  if (r.tired>CFG.TIRED_THRESHOLD*0.8) { ctx.fillStyle='#fff'; ctx.font='8px sans-serif'; ctx.fillText('💤',r.x+5,r.y-20); }
}

function drawEnemy(e) {
  const a=Math.atan2(e.targetY-e.y,e.targetX-e.x), s=e.size;
  ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(a);
  ctx.fillStyle=e.attacking?'#ff4444':'#ff6633';
  ctx.beginPath(); ctx.moveTo(s,0); ctx.lineTo(-s,-s*0.7); ctx.lineTo(-s,s*0.7); ctx.closePath();
  ctx.fill(); ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1; ctx.stroke(); ctx.restore();

  if (e.hp<e.maxHp) {
    const bw=16; ctx.fillStyle='#333'; ctx.fillRect(e.x-bw/2,e.y-s-8,bw,3);
    ctx.fillStyle='#f44'; ctx.fillRect(e.x-bw/2,e.y-s-8,bw*(e.hp/e.maxHp),3);
  }
}

function rc(t) { return {food:'#ffcc44',wood:'#aa8844',stone:'#aaaaaa',iron:'#cc8866'}[t]||'#fff'; }

function lerpColor(c1,c2,t) {
  const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  return `rgb(${Math.round(lerp(r1,r2,t))},${Math.round(lerp(g1,g2,t))},${Math.round(lerp(b1,b2,t))})`;
}

function drawClock() {
  const cx = CFG.CANVAS_W - 55, cy = 55, r = 38;
  const cycleLen = CFG.DAY_DURATION + CFG.NIGHT_DURATION + CFG.TRANSITION*2;
  const hour24 = ((G.totalTime / cycleLen * 24) + 6) % 24;

  // Clock face background
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#888'; ctx.lineWidth = 2;
  ctx.stroke();

  // Night sector: 10 PM (330°) to 6 AM (90°) = 120°
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, r-3, -Math.PI/2 + (22/24)*Math.PI*2, -Math.PI/2 + (6/24)*Math.PI*2);
  ctx.closePath(); ctx.fill();

  // Day sector: 6 AM (90°) to 10 PM (330°) = 240° — grey
  ctx.fillStyle = '#999';
  ctx.beginPath(); ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, r-3, -Math.PI/2 + (6/24)*Math.PI*2, -Math.PI/2 + (22/24)*Math.PI*2);
  ctx.closePath(); ctx.fill();

  // Hour markers
  ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
  for (let h=0; h<24; h+=3) {
    const a = -Math.PI/2 + (h/24)*Math.PI*2;
    const lx = cx + Math.cos(a)*(r-14), ly = cy + Math.sin(a)*(r-14);
    const label = h===0?'0':h===6?'6':h===12?'12':h===18?'18':String(h);
    const isNight = (h>=22||h<6); // 10pm-6am
    ctx.fillStyle = isNight ? '#fff' : '#000';
    ctx.fillText(label, lx, ly+3);
  }

  // Hour hand — pure white
  const ha = -Math.PI/2 + (hour24/24)*Math.PI*2;
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(cx,cy);
  ctx.lineTo(cx+Math.cos(ha)*(r-18), cy+Math.sin(ha)*(r-18)); ctx.stroke();

  // Center dot — pure white
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx, cy, 2.5, 0, Math.PI*2); ctx.fill();
}

// ============================================================
// UI
// ============================================================
const contextMenu = document.getElementById('context-menu');
const buildingPanel = document.getElementById('building-panel');

function updateTopBar() {
  document.getElementById('r-food').textContent = Math.floor(G.resources.food);
  document.getElementById('r-wood').textContent = Math.floor(G.resources.wood);
  document.getElementById('r-stone').textContent = Math.floor(G.resources.stone);
  document.getElementById('r-iron').textContent = Math.floor(G.resources.iron);
  const homeless = G.residents.filter(r=>!r.home).length;
  const engActive = G.residents.filter(r => r.isEngineer && (r.state==='GATHERING'||r.state==='BUILDING')).length;
  const engTotal = G.residents.filter(r => r.isEngineer).length;
  const hasIdle = G.residents.some(r => (r.state==='IDLE'||r.state==='PATROL') && !r.workplace && !r.isEngineer);
  document.getElementById('eng-plus').style.display = hasIdle ? '' : 'none';
  document.getElementById('eng-minus').style.display = engTotal > 0 ? '' : 'none';
  document.getElementById('r-eng').textContent = engActive+'/'+engTotal;
  document.getElementById('r-pop').textContent = `${G.residents.length}/${G.maxPop}` + (homeless>0?` ⚠${homeless}`:'');
  document.getElementById('r-time').textContent = G.phase==='day'?`第${G.day}天`:G.phase==='night'?`第${G.day}夜`:`第${G.day}天·过渡`;
  document.getElementById('day-icon').textContent = G.phase==='day'?'☀️':G.phase==='night'?'🌙':'🌅';
}

function showContextMenu(building, mx, my) {
  const b=building, def=BLD_DEFS[b.type];
  let h=`<div class="info-line">${def.icon} ${def.name} Lv.${b.level}</div>`;
  h+=`<div class="info-line" style="font-size:10px">HP: ${Math.ceil(b.hp)}/${b.maxHp}</div>`;
  if (b.type==='house') h+=`<div class="info-line" style="font-size:10px">住户: ${b.residentCount}/${houseCapacity(b)}</div>`;
  if(def.maxWorkers>0 && !b.blueprint) h+=`<div class="info-line" style="font-size:10px">工人: ${b.assignedWorkers}/${def.maxWorkers}</div>`;

  // 大本营特殊按钮：增加人口
  if(b.type==='town_hall') {
    const slots = G.maxPop - G.residents.length - b.recruitQueue;
    const full = slots <= 0;
    h+=`<div class="info-line" style="font-size:10px">人口: ${G.residents.length}/${G.maxPop} | 住户: ${b.residentCount}/${houseCapacity(b)} | 队列: ${b.recruitQueue}</div>`;
    h+=`<button onclick="actionRecruit()"${full?' disabled':''}>👤 增加人口 (消耗${def.recruitCost.food}食物)${b.recruitQueue>0?` (${b.recruitQueue}人排队中)`:''}${full?' [已满]':''}</button>`;
    const nextLv = b.level + 1;
    const unlocks = [];
    for (const [k, d] of Object.entries(BLD_DEFS)) {
      if (d.unlock === nextLv && k !== 'town_hall') unlocks.push(d.icon+d.name);
    }
    const thCosts = {1:{wood:20}, 2:{wood:50}, 3:{wood:200,stone:50}};
    const cost = thCosts[b.level] || {wood:500,stone:200};
    const costStr = Object.entries(cost).map(([k,v])=>v+({wood:'木',stone:'石'}[k]||k)).join(' ');
    const capText = `建筑等级上限 → Lv.${nextLv}`;
    const unlockText = unlocks.length ? '解锁: '+unlocks.join(' ') : '';
    h+=`<div class="info-line" style="font-size:10px;color:#ffd700;">⬆ 升级后: ${capText}${unlockText?' | '+unlockText:''}</div>`;
    h+=`<button onclick="actionUpgrade()">⬆ 升级 Lv.${b.level}→${nextLv} (${costStr})${b.upgrading?' (升级中...)':''}</button>`;
  } else {
    const maxLv = maxBuildingLevel(b.type);
    const capped = b.level >= maxLv;
    h+=`<button onclick="actionUpgrade()"${capped?' disabled':''}>⬆ 升级${b.upgrading?' (升级中...)':''}${capped?` [需大本营Lv.${b.level+1}]`:''}</button>`;
    if(def.maxWorkers>0 && !b.blueprint) {
      const full = b.assignedWorkers >= def.maxWorkers;
      const none = b.assignedWorkers <= 0;
      h+=`<button onclick="actionAddWorker()"${full?' disabled':''}>➕ 增加工人${full?' [满]':''}</button>`;
      h+=`<button onclick="actionRemoveWorker()"${none?' disabled':''}>➖ 减少工人${none?' [空]':''}</button>`;
    }
    h+=`<button onclick="actionMove()">↔ 移动</button>`;
    h+=`<button onclick="actionDemolish()" style="color:#f66">✖ 拆除</button>`;
  }
  contextMenu.innerHTML=h;
  contextMenu.style.display='flex';
  const cr = canvas.getBoundingClientRect();
  contextMenu.style.left = Math.min(mx, cr.right - 150) + 'px';
  contextMenu.style.top = Math.min(my, cr.bottom - 220) + 'px';
}

function hideContextMenu() { contextMenu.style.display='none'; }

function actionUpgrade() {
  const b=G.selectedBuilding; if(!b||b.upgrading) return;
  const maxLv = b.type==='town_hall' ? 99 : maxBuildingLevel(b.type);
  if (b.level >= maxLv) return;
  let cost;
  if (b.type==='town_hall') {
    const costs = {1:{wood:20}, 2:{wood:50}, 3:{wood:200,stone:50}};
    cost = costs[b.level] || {wood:500,stone:200};
  } else {
    cost = {wood:10*b.level, stone:5*b.level};
  }
  if(!canAfford(cost)) return;
  payCost(cost); b.upgrading=true; b.upgradeProgress=0; hideContextMenu();
}
function actionAddWorker() {
  const b=G.selectedBuilding; if(!b) return;
  if(b.assignedWorkers>=BLD_DEFS[b.type].maxWorkers) return;
  const idles=getIdleResidents(); if(idles.length===0) return;
  idles[0].workplace=b; idles[0].state='GOING_TO_WORK'; b.assignedWorkers++;
  // Refresh menu to show updated count
  const menu=document.getElementById('context-menu');
  showContextMenu(b, parseInt(menu.style.left), parseInt(menu.style.top));
}
function actionRemoveWorker() {
  const b=G.selectedBuilding; if(!b||b.assignedWorkers<=0) return;
  const w=G.residents.find(r=>r.workplace===b&&(r.state==='WORKING'||r.state==='GOING_TO_WORK'||r.state==='HAULING'));
  if(w){w.workplace=null;w.state='IDLE';} b.assignedWorkers--;
  const menu=document.getElementById('context-menu');
  showContextMenu(b, parseInt(menu.style.left), parseInt(menu.style.top));
}
function actionRecruit() {
  const b=G.selectedBuilding; if(!b||b.type!=='town_hall') return;
  const slots = G.maxPop - G.residents.length - b.recruitQueue;
  if (slots <= 0) return;
  const cost=BLD_DEFS[b.type].recruitCost;
  if(!canAfford(cost)) return;
  payCost(cost);
  b.recruitQueue++;
  if (b.recruitProgress <= 0) b.recruitProgress = 0;
  // Refresh menu
  const menu=document.getElementById('context-menu');
  showContextMenu(b, parseInt(menu.style.left), parseInt(menu.style.top));
}
function actionMove() {
  const b=G.selectedBuilding; if(!b||b.type==='town_hall') return;
  G.placingMode=true; G.movingBuilding=b; G.selectedBldType=null;
  document.querySelectorAll('.bld-btn').forEach(b=>b.classList.remove('selected')); hideContextMenu();
}
function actionDemolish() {
  const b=G.selectedBuilding; if(!b) return;
  demolishBuilding(b); G.selectedBuilding=null; hideContextMenu();
}

function updateBuildingPanel() {
  const th = G.townHall; const lv = th ? th.level : 1;
  for (const btn of document.querySelectorAll('.bld-btn')) {
    const def = BLD_DEFS[btn.dataset.type];
    if (!def) continue;
    const locked = def.unlock > lv;
    btn.style.display = locked ? "none" : "";
  }
}
buildingPanel.addEventListener('click', e => {
  const btn=e.target.closest('.bld-btn'); if(!btn) return;
  const type=btn.dataset.type;
  if(G.placingMode){G.placingMode=false;G.movingBuilding=null;}
  if(G.selectedBldType===type){
    G.selectedBldType=null; btn.classList.remove('selected');
  } else {
    document.querySelectorAll('.bld-btn').forEach(b=>b.classList.remove('selected'));
    G.selectedBldType=type; btn.classList.add('selected');
    G.selectedBuilding=null; hideContextMenu();
  }
});

// ============================================================
// INPUT
// ============================================================
canvas.addEventListener('mousemove', e => {
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  G.mouseX=mx; G.mouseY=my;
  const wp=screenToWorld(mx, my);
  G.hoveredCell={col:gridCol(wp.x),row:gridRow(wp.y)};

  // Camera drag
  if (G.dragging) {
    G.cam.x = G.dragCamStartX - (mx - G.dragStartX) / G.cam.zoom;
    G.cam.y = G.dragCamStartY - (my - G.dragStartY) / G.cam.zoom;
  }
});
canvas.addEventListener('mousedown', e => {
  if (e.button !== 0) return;
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;

  // Check if clicking a building
  const wp=screenToWorld(mx, my);
  const col=gridCol(wp.x), row=gridRow(wp.y);
  let clickedBld=null;
  for(const b of G.buildings){
    const d=BLD_DEFS[b.type];
    if(col>=b.col&&col<b.col+d.sz[0]&&row>=b.row&&row<b.row+d.sz[1]){clickedBld=b;break;}
  }

  if (!clickedBld && !G.selectedBldType && !G.placingMode) {
    // Start camera drag on empty ground with no build selection
    G.dragging = true;
    G.dragStartX = mx; G.dragStartY = my;
    G.dragCamStartX = G.cam.x; G.dragCamStartY = G.cam.y;
  }
});
canvas.addEventListener('click', e => {
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  const wp=screenToWorld(mx, my);
  const col=gridCol(wp.x), row=gridRow(wp.y);

  if (G.dragging) {
    G.dragging = false;
    const dx = mx - G.dragStartX, dy = my - G.dragStartY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) {
      hideContextMenu(); // close menu on drag
      return;
    }
  }
  G.dragging = false;

  if(G.placingMode && G.movingBuilding) {
    const b=G.movingBuilding;
    const cp=pixelCenterPlacement(b.type, wp.x, wp.y);
    if(canPlaceBuilding(b.type,cp.col,cp.row,b)){
      b.col=cp.col;b.row=cp.row;b.x=gridX(cp.col);b.y=gridY(cp.row);
      G.placingMode=false;G.movingBuilding=null;G.selectedBuilding=null;hideContextMenu();
      for (const r of G.residents) {
        if (r.workplace === b) r.state = 'GOING_TO_WORK';
        if (r.home === b) r.state = 'IDLE';
      }
    }
    return;
  }

  let clicked=null;
  for(const b of G.buildings){
    const d=BLD_DEFS[b.type];
    if(col>=b.col&&col<b.col+d.sz[0]&&row>=b.row&&row<b.row+d.sz[1]){clicked=b;break;}
  }

  if(clicked){
    G.selectedBuilding=clicked; G.selectedBldType=null;
    document.querySelectorAll('.bld-btn').forEach(b=>b.classList.remove('selected'));
    showContextMenu(clicked,e.clientX,e.clientY);
  } else if(G.selectedBldType && !G.placingMode){
    const cp=pixelCenterPlacement(G.selectedBldType, wp.x, wp.y);
    addBuilding(G.selectedBldType,cp.col,cp.row);
  } else { G.selectedBuilding=null; hideContextMenu(); }
});
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const newZoom = clamp(G.cam.zoom * (e.deltaY > 0 ? 0.9 : 1.1), 0.3, 3);
  // Zoom toward mouse position
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  const wp=screenToWorld(mx, my);
  G.cam.zoom = newZoom;
  const wp2=screenToWorld(mx, my);
  G.cam.x += wp.x - wp2.x;
  G.cam.y += wp.y - wp2.y;
}, {passive: false});
canvas.addEventListener('contextmenu', e => {
  e.preventDefault();
  G.selectedBldType=null; G.selectedBuilding=null; G.placingMode=false; G.movingBuilding=null;
  document.querySelectorAll('.bld-btn').forEach(b=>b.classList.remove('selected')); hideContextMenu();
});
canvas.addEventListener('mouseleave', () => { G.dragging = false; });
contextMenu.addEventListener('click', e => e.stopPropagation());
document.addEventListener('mousedown', e => {
  if(!e.target.closest('#context-menu')) hideContextMenu();
});
document.addEventListener('wheel', () => hideContextMenu());

// ============================================================
// LOOP
// ============================================================
let lastTime=0;
function gameLoop(ts) {
  const rawDt=Math.min((ts-lastTime)/1000,0.1); lastTime=ts;
  const dt = rawDt * gameSpeed;
  if (gameSpeed > 0) update(dt);
  render(); updateTopBar();
  requestAnimationFrame(gameLoop);
}

initGame();
updateBuildingPanel();
lastTime=performance.now();
requestAnimationFrame(gameLoop);
console.log('🏘 殖民模拟塔防游戏已就绪');
</script>
