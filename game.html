// INITIALIZE
// ============================================================
function initGame() {
  // 大本营在正中央
  const th = new Building('town_hall', 74, 74);
  G.buildings.push(th);
  G.townHall = th;
  th.stored = {
    food:CFG.START_FOOD, wood:CFG.START_WOOD, stone:CFG.START_STONE,
    iron:CFG.START_IRON, ingot:CFG.START_INGOT
  };
  updateAllResourceTotals();
  G.cam.x = th.x + CFG.CELL; G.cam.y = th.y + CFG.CELL;
  G.maxPop = CFG.MAX_POP_BASE;

  for (let i=0; i<CFG.START_POP; i++) {
    const r = new Resident(
      th.x + 40 + (Math.random()-0.5)*100,
      th.y + 40 + (Math.random()-0.5)*100
    );
    assignHome(r, th);
    G.residents.push(r);
  }
  G.residents[0].isEngineer = true;
  G.residents[1].isEngineer = true;
  initFloorMask();
  generateResources();
}

function addBuilding(type, col, row, skipBlueprint) {
  if (!canPlaceBuilding(type, col, row)) return null;
  const def = BLD_DEFS[type];
  const hasCost = Object.keys(def.cost||{}).length > 0;
  const b = new Building(type, col, row);
  if (hasCost && !skipBlueprint) {
    b.blueprint = true;
    b.constructCost = Object.assign({}, def.cost);
    b.constructDelivered = {};
    for (const k of Object.keys(def.cost)) b.constructDelivered[k] = 0;
    b.hp = 1; b.maxHp = def.hp;
  }
  G.buildings.push(b);
  invalidateNavigation();
  if (type==='house' && !b.blueprint) G.maxPop += BLD_DEFS[type].popBonus;
  if (type==='farm') refreshFarmAdjacency();
  return b;
}

function clearGuardPost(r, b) {
  if (!r.isGuard) return;
  if (r.assignedTower === b) r.assignedTower = null;
  if (r.manningTower === b) r.manningTower = null;
  r.state = (G.phase==='night'||G.phase==='dusk') ? 'GUARD_FIGHTING' : 'GUARD_SLEEPING';
  r.hidden = !(G.phase==='night'||G.phase==='dusk');
}

function demolishBuilding(b) {
  if (b.type==='town_hall') return; // 大本营不可拆除
  const idx = G.buildings.indexOf(b);
  if (idx===-1) return;
  b.outputHauler = null;
  invalidateNavigation();
  for (const r of G.residents) {
    if (r.workplace===b) { r.workplace=null; r.chopTarget=null; r.state=r.carrying?'HAULING':'IDLE'; }
    if (r.home===b) { assignHome(r, findNearestHome(r)); }
    if (r.assignedTower===b || r.manningTower===b) clearGuardPost(r,b);
    if (r.buildTarget===b) { r.buildTarget=null; r.state=r.carrying?'HAULING':'IDLE'; }
  }
  if (b.type==='house') G.maxPop = Math.max(CFG.MAX_POP_BASE, G.maxPop - BLD_DEFS[b.type].popBonus - (b.level-1)*2);
  G.buildings.splice(idx,1);
  if (b.assignedGuard) b.assignedGuard = null;
  if (b.type==='forester') {
    for (const node of G.resourceNodes) if (node.ownerForester===b) { node.ownerForester=null; node.marked=false; }
  }
  if (isStorage(b.type)) updateAllResourceTotals();
  if (b.type==='farm') refreshFarmAdjacency();
}

// ============================================================
// UPDATE
// ============================================================
function updateDayNight(dt) {
  const phaseDuration = G.phase==='day' ? CFG.DAY_DURATION :
    G.phase==='night' ? CFG.NIGHT_DURATION : CFG.TRANSITION;
  G.dayTime += dt;
  G.totalTime += dt;
  if (G.dayTime >= phaseDuration) {
    G.dayTime = 0;
    if (G.phase==='day') {
      G.phase='dusk'; showTimeIndicator('黄昏');
      spawnEnemyWave();
      // 饥饿天数累计 + 饿死检查
      const toRemove = [];
      for (const r of G.residents) {
        if (r.isGuard) continue;
        if (r.hunger >= CFG.HUNGER_THRESHOLD) {
          r.starvationDays++;
          if (r.starvationDays >= 3) {
            toRemove.push(r);
            spawnParticles(r.x, r.y, '#ff0000', 10);
          }
        } else if (r.hunger < CFG.HUNGER_THRESHOLD * 0.5) {
          r.starvationDays = Math.max(0, r.starvationDays - 1);
        }
      }
      for (const r of toRemove) {
        removeResident(r);
      }
      // 让居民回家睡觉
      for (const r of G.residents) {
        if (r.isGuard) continue; // guards handle their own sleep
        if (r.carrying) { r.state = 'HAULING'; continue; }
        r.tired = CFG.TIRED_THRESHOLD;
        const home = r.home || findNearestHome(r);
        if (home) {
          r.state = 'GOING_HOME';
          const hc = home.center();
          r.targetX = hc.x; r.targetY = hc.y;
          if (!r.home) assignHome(r, home);
        }
      }
      // Guards: wake up for night duty (unless already active)
      for (const r of G.residents) {
        if (r.isGuard) {
          r.state = 'GUARD_FIND_TOWER'; r.hidden = false;
          r.guardHealTimer = 0;
        }
      }
    } else if (G.phase==='dusk') {
      G.phase='night'; showTimeIndicator('夜晚');
      // Guards that were still sleeping (e.g. newly assigned): wake up
      for (const r of G.residents) {
        if (r.isGuard && r.state === 'GUARD_SLEEPING') {
          r.state = 'GUARD_FIND_TOWER'; r.hidden = false;
        }
      }
    } else if (G.phase==='night') {
      G.phase='dawn'; showTimeIndicator('黎明');
      G.enemies=[];
    } else if (G.phase==='dawn') {
      G.phase='day'; G.day++; showTimeIndicator('第 '+G.day+' 天');
      for (const r of G.residents) {
        if (r.isGuard) {
          // Guards: go sleep for the day, heal fully
          r.state = 'GUARD_SLEEPING'; r.hidden = true;
          r.guardHP = r.guardMaxHP;
          r.manningTower = null;
        } else {
          r.state=r.carrying?'HAULING':'IDLE'; r.tired=0; r.hidden=false;
        }
      }
    }
  }
}

function spawnEnemyWave() {
  const count = 3 + G.day * 2;
  G.enemySpawnTimer = 0;
  G.enemySpawnQueue = [];
  for (let i=0; i<count; i++)
    G.enemySpawnQueue.push({ delay: i*1.5 + Math.random()*2 });
}

function spawnEnemy() {
  const side = Math.floor(Math.random()*4);
  const pad=20;
  let x, y;
  if (side===0)      { x=Math.random()*CFG.WORLD_W; y=-pad; }
  else if (side===1) { x=CFG.WORLD_W+pad; y=Math.random()*CFG.WORLD_H; }
  else if (side===2) { x=Math.random()*CFG.WORLD_W; y=CFG.WORLD_H+pad; }
  else               { x=-pad; y=Math.random()*CFG.WORLD_H; }
  G.enemies.push(new Enemy(x,y));
}

function updateEnemies(dt) {
  G.enemySpawnTimer += dt;
  for (let i=G.enemySpawnQueue.length-1; i>=0; i--) {
    if (G.enemySpawnQueue[i].delay <= G.enemySpawnTimer) {
      spawnEnemy(); G.enemySpawnQueue.splice(i,1);
    }
  }
  for (const e of G.enemies) {
    if (!e.alive) continue;
    // Guard combat: enemy attacking a guard
    if (e.fightingGuard) {
      if (e.fightingGuard.guardHP <= 0) {
        e.fightingGuard = null; continue;
      }
      e.attackTimer += dt;
      if (e.attackTimer >= 0.5) {
        e.attackTimer = 0;
        e.fightingGuard.guardHP -= CFG.ENEMY_DAMAGE;
        spawnParticles(e.x, e.y, '#ff4444', 2);
        if (e.fightingGuard.guardHP <= 0) {
          e.fightingGuard.guardHP = 0;
          e.fightingGuard.state = 'GUARD_RETURNING';
          e.fightingGuard.manningTower = null;
          e.fightingGuard = null;
        }
      }
      continue;
    }
    // Building attack
    if (e.attacking && e.attacking.hp>0) {
      e.attackTimer += dt;
      if (e.attackTimer >= 0.5) {
        e.attackTimer = 0;
        e.attacking.hp -= CFG.ENEMY_DAMAGE;
        spawnParticles(e.x,e.y,'#ff4444',3);
        if (e.attacking.hp <= 0) { e.attacking.hp = 0; e.attacking = null; }
      }
    } else {
      e.attacking = null;
      // Priority 1: check for nearby fighting guards
      let guardBlocked = false;
      for (const r of G.residents) {
        if (!r.isGuard) continue;
        if (r.state !== 'GUARD_FIGHTING' && r.state !== 'GUARD_MANNING') continue;
        const d = Math.hypot(e.x - r.x, e.y - r.y);
        if (d < CFG.ENEMY_ATTACK_RANGE + 10) {
          e.fightingGuard = r; e.attackTimer = 0; guardBlocked = true; break;
        }
      }
      if (guardBlocked) continue;
      // Priority 2: check buildings
      let blocked = false;
      for (const b of G.buildings) {
        if (b.hp<=0) continue;
        const c = b.center();
        if (Math.hypot(e.x-c.x, e.y-c.y) < b.collisionRadius() + CFG.ENEMY_ATTACK_RANGE + 5) {
          e.attacking=b; e.attackTimer=0; blocked=true; break;
        }
      }
      if (!blocked) {
        const dx=e.targetX-e.x, dy=e.targetY-e.y;
        const dd=Math.hypot(dx,dy)||1;
        e.x+=(dx/dd)*e.speed*dt;
        e.y+=(dy/dd)*e.speed*dt;
      }
    }
  }
  G.enemies = G.enemies.filter(e=>e.alive && e.hp>0);

  // Homeless residents at night can be attacked (exclude guards)
  if (G.phase==='night') {
    for (const e of G.enemies) {
      if (!e.alive || e.attacking || e.fightingGuard) continue;
      for (const r of G.residents) {
        if (r.isGuard) continue;
        if (r.state==='SLEEPING') continue;
        if (r.home) continue;
        const d = Math.hypot(e.x-r.x, e.y-r.y);
        if (d < 20) {
          removeResident(r);
          spawnParticles(r.x, r.y, '#ff0000', 8);
          break;
        }
      }
    }
  }
}

function getGuardPatrol() {
  let cx = 0, cy = 0, n = 0;
  for (const b of G.buildings) {
    if (b.hp <= 0 || b.blueprint) continue;
    const c = b.center();
    cx += c.x; cy += c.y; n++;
  }
  if (n === 0) { const th = G.townHall; if (!th) return { x:3000, y:3000, r:500 }; const tc = th.center(); return { x: tc.x, y: tc.y, r: 200 }; }
  cx /= n; cy /= n;
  let maxR = 0;
  for (const b of G.buildings) {
    if (b.hp <= 0 || b.blueprint) continue;
    const c = b.center();
    const d = Math.hypot(c.x - cx, c.y - cy) + b.collisionRadius();
    if (d > maxR) maxR = d;
  }
  return { x: cx, y: cy, r: maxR + 100 };
}

function guardUpdateAI(r, dt) {
  const th = G.townHall; if (!th) return;
  const thCenter = th.center();
  const cycleLen = CFG.DAY_DURATION + CFG.NIGHT_DURATION + CFG.TRANSITION * 2;
  const twoGameHours = cycleLen * 2 / 24;

  switch (r.state) {
    case 'GUARD_FIND_TOWER': {
      const tower = r.assignedTower;
      if (tower && tower.hp > 0 && !tower.blueprint && BLD_DEFS[tower.type].needsManning) {
        if (tower.assignedGuard && tower.assignedGuard !== r) {
          r.assignedTower = null; r.state = 'GUARD_FIGHTING'; break;
        }
        const tc = tower.guardSpot();
        r.targetX = tc.x; r.targetY = tc.y;
        const dx = tc.x - r.x, dy = tc.y - r.y, dd = Math.hypot(dx, dy) || 1;
        if (Math.hypot(r.x - tc.x, r.y - tc.y) < tower.collisionRadius() + RESIDENT_RADIUS + 5) {
          r.state = 'GUARD_MANNING'; r.manningTower = tower; tower.assignedGuard = r;
        } else {
          moveViaFlow(r, tc.x, tc.y, CFG.RESIDENT_SPEED, dt);
        }
      } else {
        r.assignedTower = null;
        r.state = 'GUARD_FIGHTING';
      }
      break;
    }
    case 'GUARD_MANNING': {
      if (!r.manningTower || r.manningTower.hp <= 0 || r.manningTower.blueprint || r.assignedTower !== r.manningTower) {
        if (r.manningTower && r.manningTower.assignedGuard === r) r.manningTower.assignedGuard = null;
        r.manningTower = null; r.state = r.assignedTower ? 'GUARD_FIND_TOWER' : 'GUARD_FIGHTING'; break;
      }
      // Stand at tower center
      const tc = r.manningTower.guardSpot();
      const dx = tc.x - r.x, dy = tc.y - r.y, dd = Math.hypot(dx, dy) || 1;
      if (Math.hypot(r.x - tc.x, r.y - tc.y) > 3) {
        const nx = r.x + (dx / dd) * CFG.RESIDENT_SPEED * 0.5 * dt;
        const ny = r.y + (dy / dd) * CFG.RESIDENT_SPEED * 0.5 * dt;
        r.x = nx; r.y = ny;
      }
      break;
    }
    case 'GUARD_FIGHTING': {
      // Seek nearest enemy within vision range (450px)
      let targetEnemy = null, bestD = 450;
      for (const e of G.enemies) {
        if (!e.alive) continue;
        const d = Math.hypot(r.x - e.x, r.y - e.y);
        if (d < bestD) { bestD = d; targetEnemy = e; }
      }
      // If no enemy in vision, prioritize enemies attacking buildings
      if (!targetEnemy) {
        for (const e of G.enemies) {
          if (!e.alive) continue;
          if (e.attacking && e.attacking.hp > 0) {
            targetEnemy = e; break;
          }
        }
      }
      if (targetEnemy) {
        const dx = targetEnemy.x - r.x, dy = targetEnemy.y - r.y, dd = Math.hypot(dx, dy) || 1;
        if (dd < 20) {
          // Attack
          r.guardAttackCD -= dt;
          if (r.guardAttackCD <= 0) {
            r.guardAttackCD = 0.6;
            targetEnemy.hp -= 12;
            spawnParticles(targetEnemy.x, targetEnemy.y, '#ffaa00', 2);
            if (targetEnemy.hp <= 0) {
              targetEnemy.alive = false;
              spawnParticles(targetEnemy.x, targetEnemy.y, '#ff6600', 5);
            }
          }
        } else {
          // Move toward enemy
          moveViaFlow(r, targetEnemy.x, targetEnemy.y, CFG.RESIDENT_SPEED, dt);
        }
      } else {
        // Patrol within building boundary
        const pb = getGuardPatrol();
        if ((r.patrolTimer -= dt) <= 0) {
          r.patrolTimer = 2 + Math.random() * 3;
          const toC = Math.atan2(pb.y - r.y, pb.x - r.x);
          r.patrolAngle = toC + (Math.random() - 0.5) * Math.PI;
        }
        // Stay within patrol circle
        const dxc = r.x - pb.x, dyc = r.y - pb.y;
        const dc = Math.hypot(dxc, dyc);
        if (dc > pb.r) {
          r.patrolAngle = Math.atan2(-dyc, -dxc);
        }
        const pnx = r.x + Math.cos(r.patrolAngle) * 20 * dt;
        const pny = r.y + Math.sin(r.patrolAngle) * 20 * dt;
        // Clamp to boundary
        const ndc = Math.hypot(pnx - pb.x, pny - pb.y);
        const fx = Math.max(0, ndc - pb.r);
        if (fx > 0) {
          const fnx = pnx - (pnx - pb.x) / ndc * fx;
          const fny = pny - (pny - pb.y) / ndc * fx;
          const prs = resolveCollisions(r, fnx, fny);
          r.x = prs.x; r.y = prs.y;
        } else {
          const prs = resolveCollisions(r, pnx, pny);
          r.x = prs.x; r.y = prs.y;
        }
      }
      break;
    }
    case 'GUARD_RETURNING': {
      // Return to town hall
      const dx = thCenter.x - r.x, dy = thCenter.y - r.y, dd = Math.hypot(dx, dy) || 1;
      if (Math.hypot(r.x - thCenter.x, r.y - thCenter.y) < th.collisionRadius() + RESIDENT_RADIUS + 3) {
        r.state = 'GUARD_HEALING'; r.guardHealTimer = twoGameHours; r.hidden = true;
      } else {
        moveViaFlow(r, thCenter.x, thCenter.y, CFG.RESIDENT_SPEED, dt);
      }
      break;
    }
    case 'GUARD_HEALING': {
      r.guardHealTimer = Math.max(0, r.guardHealTimer - dt);
      if (r.guardHealTimer <= 0) {
        r.guardHP = r.guardMaxHP;
        r.hidden = false;
        // Go back to fighting or find a tower
        if (r.assignedTower && r.assignedTower.hp > 0 && !r.assignedTower.blueprint) { r.state = 'GUARD_FIND_TOWER'; }
        else { r.assignedTower = null; r.state = 'GUARD_FIGHTING'; }
      }
      break;
    }
  }
}

function updateTowers(dt) {
  for (const b of G.buildings) {
    const def = BLD_DEFS[b.type];
    if (!def.range || b.hp <= 0) continue;
    // Arrow tower: needs manning by a guard
    if (def.needsManning) {
      const guard=b.assignedGuard;
      const manned = guard && guard.manningTower === b && guard.state === 'GUARD_MANNING';
      if (!manned) continue;
    }
    b.attackCooldown -= dt;
    if (b.attackCooldown > 0) continue;
    const center = b.center();
    const range = def.range + 0;
    const damage = def.damage + 0;
    let closest = null, closestD = Infinity;
    for (const e of G.enemies) {
      if (!e.alive) continue;
      const d = dist(center, e);
      if (d < range && d < closestD) { closestD = d; closest = e; }
    }
    if (closest) {
      closest.hp -= damage;
      b.attackCooldown = def.cooldown;
      spawnParticles(closest.x, closest.y, '#ffaa00', 2);
      if (closest.hp <= 0) {
        closest.alive = false;
        spawnParticles(closest.x, closest.y, '#ff6600', 6);
      }
    }
  }
}

function updateResidents(dt) {
  rebuildResidentSpatialHash();
  G.targetedTrees = new Set(G.residents.map(r=>r.chopTarget).filter(Boolean));
  for (const r of G.residents) {
    if (r.isGuard) continue; // guards don't get hungry or tired
    if (r.state!=='SLEEPING') {
      r.hunger += CFG.HUNGER_RATE * dt;
      r.tired += CFG.TIRED_RATE * dt;
      if (G.phase==='night') r.tired += CFG.TIRED_RATE*2*dt;
    }
  }

  for (const r of G.residents) {
    if (r.state==='SLEEPING') {
      if (G.phase==='day'||G.phase==='dawn') { r.state='IDLE'; r.tired=0; }
      continue;
    }
    if (r.state==='GUARD_SLEEPING') {
      if (G.phase==='day'||G.phase==='dawn') { r.guardHP = r.guardMaxHP; }
      continue;
    }

    // === Guard AI ===
    if (r.isGuard) {
      guardUpdateAI(r, dt);
      continue;
    }

    // Priority 1: Hungry
    if (r.hunger >= CFG.HUNGER_THRESHOLD && r.state!=='GOING_TO_EAT' && r.state!=='EATING') {
      if (r.finishBeforeEating) {
        if (!isFinishableResidentTask(r)) eatAfterFinishingTask(r);
      } else if (isFinishableResidentTask(r)) {
        r.finishBeforeEating=true;
      } else {
        beginEating(r);
      }
    }

    // Priority 2: Tired
    if (r.tired >= CFG.TIRED_THRESHOLD && r.state!=='GOING_HOME' && r.state!=='SLEEPING'
        && r.state!=='GOING_TO_EAT' && r.state!=='EATING' && !r.finishBeforeEating) {
      const home = r.home || findNearestHome(r);
      if (home) {
        r.state = 'GOING_HOME';
        const hc = home.center();
        r.targetX = hc.x; r.targetY = hc.y;
        assignHome(r, home);
      }
    }

    // Execute state
    switch (r.state) {
      case 'GOING_TO_EAT': {
        // Recalculate target each frame
        const storage = findNearestStorage(r, 'food', {requireAmount:1});
        if (!storage) { r.state='EATING'; r.eatTimer=0.5; break; }
        const sc=storage.center(); r.targetX=sc.x; r.targetY=sc.y;
        if (Math.hypot(r.x-sc.x, r.y-sc.y) < storage.collisionRadius() + RESIDENT_RADIUS + 2) { r.state='EATING'; r.eatTimer=1.5; }
        else { moveViaFlow(r, r.targetX, r.targetY, CFG.RESIDENT_SPEED, dt); }
        break;
      }
      case 'EATING':
        if ((r.eatTimer-=dt)<=0) {
          const storage = findNearestStorage(r, 'food', {requireAmount:1});
          if (storage && withdrawFromStorage(storage, 'food', 1) === 1) { r.hunger=0; r.starvationDays=0; }
          r.state = (G.phase==='night'||G.phase==='dusk') ? 'IDLE'
            : r.carrying?'HAULING' : r.workplace?'GOING_TO_WORK':'IDLE';
        }
        break;
      case 'GOING_HOME': {
        const home = r.home || findNearestHome(r);
        if (home) { const hc=home.center(); r.targetX=hc.x; r.targetY=hc.y; }
        const dx=r.targetX-r.x, dy=r.targetY-r.y, dd=Math.hypot(dx,dy)||1;
        if (home && Math.hypot(r.x-home.center().x, r.y-home.center().y) < home.collisionRadius() + RESIDENT_RADIUS + 2) { r.state='SLEEPING'; r.tired=0; r.hidden=true; }
        else { moveViaFlow(r, r.targetX, r.targetY, CFG.RESIDENT_SPEED, dt); }
        break;
      }
      case 'GOING_TO_WORK': {
        if (!r.workplace||r.workplace.hp<=0) { r.state='IDLE'; r.workplace=null; break; }
        const wc=r.workplace.center();
        const dx=wc.x-r.x, dy=wc.y-r.y, dd=Math.hypot(dx,dy)||1;
        r.targetX=wc.x; r.targetY=wc.y;
        if (Math.hypot(r.x-wc.x, r.y-wc.y) < r.workplace.collisionRadius() + RESIDENT_RADIUS + 2) { r.state='WORKING'; r.prodTimer=0; }
        else { moveViaFlow(r, wc.x, wc.y, CFG.RESIDENT_SPEED, dt); }
        break;
      }
      case 'WORKING': {
        if (!r.workplace||r.workplace.hp<=0) { r.state='IDLE'; r.workplace=null; break; }
        const b=r.workplace, def=BLD_DEFS[b.type];
        if (b.type==='forester') {
          if (r.carrying && r.carrying.amount >= CFG.PRODUCTION_BATCH_SIZE) { r.state='HAULING'; break; }
          const tree=findForesterTree(r,b);
          if (tree) {
            r.chopTarget=tree; r.targetX=tree.x; r.targetY=tree.y; r.state='GOING_TO_CHOP';
            G.targetedTrees.add(tree);
          }
          else if (r.carrying) r.state='HAULING';
          break;
        }
        if (r.carrying) { r.state='HAULING'; break; }
        if (b.pendingOutput >= CFG.PRODUCTION_BATCH_SIZE && !b.outputHauler) {
          const batch = CFG.PRODUCTION_BATCH_SIZE;
          const storage = findNearestStorage(r, def.produces, {requireSpace:batch});
          if (!storage) break;
          b.pendingOutput -= batch;
          b.outputHauler = r;
          r.state = 'HAULING';
          r.carrying = { type:def.produces, amount:batch };
          r.carryingFrom = b;
          const sc=storage.center(); r.targetX=sc.x; r.targetY=sc.y;
        }
        break;
      }
      case 'HAULING': {
        if (!r.carrying) { r.carryingFrom=null; r.state='IDLE'; break; }
        const storage = findNearestStorage(r, r.carrying.type, {requireSpace:r.carrying.amount});
        if (!storage) break;
        const sc=storage.center(); r.targetX=sc.x; r.targetY=sc.y;
        if (Math.hypot(r.x-sc.x, r.y-sc.y) < storage.collisionRadius() + RESIDENT_RADIUS + 2) {
          const deposited = depositToStorage(storage, r.carrying.type, r.carrying.amount);
          r.carrying.amount -= deposited;
          if (r.carrying.amount > 0) break;
          const source = r.carryingFrom;
          if (source && source.outputHauler === r) source.outputHauler = null;
          r.carrying=null;
          r.carryingFrom=null;
          if (!eatAfterFinishingTask(r)) {
            r.state = (G.phase==='night'||G.phase==='dusk') ? 'IDLE'
              : r.workplace&&r.workplace.hp>0?'GOING_TO_WORK':'IDLE';
          }
        } else { moveViaFlow(r, r.targetX, r.targetY, CFG.RESIDENT_SPEED, dt); }
        break;
      }
      case 'GOING_TO_CHOP': {
        if (!r.chopTarget || !r.chopTarget.alive || !r.chopTarget.marked) { r.chopTarget = null; r.state = 'IDLE'; break; }
        const ctx = r.chopTarget.x, cty = r.chopTarget.y;
        if (Math.hypot(r.x - ctx, r.y - cty) < RESIDENT_RADIUS + 10) { r.state = 'CHOPPING'; r.chopTimer = 0; r.chopShakeBeat = -1; }
        else moveViaFlow(r, ctx, cty, CFG.RESIDENT_SPEED, dt);
        break;
      }
      case 'CHOPPING': {
        if (!r.chopTarget || !r.chopTarget.alive || !r.chopTarget.marked) { r.chopTarget = null; r.state = 'IDLE'; break; }
        r.chopTimer += dt;
        const shakeBeat=Math.floor(r.chopTimer/0.55);
        if (shakeBeat !== r.chopShakeBeat) {
          r.chopShakeBeat=shakeBeat;
          r.chopTarget.shakeUntil=G.totalTime+0.12;
        }
        if (r.chopTimer >= CFG.FORESTER_CHOP_TIME) {
          const carried = r.carrying ? r.carrying.amount : 0;
          const s2 = findNearestStorage(r, 'wood', {requireSpace:Math.max(1, CFG.PRODUCTION_BATCH_SIZE - carried)});
          if (!s2) { r.chopTimer = CFG.FORESTER_CHOP_TIME; break; }
          r.chopTarget.alive = false; r.chopTarget.marked = false;
          spawnParticles(r.chopTarget.x, r.chopTarget.y, '#8B4513', 5);
          if (!r.carrying) r.carrying = { type: 'wood', amount: 1 };
          else r.carrying.amount++;
          r.chopTarget = null;
          const nextTree = findForesterTree(r, r.workplace);
          r.state = !r.finishBeforeEating && nextTree && r.carrying.amount < CFG.PRODUCTION_BATCH_SIZE ? 'WORKING' : 'HAULING';
          if (r.state === 'HAULING') { const sc = s2.center(); r.targetX = sc.x; r.targetY = sc.y; }
        }
        break;
      }
      case 'GATHERING': {
        if (!r.buildTarget || r.buildTarget.hp <= 0) { if(r.buildTarget)r.buildTarget.assignedEngineer=null; r.buildTarget=null; r.state='IDLE'; break; }
        const need = neededMaterials(r.buildTarget);
        if (!need) { if(r.buildTarget.constructionTimer>0){r.state='CONSTRUCTING';}else{r.buildTarget.assignedEngineer=null;r.buildTarget=null;if(!eatAfterFinishingTask(r))r.state=(r.workplace&&r.workplace.hp>0)?'GOING_TO_WORK':'IDLE';} break; }
        const gs = findNearestStorage(r, need.type, {requireAmount:1});
        if (!gs) { r.buildTarget.assignedEngineer=null; r.buildTarget=null; r.state='IDLE'; break; }
        const gsc = gs.center(); r.targetX = gsc.x; r.targetY = gsc.y;
        if (Math.hypot(r.x-gsc.x, r.y-gsc.y) < gs.collisionRadius() + RESIDENT_RADIUS + 3) {
          const take = Math.min(5, need.amount, storedAmount(gs, need.type));
          if (take <= 0) break;
          if (!r.carrying) r.carrying = { type: need.type, amount: 0 };
          r.carrying.type = need.type; r.carrying.amount = take;
          withdrawFromStorage(gs, need.type, take);
          r.state = 'BUILDING'; break;
        }
        moveViaFlow(r, r.targetX, r.targetY, CFG.RESIDENT_SPEED, dt);
        break;
      }
      case 'BUILDING': {
        if (!r.buildTarget || r.buildTarget.hp <= 0) { if(r.buildTarget)r.buildTarget.assignedEngineer=null; r.buildTarget=null; r.state=r.carrying?'HAULING':'IDLE'; break; }
        const bc = r.buildTarget.center(); r.targetX = bc.x; r.targetY = bc.y;
        if (Math.hypot(r.x-bc.x, r.y-bc.y) < r.buildTarget.collisionRadius() + RESIDENT_RADIUS + 3) {
          if (r.carrying && r.carrying.amount > 0) {
            const t = r.carrying.type;
            r.buildTarget.constructDelivered[t] = (r.buildTarget.constructDelivered[t]||0) + r.carrying.amount;
            r.carrying = null;
            let done = true;
            for (const [k, v] of Object.entries(r.buildTarget.constructCost)) {
              if ((r.buildTarget.constructDelivered[k]||0) < v) { done = false; break; }
            }
            if (done) {
              r.buildTarget.blueprint = false;
              r.buildTarget.constructCost = null; r.buildTarget.constructDelivered = null;
              r.buildTarget.constructionTimer = BLD_DEFS[r.buildTarget.type].buildTime || 2;
              r.state = 'CONSTRUCTING';
              break;
            }
          }
          r.state = 'GATHERING'; break;
        }
        moveViaFlow(r, r.targetX, r.targetY, CFG.RESIDENT_SPEED, dt);
        break;
      }
      case 'CONSTRUCTING': {
        if (!r.buildTarget || r.buildTarget.hp <= 0 || r.buildTarget.constructionTimer <= 0) {
          if (r.buildTarget && r.buildTarget.hp>0) r.buildTarget.assignedEngineer = null;
          r.buildTarget = null;
          if (eatAfterFinishingTask(r)) break;
          const nbp = findNearestBlueprint(r);
          if (nbp) { r.buildTarget = nbp; nbp.assignedEngineer = r; r.state = 'GATHERING'; }
          else { r.state = 'IDLE'; }
          break;
        }
        const cc = r.buildTarget.center();
        if (Math.hypot(r.x-cc.x, r.y-cc.y) < r.buildTarget.collisionRadius() + RESIDENT_RADIUS + 5) {
          // Stay near building while timer counts down
        } else {
          moveViaFlow(r, cc.x, cc.y, CFG.RESIDENT_SPEED, dt);
        }
        break;
      }
      default: { // IDLE / PATROL
        if (G.phase==='night' || G.phase==='dusk') {
          const home = r.home || findNearestHome(r);
          if (home) { r.state='GOING_HOME'; r.targetX=home.center().x; r.targetY=home.center().y; }
          else r.state='SLEEPING';
          break;
        }
        if (r.workplace && r.workplace.hp>0) { r.state='GOING_TO_WORK'; break; }
        if (r.isEngineer) {
          if (r.buildTarget && r.buildTarget.hp>0 && r.buildTarget.constructionTimer>0) { r.state='CONSTRUCTING'; break; }
          const ebp = findNearestBlueprint(r);
          if (ebp) { r.buildTarget = ebp; ebp.assignedEngineer = r; r.state = 'GATHERING'; break; }
        }
        // Only idle non-engineers chop trees
        if (!r.isEngineer) {
          let treeTarget = null, treeDist = Infinity;
          for (const node of G.resourceNodes) {
            if (canResidentHandHarvest(node) && node.marked && !node.ownerForester) {
              // Skip trees already targeted by another villager
              if (G.targetedTrees.has(node)) continue;
              const d = Math.hypot(r.x - node.x, r.y - node.y);
              if (d < treeDist) { treeDist = d; treeTarget = node; }
            }
          }
          if (treeTarget) {
            r.state = 'GOING_TO_CHOP'; r.targetX = treeTarget.x; r.targetY = treeTarget.y; r.chopTarget = treeTarget;
            G.targetedTrees.add(treeTarget); break;
          }
        }
        r.state='PATROL';
        if ((r.patrolTimer-=dt)<=0) {
          r.patrolTimer=2+Math.random()*4;
          r.patrolAngle=Math.random()*Math.PI*2;
        }
        const pnx=r.x+Math.cos(r.patrolAngle)*30*dt;
        const pny=r.y+Math.sin(r.patrolAngle)*30*dt;
        const prs=resolveCollisions(r,pnx,pny);
        r.x=prs.x; r.y=prs.y;
        break;
      }
    }
  }

  // Population growth is manual via town hall recruitment
}

function updateBuildings(dt) {
  const activeWorkersByBuilding = new Map();
  const growingSaplingCount = new Map();
  for (const r of G.residents) {
    if (r.isGuard || r.state!=='WORKING' || !r.workplace) continue;
    if (!activeWorkersByBuilding.has(r.workplace)) activeWorkersByBuilding.set(r.workplace, []);
    activeWorkersByBuilding.get(r.workplace).push(r);
  }
  for (const node of G.resourceNodes) {
    if (!node.alive || node.type!=='sapling' || !node.ownerForester) continue;
    growingSaplingCount.set(node.ownerForester, (growingSaplingCount.get(node.ownerForester)||0)+1);
  }
  for (const b of G.buildings) {
    if (b.constructionTimer > 0) {
      const hasEng = G.residents.some(r => r.buildTarget === b && (r.state==='CONSTRUCTING'||r.state==='GATHERING'||r.state==='BUILDING'));
      if (hasEng) {
        b.constructionTimer -= dt;
        if (b.constructionTimer <= 0) {
          b.constructionTimer = 0; b.hp = b.maxHp; b.assignedEngineer = null;
          if (b.type==='house') G.maxPop += BLD_DEFS.house.popBonus;
          if (b.type==='farm') refreshFarmAdjacency();
        }
      }
    }
    if (b.upgrading) {
      b.upgradeProgress += dt/(BLD_DEFS[b.type].buildTime||15);
      if (b.upgradeProgress>=1) {
        b.upgradeProgress=0; b.upgrading=false;
        b.level++;
        b.maxHp=Math.floor(b.maxHp*1.3);
        b.hp=b.maxHp;
        if (b.type==='house') G.maxPop += 2;
        if (b.type==='town_hall') updateBuildingPanel();
      }
    }
    // Recruiting (工人 - 大本营)
    if (b.type==='town_hall' && b.recruitQueue > 0) {
      b.recruitProgress += dt / BLD_DEFS[b.type].recruitTime;
      if (b.recruitProgress >= 1) {
        b.recruitProgress = 0; b.recruitQueue--;
        if (G.residents.length < G.maxPop) {
          const hc = b.center();
          const nr = new Resident(hc.x+(Math.random()-0.5)*40, hc.y+(Math.random()-0.5)*40);
          assignHome(nr, findNearestHome(nr));
          G.residents.push(nr);
        }
      }
    }
    // Recruiting (守卫 - 大本营)
    if (b.type==='town_hall' && b.guardRecruitQueue > 0) {
      b.guardRecruitProgress += dt / BLD_DEFS[b.type].guardRecruitTime;
      if (b.guardRecruitProgress >= 1) {
        b.guardRecruitProgress = 0; b.guardRecruitQueue--;
        if (G.residents.length < G.maxPop) {
          const hc = b.center();
          const nr = new Resident(hc.x+(Math.random()-0.5)*40, hc.y+(Math.random()-0.5)*40);
          nr.isGuard = true;
          assignHome(nr, findNearestHome(nr));
          nr.state = (G.phase==='night'||G.phase==='dusk') ? 'GUARD_FIND_TOWER' : 'GUARD_SLEEPING';
          nr.hidden = (G.phase!=='night'&&G.phase!=='dusk');
          G.residents.push(nr);
        }
      }
    }
    // Production advances once per building, based on workers currently on site.
    const def = BLD_DEFS[b.type];
    if (def.cat === 'production' && b.type !== 'forester' && !b.blueprint && b.constructionTimer <= 0 && b.hp > 0) {
      const activeWorkers = activeWorkersByBuilding.get(b) || [];
      const efficiency = def.maxWorkers > 0 ? Math.min(1, activeWorkers.length / def.maxWorkers) : 0;
      if (efficiency > 0 && b.pendingOutput < CFG.PRODUCTION_BATCH_SIZE) {
        const healthEfficiency = activeWorkers.reduce((sum, r) => sum + starvationDebuff(r), 0) / activeWorkers.length;
        const adjacency = b.type === 'farm' ? getFarmAdjacencyBonus(b) : 1;
        b.productionProgress += dt / def.baseTime * efficiency * healthEfficiency * adjacency;
        if (b.productionProgress >= 1) {
          const sourceNode = def.sourceType ? findResourceNode(b, def.sourceType) : null;
          const hasSource = !def.sourceType || !!sourceNode;
          const hasInputs = !def.inputs || canAfford(def.inputs);
          if (hasSource && hasInputs) {
            if (def.inputs) payCost(def.inputs);
            b.productionProgress -= 1;
            b.pendingOutput++;
          } else {
            b.productionProgress = 1;
          }
        }
      }
    }
    // Forester: automatically refill empty cells with staggered saplings.
    if (b.type==='forester' && !b.blueprint && b.constructionTimer<=0 && b.hp>0) {
      const def=BLD_DEFS[b.type], growthSlots=foresterGrowthSlots(def);
      if ((growingSaplingCount.get(b)||0) < growthSlots) {
        b.foresterPlantCooldown-=dt;
        if (b.foresterPlantCooldown<=0) {
          const cell=findForesterPlantCell(b);
          if (cell) {
            const growDuration=CFG.FORESTER_SAPLING_GROW_TIME*(1+(Math.random()*2-1)*CFG.FORESTER_GROW_JITTER);
            G.resourceNodes.push({type:'sapling',col:cell.col,row:cell.row,x:cell.x,y:cell.y,hp:1,alive:true,marked:false,growTimer:growDuration,growDuration,ownerForester:b});
            growingSaplingCount.set(b,(growingSaplingCount.get(b)||0)+1);
            b.foresterPlantCooldown=foresterPlantInterval(def);
          } else {
            b.foresterPlantCooldown=1;
          }
        }
      }
    }
  }
  // Grow saplings
  for (const node of G.resourceNodes) {
    if (node.type==='sapling' && node.alive) {
      node.growTimer -= dt;
      if (node.growTimer <= 0) {
        node.type = 'tree'; node.marked = !!node.ownerForester;
      }
    }
  }
  G.resourceCleanupTimer += dt;
  if (G.resourceCleanupTimer >= 5) {
    G.resourceCleanupTimer = 0;
    G.resourceNodes = G.resourceNodes.filter(node => node.alive);
  }
  const prevLen = G.buildings.length;
  G.buildings = G.buildings.filter(b=>{
    if (b.hp<=0) {
      b.outputHauler = null;
      invalidateNavigation();
      if (b.type==='town_hall') { gameOver('大本营被摧毁！'); return false; }
      for (const r of G.residents) {
        if (r.workplace===b) { r.workplace=null; r.chopTarget=null; r.state=r.carrying?'HAULING':'IDLE'; }
        if (r.home===b) removeHome(r);
        if (r.assignedTower===b || r.manningTower===b) clearGuardPost(r,b);
        if (r.buildTarget===b) { r.buildTarget=null; r.state=r.carrying?'HAULING':'IDLE'; }
      }
      if (b.type==='forester') {
        for (const node of G.resourceNodes) if (node.ownerForester===b) { node.ownerForester=null; node.marked=false; }
      }
      if (b.type==='house') G.maxPop=Math.max(CFG.MAX_POP_BASE, G.maxPop-BLD_DEFS[b.type].popBonus-(b.level-1)*2);
      return false;
    }
    return true;
  });
  if (G.buildings.length !== prevLen) { refreshFarmAdjacency(); updateAllResourceTotals(); }
}

function updateParticles(dt) {
  for (const p of G.particles) { p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; }
  G.particles=G.particles.filter(p=>p.life>0);
}

function spawnParticles(x,y,color,count) {
  for (let i=0;i<count;i++)
    G.particles.push(new Particle(x,y,color,0.3+Math.random()*0.4));
}

function skipToNight() {
  G.phase = 'night'; G.dayTime = 0; G.enemies = []; G.enemySpawnQueue = []; G.enemySpawnTimer = 0;
  for (const r of G.residents) {
    if (r.isGuard) { r.state = 'GUARD_FIND_TOWER'; r.hidden = false; continue; }
    r.tired = CFG.TIRED_THRESHOLD;
    const home = r.home || findNearestHome(r);
    if (home) { r.state = 'GOING_HOME'; const hc = home.center(); r.targetX = hc.x; r.targetY = hc.y; if (!r.home) assignHome(r, home); }
  }

function unlockAll() {
  const th = G.townHall; if (!th) return;
  th.level = 5; th.maxHp = Math.floor(500 * Math.pow(1.3, 4)); th.hp = th.maxHp;
  G.maxPop = CFG.MAX_POP_BASE;
  for (const b of G.buildings) { if (b.type==='house') G.maxPop += BLD_DEFS.house.popBonus + (b.level-1)*2; }
  G.maxPop += 4 + (th.level-1)*4;
  updateBuildingPanel();

  const th = G.townHall; if (!th) return;
  th.level++; th.maxHp = Math.floor(th.maxHp * 1.3); th.hp = th.maxHp;
  G.maxPop += 4;
  updateBuildingPanel();
}
function skipToDay() {
  G.phase = 'day'; G.dayTime = 0; G.day++; G.enemies = []; G.enemySpawnQueue = []; G.enemySpawnTimer = 0;
  for (const r of G.residents) {
    if (r.isGuard) {
      r.state = 'GUARD_SLEEPING'; r.hidden = true; r.guardHP = r.guardMaxHP; r.manningTower = null;
    } else {
      r.state = 'IDLE'; r.tired = 0; r.hidden = false;
    }
  }
  showTimeIndicator('跳至第 '+G.day+' 天');
}

function settingsSetStatus(message, kind='normal') {

function renderShortcutSettings() {
  const container=document.getElementById('settings-shortcuts');
  container.innerHTML='';
  for (const action of SHORTCUT_ACTIONS) {
    const row=document.createElement('div');
    row.style.cssText='display:grid;grid-template-columns:1fr 110px;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #344038;';
    const label=document.createElement('span'); label.textContent=action.label;
    const button=document.createElement('button');
    button.type='button'; button.dataset.action=action.id;
    button.textContent=pendingShortcutAction===action.id?'请按按键...':shortcutLabel(gameSettings.shortcuts[action.id]);
    button.style.cssText='background:#2d3a32;color:#e5c66c;border:1px solid #536158;padding:6px 8px;cursor:pointer;font:inherit;';
    button.onclick=()=>beginShortcutCapture(action.id);
    row.append(label,button); container.appendChild(row);
  }
}
function openSettingsPanel() {
  pendingShortcutAction=null;
  document.getElementById('settings-overlay').style.display='flex';
  renderShortcutSettings();
  settingsSetStatus('修改会自动保存。');
}
function closeSettingsPanel() {
  pendingShortcutAction=null;
  document.getElementById('settings-overlay').style.display='none';
}
function beginShortcutCapture(actionId) {
  pendingShortcutAction=actionId;
  renderShortcutSettings();
  settingsSetStatus('按下新的按键，按 Esc 取消录制。');
}
function assignShortcut(actionId, code) {
  const conflict=Object.keys(gameSettings.shortcuts).find(id => id!==actionId && gameSettings.shortcuts[id]===code);
  if (conflict) gameSettings.shortcuts[conflict]=DEFAULT_SHORTCUTS[conflict];
  gameSettings.shortcuts[actionId]=code;
  saveGameSettings();
  pendingShortcutAction=null;
  renderShortcutSettings();
  const conflictText=conflict ? '；原快捷键已恢复默认。' : '。';
  settingsSetStatus('已保存“'+SHORTCUT_ACTIONS.find(a=>a.id===actionId).label+'”快捷键'+conflictText,'ok');
}
function resetShortcuts() {
  gameSettings.shortcuts={...DEFAULT_SHORTCUTS};
  saveGameSettings();
  pendingShortcutAction=null;
  renderShortcutSettings();
  settingsSetStatus('已恢复默认快捷键并自动保存。','ok');

function runShortcut(actionId) {
  if (actionId==='pause') togglePause();
  else if (actionId==='speedNormal') setSpeed(1);
  else if (actionId==='speed2') setSpeed(2);
  else if (actionId==='speed4') setSpeed(4);
  else if (actionId==='cancel') cancelCurrentAction();
  else if (actionId==='chop') toggleChopMode();
  else if (actionId==='unchop') toggleUnchopMode();
  else if (actionId==='settings') openSettingsPanel();
  else if (actionId==='config') openConfigPanel();

function cfgSelectItem() {
  const cat=document.getElementById('cfg-category').value;
  const key=document.getElementById('cfg-item').value;
  const container=document.getElementById('cfg-fields');
  let html='';
  if(cat==='unlocks') {
    const maxUnlockLevel=Math.max(10,...Object.values(BLD_DEFS).map(def=>def.unlock||1));
    html='<div style="color:#9aa7b8;line-height:18px;margin-bottom:4px;">为每种建筑选择首次可建造时所需的大本营等级。</div>';
    for(const [type,def] of Object.entries(BLD_DEFS)) {
      if(type==='town_hall') continue;
      let options='';
      for(let level=1;level<=maxUnlockLevel;level++) options+=`<option value="${level}" ${def.unlock===level?'selected':''}>大本营 ${level} 级</option>`;
      html+=`<div style="display:grid;grid-template-columns:1fr 132px;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid #344038;"><span>${def.name}</span><select id="cfg-unlock-${type}" style="background:#2a2a3a;color:#fff;border:1px solid #555;padding:4px 6px;border-radius:3px;font-size:12px;font-family:inherit;">${options}</select></div>`;
    }
  } else if(cat==='globals') {
    for(const f of GLOBAL_EDIT_FIELDS) {
      html+=`<div style="display:grid;grid-template-columns:120px 1fr 72px;align-items:center;gap:8px;"><label style="text-align:right;color:#aaa;">${f.label}</label><input id="cfg-global-${f.k}" type="number" min="${f.min}" step="${f.step}" value="${CFG[f.k]}" style="background:#2a2a3a;color:#fff;border:1px solid #555;padding:4px 6px;border-radius:3px;font-size:12px;font-family:inherit;"><span style="color:${f.restart?'#d5a85c':'#788898'}">${f.restart?'重开生效':f.unit}</span></div>`;
    }
  } else if(cat==='buildings'&&BLD_DEFS[key]) {
    const d=BLD_DEFS[key];
    for(const f of BLD_EDIT_FIELDS) {
      let val=d[f.k];
      if(f.k==='cost') val=Object.entries(d.cost||{}).map(([k,v])=>k+':'+v).join(',');
      html+=`<div style="display:flex;align-items:center;gap:8px;"><label style="width:100px;text-align:right;color:#aaa;">${f.label}</label><input id="cfg-fld-${f.k}" type="${f.type}" value="${val??''}" style="flex:1;background:#2a2a3a;color:#fff;border:1px solid #555;padding:4px 6px;border-radius:3px;font-size:12px;font-family:inherit;"></div>`;
    }
  } else if(cat==='initialResources') {
    const resources=[['FOOD','食物'],['WOOD','木材'],['STONE','石材'],['IRON','铁矿'],['INGOT','铁锭']];
    html='<div style="color:#9aa7b8;line-height:18px;margin-bottom:4px;">重新开始游戏时，大本营初始库存将使用以下数值。</div>';
    for(const [resKey,label] of resources) html+=`<div style="display:grid;grid-template-columns:120px 1fr;align-items:center;gap:8px;padding:4px 0;"><label style="text-align:right;color:#aaa;">${label}</label><input id="cfg-initial-${resKey}" type="number" min="0" step="1" value="${CFG['START_'+resKey]||0}" style="background:#2a2a3a;color:#fff;border:1px solid #555;padding:4px 6px;border-radius:3px;font-size:12px;font-family:inherit;"></div>`;
  }
  container.innerHTML=html;
}
function cfgApply() {
  const cat=document.getElementById('cfg-category').value;
  const key=document.getElementById('cfg-item').value;
  if(cat==='unlocks') {
    for(const [type,def] of Object.entries(BLD_DEFS)) {
      if(type==='town_hall') continue;
      const level=Number(document.getElementById('cfg-unlock-'+type)?.value);
      if(!Number.isInteger(level)||level<1) { cfgSetStatus(def.name+'的解锁等级无效','error'); return false; }
      def.unlock=level;
    }
    updateBuildingPanel();
    cfgSetStatus('大本营解锁规则已应用到当前游戏。','ok');
    return true;
  } else if(cat==='globals') {
    for(const f of GLOBAL_EDIT_FIELDS) {
      const value=Number(document.getElementById('cfg-global-'+f.k)?.value);
      if(!Number.isFinite(value)||value<f.min||(f.max!==undefined&&value>f.max)) { cfgSetStatus(f.label+'不是有效数值','error'); return false; }
      CFG[f.k]=value;
    }
    cfgSetStatus('全局数值已应用；标记“重开生效”的项目需要重新开始。','ok');
    return true;
  } else if(cat==='buildings'&&BLD_DEFS[key]) {
    const d=BLD_DEFS[key];
    const oldHp=d.hp;
    for(const f of BLD_EDIT_FIELDS) {
      const el=document.getElementById('cfg-fld-'+f.k);
      if(!el) continue;
      const raw=el.value.trim();
      if(f.type==='num') { if(raw!=='') d[f.k]=+raw; }
      else if(f.k==='cost') {
        d.cost={};
        if(raw) { for(const p of raw.split(/[,;\s]+/)) { const [k,v]=p.split(':'); if(k&&v!=null) d.cost[k.trim()]=+v; } }
      } else { d[f.k]=raw; }
    }
    for(const b of G.buildings) {
      if(b.type!==key) continue;
      b.maxHp=Math.floor(b.maxHp*(d.hp/oldHp));
      b.hp=Math.min(b.hp,b.maxHp);
    }
    const btn=document.querySelector(`.bld-btn[data-type="${key}"]`);
    if(btn&&d.cost) {
      const costDiv=btn.querySelector('.cost');
      if(costDiv) costDiv.textContent=Object.entries(d.cost).map(([k,v])=>v+({wood:'木',stone:'石',iron:'铁',ingot:'锭'}[k]||k)).join(' ');
    }
    updateBuildingPanel();
    showTimeIndicator(d.name+' 配置已应用');
    cfgSetStatus(d.name+'已应用到当前游戏。','ok');
  } else if (cat==='initialResources') {
    for(const resKey of ['FOOD','WOOD','STONE','IRON','INGOT']) {
      const value=Number(document.getElementById('cfg-initial-'+resKey)?.value);
      if(!Number.isFinite(value)||value<0) { cfgSetStatus(resKey+'初始资源不是有效数值','error'); return false; }
      CFG['START_'+resKey]=Math.floor(value);
    }
    cfgSetStatus('初始拥有资源已更新，重新开始游戏后生效。','ok');
  }
  return true;
}
function collectBalanceData() {
  const globals={};
  for(const field of GLOBAL_EDIT_FIELDS) globals[field.k]=CFG[field.k];
  for(const type of ['food','wood','stone','iron','ingot']) globals['START_'+type.toUpperCase()]=CFG['START_'+type.toUpperCase()];
  return {version:1, savedAt:new Date().toISOString(), globals, buildings:BLD_DEFS};
}
async function cfgSaveProject() {
  if(!cfgApply()) return;
  if(location.protocol==='file:') { cfgSetStatus('请通过 tools/dev-server.js 启动游戏后再保存到项目。','error'); return; }
  const button=document.getElementById('cfg-save-btn'); button.disabled=true; button.textContent='保存中...';
  try {
    const response=await fetch('/api/balance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(collectBalanceData())});
    const result=await response.json();
    if(!response.ok) throw new Error(result.error||'保存失败');
    cfgSetStatus('已写入 data/balance.json，刷新页面后仍会保留。','ok');
  } catch(error) {
    if (location.port!=='3010') cfgSetDevelopmentServerLink();
    else cfgSetStatus('保存失败：'+error.message,'error');
  }
  finally { button.disabled=false; button.textContent='保存到项目'; }
}
function assignEngineer() {
  const idle = G.residents.find(r => (r.state === 'IDLE' || r.state === 'PATROL') && !r.workplace && !r.isEngineer);
  if (idle) {
    idle.isEngineer = true;
    const bp = findNearestBlueprint(idle);
    if (bp) {
      idle.buildTarget = bp; bp.assignedEngineer = idle; idle.state = 'GATHERING';
    }
  }
}
function unassignEngineer() {
  const eng = G.residents.find(r => r.isEngineer);
  if (eng) {
    eng.isEngineer = false;
    if (eng.buildTarget) eng.buildTarget.assignedEngineer = null;
    eng.buildTarget = null; eng.state = eng.carrying ? 'HAULING' : 'IDLE';
  }
}
function addPop(n) {
  if (n > 0) {
    for (let i=0; i<n; i++) {
      const th = G.townHall;
      const r = new Resident(th.x+40+(Math.random()-0.5)*60, th.y+40+(Math.random()-0.5)*60);
      assignHome(r, findNearestHome(r)); G.residents.push(r);
    }
  } else {
    for (let i=0; i<-n && G.residents.length>0; i++) {
      const r = G.residents[G.residents.length-1];
      removeResident(r);
    }
  }
  G.popGrowthTimer = 0;
}

function gameOver(msg) {
  gameRunning = false;
  document.getElementById('gameover-msg').textContent = msg;
  document.getElementById('gameover-overlay').style.display = 'flex';
}
function restartGame() {
  G.buildings = []; G.residents = []; G.enemies = []; G.particles = [];
  G.resources = { food:CFG.START_FOOD, wood:CFG.START_WOOD, stone:CFG.START_STONE, iron:CFG.START_IRON, ingot:CFG.START_INGOT };
  G.day = 1; G.dayTime = 0; G.phase = 'day'; G.totalTime = 0;
  G.selectedBldType = null; G.selectedBuilding = null; G.placingMode = false; G.movingBuilding = null;
  G.maxPop = CFG.MAX_POP_BASE; G.popGrowthTimer = 0; G.enemySpawnQueue = []; G.enemySpawnTimer = 0;
  G.resourceCleanupTimer = 0; G.farmLinks = []; G.navigationRevision = 0; G.obstacleIndexRevision = -1;
  G.targetedTrees = new Set();
  G.dragging = false; G.dragMoved=false; gameRunning = true;
  setSpeed(1);
  G.infiniteResources = false;
  document.getElementById('gameover-overlay').style.display = 'none';
  initGame();
}
function update(dt) {
  if (!gameRunning) return;
  G.dt = dt;
  updateDayNight(dt);
  updateBuildings(dt);
  updateResidents(dt);
  if (G.phase==='night') {
    updateEnemies(dt);
    updateTowers(dt);
  }
  updateParticles(dt);
  G.tick++;
}

// ============================================================
// RENDERER
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const container = document.getElementById('game-container');
  const debugPanel = document.getElementById('debug-panel');
  const buildingPanel = document.getElementById('building-panel');
  const gap = 8 * 2; // gap between panels
  const availW = container.clientWidth - debugPanel.offsetWidth - buildingPanel.offsetWidth - gap;
  const availH = container.clientHeight;
  const w = Math.max(400, availW);
  const h = Math.max(300, availH);
  canvas.width = w;
  canvas.height = h;
  CFG.CANVAS_W = w;
  CFG.CANVAS_H = h;
}
window.addEventListener('resize', () => {
  clearTimeout(window._resizeTimer);
  window._resizeTimer = setTimeout(resizeCanvas, 200);
});
resizeCanvas();

function clampCamera() {
  const halfW = CFG.CANVAS_W / (2 * G.cam.zoom);
  const halfH = CFG.CANVAS_H / (2 * G.cam.zoom);
  if (halfW * 2 >= CFG.WORLD_W) {
    G.cam.x = CFG.WORLD_W / 2;
  } else {
    G.cam.x = clamp(G.cam.x, halfW, CFG.WORLD_W - halfW);
  }
  if (halfH * 2 >= CFG.WORLD_H) {
    G.cam.y = CFG.WORLD_H / 2;
  } else {
    G.cam.y = clamp(G.cam.y, halfH, CFG.WORLD_H - halfH);
  }
}

function getAlpha() {
  if (G.phase==='day') return 0;
  if (G.phase==='night') return 0.55;
  if (G.phase==='dusk') return 0.55*(G.dayTime/CFG.TRANSITION);
  return 0.55*(1-G.dayTime/CFG.TRANSITION);
}

function drawGroundDetails(vpL, vpT, vpR, vpB, nightAlpha) {
  if (G.cam.zoom < 0.48) return;
  ctx.strokeStyle = nightAlpha > 0.3 ? 'rgba(115,145,106,0.16)' : 'rgba(172,205,139,0.2)';
  ctx.lineWidth = 1 / G.cam.zoom;
  for (let col=vpL; col<=vpR; col++) {
    for (let row=vpT; row<=vpB; row++) {
      const hash = ((col * 73856093) ^ (row * 19349663)) >>> 0;
      if (hash % 5 !== 0) continue;
      const x = gridX(col) + 8 + (hash % 23);
      const y = gridY(row) + 12 + ((hash >>> 5) % 18);
      ctx.beginPath();
      ctx.moveTo(x, y + 3); ctx.lineTo(x - 2, y - 2);
      ctx.moveTo(x, y + 3); ctx.lineTo(x + 2, y - 3);
      ctx.stroke();
    }
  }
}

function render() {
  const alpha=getAlpha();
  ctx.clearRect(0,0,CFG.CANVAS_W,CFG.CANVAS_H);

  // Camera transform
  ctx.save();
  ctx.translate(CFG.CANVAS_W/2, CFG.CANVAS_H/2);
  ctx.scale(G.cam.zoom, G.cam.zoom);
  ctx.translate(-G.cam.x, -G.cam.y);

  // Ground
  ctx.fillStyle=lerpColor('#3d5a3d','#1a2a1a',alpha);
  ctx.fillRect(0,0,CFG.WORLD_W,CFG.WORLD_H);

  const vpW = CFG.CANVAS_W / G.cam.zoom, vpH = CFG.CANVAS_H / G.cam.zoom;
  const viewLeft = G.cam.x - vpW/2, viewTop = G.cam.y - vpH/2;
  const viewRight = G.cam.x + vpW/2, viewBottom = G.cam.y + vpH/2;
  const vpL = Math.max(0, Math.floor(viewLeft / CFG.CELL));
  const vpT = Math.max(0, Math.floor(viewTop / CFG.CELL));
  const vpR = Math.min(CFG.WORLD_COLS - 1, Math.ceil(viewRight / CFG.CELL));
  const vpB = Math.min(CFG.WORLD_ROWS - 1, Math.ceil(viewBottom / CFG.CELL));
  const inView = (x,y,pad=80) => x>=viewLeft-pad && x<=viewRight+pad && y>=viewTop-pad && y<=viewBottom+pad;

  drawGroundDetails(vpL, vpT, vpR, vpB, alpha);

  // Floor overlay (bottom layer, viewport-culled)
  if (G.floorMask) {
    ctx.fillStyle = '#9a8a6a';
    for (let c = vpL; c <= vpR; c++)
      for (let r = vpT; r <= vpB; r++)
        if (G.floorMask[c + r * CFG.WORLD_COLS])
          ctx.fillRect(gridX(c), gridY(r), CFG.CELL, CFG.CELL);
  }

  // Grid
  ctx.strokeStyle=alpha>0.3?'rgba(255,255,255,0.04)':'rgba(255,255,255,0.08)';
  ctx.lineWidth=1/G.cam.zoom;
  for (let c=vpL;c<=vpR+1;c++) { ctx.beginPath(); ctx.moveTo(c*CFG.CELL,vpT*CFG.CELL); ctx.lineTo(c*CFG.CELL,(vpB+1)*CFG.CELL); ctx.stroke(); }
  for (let r=vpT;r<=vpB+1;r++) { ctx.beginPath(); ctx.moveTo(vpL*CFG.CELL,r*CFG.CELL); ctx.lineTo((vpR+1)*CFG.CELL,r*CFG.CELL); ctx.stroke(); }

  // Moving ghost
  if (G.placingMode && G.movingBuilding && G.hoveredCell) {
    const b=G.movingBuilding, def=BLD_DEFS[b.type];
    const wp=screenToWorld(G.mouseX, G.mouseY);
    const cp=pixelCenterPlacement(b.type, wp.x, wp.y);
    const ok=canPlaceBuilding(b.type, cp.col, cp.row, b);
    ctx.fillStyle=ok?'rgba(0,255,0,0.35)':'rgba(255,0,0,0.35)';
    ctx.fillRect(gridX(cp.col),gridY(cp.row),def.sz[0]*CFG.CELL,def.sz[1]*CFG.CELL);
    ctx.globalAlpha=0.5; drawBuilding(b,gridX(cp.col),gridY(cp.row)); ctx.globalAlpha=1;
  }

  // Buildings
  for (const b of G.buildings) {
    if (inView(b.center().x,b.center().y,100) && !(G.placingMode && b===G.movingBuilding)) drawBuilding(b,b.x,b.y);
  }

  // Farm links are cached when the layout changes.
  for (const [a,b] of G.farmLinks) {
    const c1 = a.center(), c2 = b.center();
    ctx.strokeStyle = 'rgba(181,220,104,0.5)'; ctx.lineWidth = 2 / G.cam.zoom;
    ctx.setLineDash([6, 4]);
    ctx.beginPath(); ctx.moveTo(c1.x, c1.y); ctx.lineTo(c2.x, c2.y); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Residents
  for (const r of G.residents) if (!r.hidden && inView(r.x,r.y)) drawResident(r);

  // Enemies
  for (const e of G.enemies) if(e.alive && inView(e.x,e.y)) drawEnemy(e);

  // Resource nodes
  for (const node of G.resourceNodes) {
    if (!node.alive || !inView(node.x,node.y)) continue;
    drawResourceNode(node);
  }

  // Chop selection box
  if ((G.chopMode || G.unchopMode) && G.chopStartX >= 0 && G.chopEndX >= 0) {
    const sx = Math.min(G.chopStartX, G.chopEndX), sy = Math.min(G.chopStartY, G.chopEndY);
    const ex = Math.max(G.chopStartX, G.chopEndX), ey = Math.max(G.chopStartY, G.chopEndY);
    ctx.fillStyle = 'rgba(255,255,255,0.15)'; ctx.fillRect(gridX(sx), gridY(sy), (ex - sx + 1) * CFG.CELL, (ey - sy + 1) * CFG.CELL);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.setLineDash([4, 4]); ctx.strokeRect(gridX(sx), gridY(sy), (ex - sx + 1) * CFG.CELL, (ey - sy + 1) * CFG.CELL); ctx.setLineDash([]);
  }

  // Particles
  for (const p of G.particles) {
    if (!inView(p.x,p.y)) continue;
    ctx.fillStyle=p.color; ctx.globalAlpha=p.life/p.maxLife;
    ctx.beginPath(); ctx.arc(p.x,p.y,3,0,Math.PI*2); ctx.fill(); ctx.globalAlpha=1;
  }

  // Selection outline & range (world space)
  if (G.selectedBuilding && !G.placingMode) {
    const b=G.selectedBuilding;
    const def=BLD_DEFS[b.type];
    if (b.type==='arrow_tower' || b.type==='auto_arrow_tower') {
      const center=b.center();
      ctx.fillStyle='rgba(255,255,255,0.08)';
      ctx.beginPath(); ctx.arc(center.x, center.y, def.range, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,0.3)'; ctx.lineWidth=1/G.cam.zoom;
      ctx.beginPath(); ctx.arc(center.x, center.y, def.range, 0, Math.PI*2); ctx.stroke();
    }
    if (b.type==='forester') {
      const center=b.center();
      const fr = (def.foresterRadius||4) * CFG.CELL;
      ctx.fillStyle='rgba(100,255,100,0.06)';
      ctx.beginPath(); ctx.arc(center.x, center.y, fr, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(100,255,100,0.3)'; ctx.lineWidth=1/G.cam.zoom;
      ctx.setLineDash([3,6]);
      ctx.beginPath(); ctx.arc(center.x, center.y, fr, 0, Math.PI*2); ctx.stroke();
      ctx.setLineDash([]);
    }
    if (def.sourceType) {
      const center=b.center(), radius=(def.sourceRadius||3)*CFG.CELL;
      ctx.fillStyle='rgba(225,190,105,0.05)'; ctx.beginPath(); ctx.arc(center.x,center.y,radius,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(225,190,105,0.42)'; ctx.lineWidth=1/G.cam.zoom; ctx.setLineDash([5,5]);
      ctx.beginPath(); ctx.arc(center.x,center.y,radius,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
    }
    ctx.strokeStyle='#ffd700'; ctx.lineWidth=2/G.cam.zoom; ctx.setLineDash([4,4]);
    ctx.strokeRect(b.x-2,b.y-2,b.size[0]*CFG.CELL+4,b.size[1]*CFG.CELL+4);
    ctx.setLineDash([]);
  }

  // Placement hover (rendered on top of everything)
  if (G.hoveredCell && !G.placingMode && G.selectedBldType) {
    const def=BLD_DEFS[G.selectedBldType];
    const wp=screenToWorld(G.mouseX, G.mouseY);
    const cp=pixelCenterPlacement(G.selectedBldType, wp.x, wp.y);
    const ok= G.selectedBldType==='floor' ? true : canPlaceBuilding(G.selectedBldType, cp.col, cp.row);
    if (def.sourceType) {
      const pcx=gridX(cp.col)+def.sz[0]*CFG.CELL/2, pcy=gridY(cp.row)+def.sz[1]*CFG.CELL/2;
      ctx.strokeStyle=ok?'rgba(225,205,120,0.6)':'rgba(255,105,90,0.65)'; ctx.lineWidth=1/G.cam.zoom; ctx.setLineDash([5,5]);
      ctx.beginPath(); ctx.arc(pcx,pcy,(def.sourceRadius||3)*CFG.CELL,0,Math.PI*2); ctx.stroke(); ctx.setLineDash([]);
    }
    ctx.fillStyle=ok?'rgba(0,255,0,0.25)':'rgba(255,0,0,0.25)';
    ctx.fillRect(gridX(cp.col),gridY(cp.row),def.sz[0]*CFG.CELL,def.sz[1]*CFG.CELL);
  }

  ctx.restore();

  drawCommandCursor();

  // Night overlay (screen space)
  if (alpha>0) { ctx.fillStyle=`rgba(10,10,40,${alpha})`; ctx.fillRect(0,0,CFG.CANVAS_W,CFG.CANVAS_H); }

  // Clock (screen space)
  drawClock();
}

function drawCommandCursor() {
  if (!G.hoveredCell || (!G.chopMode && !G.unchopMode)) return;
  const x=G.mouseX+15, y=G.mouseY+15;
  ctx.save();
  ctx.fillStyle='rgba(13,19,15,0.82)'; ctx.beginPath(); ctx.arc(x,y,11,0,Math.PI*2); ctx.fill();
  if (G.chopMode) {
    ctx.strokeStyle='#bf8146'; ctx.lineWidth=2.4; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x-4,y+6); ctx.lineTo(x+5,y-5); ctx.stroke();
    ctx.fillStyle='#d6dfd8'; ctx.beginPath(); ctx.moveTo(x+1,y-7); ctx.quadraticCurveTo(x+9,y-8,x+8,y); ctx.lineTo(x+3,y+3); ctx.closePath(); ctx.fill();
  } else {
    ctx.strokeStyle='#e77869'; ctx.lineWidth=2.6; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x-5,y-5); ctx.lineTo(x+5,y+5); ctx.moveTo(x+5,y-5); ctx.lineTo(x-5,y+5); ctx.stroke();
  }
  ctx.restore();
}

function drawResourceNode(node) {
  if (node.type === 'sapling') {
    ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.beginPath(); ctx.ellipse(node.x,node.y+2,5,2,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#725036'; ctx.fillRect(node.x-1,node.y-5,2,8);
    ctx.fillStyle='#70a955'; ctx.beginPath(); ctx.arc(node.x-2,node.y-6,3,0,Math.PI*2); ctx.arc(node.x+2,node.y-7,3,0,Math.PI*2); ctx.fill();
    const growProgress = clamp(1-(node.growTimer/(node.growDuration||CFG.FORESTER_SAPLING_GROW_TIME)),0,1);
    ctx.strokeStyle='rgba(235,240,220,0.7)'; ctx.lineWidth=1/G.cam.zoom;
    ctx.beginPath(); ctx.arc(node.x,node.y-6,6,-Math.PI/2,-Math.PI/2+Math.PI*2*growProgress); ctx.stroke();
    return;
  }
  if (node.type === 'tree') {
    ctx.fillStyle='rgba(0,0,0,0.2)'; ctx.beginPath(); ctx.ellipse(node.x,node.y+7,11,4,0,0,Math.PI*2); ctx.fill();
    ctx.save();
    ctx.translate(node.x,node.y+7);
    if (node.shakeUntil > G.totalTime) ctx.rotate(Math.sin(G.totalTime*42)*0.07);
    ctx.translate(-node.x,-node.y-7);
    ctx.fillStyle='#65442d'; ctx.fillRect(node.x-3,node.y-7,6,14);
    ctx.fillStyle='#285d3c'; ctx.beginPath(); ctx.arc(node.x-5,node.y-10,7,0,Math.PI*2); ctx.arc(node.x+5,node.y-11,8,0,Math.PI*2); ctx.arc(node.x,node.y-17,9,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#3f7b4d'; ctx.beginPath(); ctx.arc(node.x-2,node.y-17,5,0,Math.PI*2); ctx.fill();
    if (node.marked) {
      ctx.strokeStyle='#f4d77b'; ctx.lineWidth=1.5/G.cam.zoom; ctx.setLineDash([3,3]);
      ctx.strokeRect(node.x-12,node.y-27,24,36); ctx.setLineDash([]);
    }
    ctx.restore();
    return;
  }
  const cx=node.x+CFG.CELL/2, cy=node.y+CFG.CELL/2;
  ctx.fillStyle='rgba(0,0,0,0.22)'; ctx.beginPath(); ctx.ellipse(cx,cy+10,15,6,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(cx-14,cy+8); ctx.lineTo(cx-11,cy-7); ctx.lineTo(cx-2,cy-14);
  ctx.lineTo(cx+10,cy-8); ctx.lineTo(cx+15,cy+7); ctx.lineTo(cx+5,cy+12); ctx.closePath();
  ctx.fillStyle=node.type==='stone'?'#7c8580':'#765a50'; ctx.fill();
  ctx.strokeStyle=node.type==='stone'?'#aeb7b1':'#a87655'; ctx.lineWidth=1.5/G.cam.zoom; ctx.stroke();
  ctx.strokeStyle=node.type==='stone'?'rgba(225,235,228,0.45)':'rgba(224,133,73,0.75)';
  ctx.beginPath(); ctx.moveTo(cx-7,cy+4); ctx.lineTo(cx-1,cy-7); ctx.lineTo(cx+7,cy-2); ctx.stroke();
}

function drawBuilding(b, x, y) {
  const def=BLD_DEFS[b.type], w=def.sz[0]*CFG.CELL, h=def.sz[1]*CFG.CELL, cx=x+w/2, cy=y+h/2;
  const cr = b.collisionRadius();
  ctx.fillStyle='rgba(255,255,255,0.04)'; ctx.fillRect(x, y, w, h);
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1; ctx.setLineDash([3,6]); ctx.strokeRect(x+1,y+1,w-2,h-2); ctx.setLineDash([]);
  if (b.blueprint) ctx.globalAlpha = 0.5;
  ctx.save(); ctx.shadowColor='rgba(0,0,0,0.42)'; ctx.shadowBlur=7/G.cam.zoom; ctx.shadowOffsetY=3/G.cam.zoom;
  ctx.fillStyle=buildingColor(b.type); ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI*2); ctx.fill(); ctx.restore();
  ctx.strokeStyle='rgba(238,238,220,0.5)'; ctx.lineWidth=1.5/G.cam.zoom; ctx.beginPath(); ctx.arc(cx, cy, cr, 0, Math.PI*2); ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,0.13)'; ctx.lineWidth=4/G.cam.zoom; ctx.beginPath(); ctx.arc(cx-2,cy-2,Math.max(2,cr-5),Math.PI*1.05,Math.PI*1.8); ctx.stroke();
  drawBuildingDetails(b,cx,cy,cr);
  if (!b.blueprint && def.needsManning) {
    const post = b.guardSpot();
    const guard = b.assignedGuard;
    ctx.fillStyle = guard ? 'rgba(112,170,238,0.9)' : 'rgba(220,220,190,0.32)';
    ctx.beginPath(); ctx.arc(post.x, post.y, guard ? 3 : 2, 0, Math.PI*2); ctx.fill();
  }
  if (b.blueprint) ctx.globalAlpha = 1;
  if (b.hp<b.maxHp && !b.blueprint && b.constructionTimer <= 0) {
    const bw=w-8, bh=4;
    ctx.fillStyle='#333'; ctx.fillRect(x+4,y-8,bw,bh);
    ctx.fillStyle=b.hp/b.maxHp>0.5?'#4a4':'#a44'; ctx.fillRect(x+4,y-8,bw*(b.hp/b.maxHp),bh);
  }
  if (b.blueprint) {
    ctx.fillStyle='#fff'; ctx.font='700 9px Arial,sans-serif'; ctx.textAlign='center'; ctx.fillText(def.icon,cx,cy+3);
    const totalCost = Object.values(b.constructCost||{}).reduce((a,v)=>a+v,0);
    const totalDone = Object.values(b.constructDelivered||{}).reduce((a,v)=>a+v,0);
    const ratio = totalCost > 0 ? totalDone / totalCost : 0;
    const barW = w - 8, barH = 5;
    ctx.fillStyle = '#333'; ctx.fillRect(x+4, y+h-12, barW, barH);
    ctx.fillStyle = '#4af'; ctx.fillRect(x+4, y+h-12, barW * ratio, barH);
    ctx.fillStyle = '#fff'; ctx.font = '7px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(Math.floor(totalDone)+'/'+totalCost, cx, y+h-7);
  }
  // Construction progress (bottom-to-top fill)
  if (!b.blueprint && b.constructionTimer > 0) {
    const bt = BLD_DEFS[b.type].buildTime || 2;
    const prog = 1 - b.constructionTimer / bt;
    ctx.fillStyle = 'rgba(100,180,255,0.5)';
    ctx.fillRect(x, y + h*(1-prog), w, h*prog);
    ctx.fillStyle = '#fff'; ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(Math.floor(prog*100)+'%', cx, cy);
  }
  if (!b.blueprint && b.constructionTimer <= 0) {
    ctx.fillStyle='rgba(245,240,218,0.88)'; ctx.font='700 8px Arial,sans-serif'; ctx.textAlign='center'; ctx.fillText(def.icon,cx,cy+3);
  }

  if (!b.blueprint && b.constructionTimer<=0 && def.cat==='production' && b.type!=='forester') {
    ctx.strokeStyle='rgba(226,200,120,0.75)'; ctx.lineWidth=2/G.cam.zoom;
    ctx.beginPath(); ctx.arc(cx,cy,cr+4,-Math.PI/2,-Math.PI/2+Math.PI*2*clamp(b.productionProgress,0,1)); ctx.stroke();
    let warning='';
    if (def.sourceType && !findResourceNode(b,def.sourceType)) warning='缺矿';
    else if (def.inputs && !canAfford(def.inputs)) warning='缺料';
    else if (b.pendingOutput >= CFG.PRODUCTION_BATCH_SIZE && !findNearestStorage(b.center(),def.produces,{requireSpace:CFG.PRODUCTION_BATCH_SIZE})) warning='仓满';
    if (warning) {
      ctx.fillStyle='rgba(80,24,18,0.9)'; ctx.fillRect(cx-13,y-9,26,10);
      ctx.fillStyle='#ffd0b8'; ctx.font='8px sans-serif'; ctx.textAlign='center'; ctx.fillText(warning,cx,y-1);
    }
  }
  // Storage capacity bar (per-building) - skip for blueprints
  if (!b.blueprint && isStorage(b.type) && def.capacity && b.type!=='town_hall') {
    const stored = Object.values(b.stored||{}).reduce((a,v)=>a+v, 0);
    const cap = def.capacity;
    const ratio = cap > 0 ? Math.min(1, stored / cap) : 0;
    const barW = w - 8, barH = 6;
    ctx.fillStyle = '#333'; ctx.fillRect(x+4, y+h-12, barW, barH);
    ctx.fillStyle = ratio > 0.8 ? '#f84' : ratio > 0.5 ? '#fa4' : '#4a4';
    ctx.fillRect(x+4, y+h-12, barW * ratio, barH);
    ctx.fillStyle = '#fff'; ctx.font = '7px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(`${stored}/${cap}`, cx, y+h-7);
  }

  if (!b.blueprint && b.upgrading) { ctx.fillStyle='rgba(255,255,0,0.5)'; ctx.beginPath(); ctx.arc(cx,cy,cr,-Math.PI/2,-Math.PI/2+Math.PI*2*b.upgradeProgress); ctx.lineTo(cx,cy); ctx.fill(); }
  if (!b.blueprint && b.type==='town_hall' && b.recruitQueue>0) { ctx.fillStyle='rgba(100,255,100,0.4)'; ctx.beginPath(); ctx.arc(cx,cy,cr-3,-Math.PI/2,-Math.PI/2+Math.PI*2*b.recruitProgress); ctx.lineTo(cx,cy); ctx.fill(); }
  if (!b.blueprint && b.type==='town_hall' && b.guardRecruitQueue>0) { ctx.fillStyle='rgba(100,150,255,0.4)'; ctx.beginPath(); ctx.arc(cx,cy,cr,-Math.PI/2,-Math.PI/2+Math.PI*2*b.guardRecruitProgress); ctx.lineTo(cx,cy); ctx.fill(); }
  if (!b.blueprint && b.constructionTimer <= 0 && def.maxWorkers>0) {
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(x+2,y+h-14,w-4,12);
    ctx.fillStyle='#fff'; ctx.font='9px sans-serif'; ctx.textAlign='center';
    ctx.fillText(`W ${b.assignedWorkers}/${def.maxWorkers}`,cx,cy+h/2-6);
  }
  if (!b.blueprint && b.type==='arrow_tower') {
    const guardAssigned = !!b.assignedGuard;
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(x+2,y+h-14,w-4,12);
    ctx.fillStyle=guardAssigned?'#e5c66c':'#aeb8ad'; ctx.font='8px sans-serif'; ctx.textAlign='center';
    ctx.fillText(`G ${guardAssigned?'1':'0'}/1`,cx,cy+h/2-6);
  }
  if (!b.blueprint && b.type==='house') {
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(x+2,y+h-14,w-4,12);
    ctx.fillStyle='#fff'; ctx.font='9px sans-serif'; ctx.textAlign='center';
    ctx.fillText(`H ${b.residentCount}/${houseCapacity(b)}`,cx,cy+h/2-6);
  }
  if (!b.blueprint && def.cat==='production' && b.pendingOutput > 0) {
    ctx.fillStyle='rgba(255,214,126,0.92)'; ctx.font='700 8px Arial,sans-serif'; ctx.textAlign='center';
    ctx.fillText(`OUT ${b.pendingOutput}/${CFG.PRODUCTION_BATCH_SIZE}`, cx, y-4);
  }
  if (!b.blueprint) {
    const ts=b.stored?Object.values(b.stored).reduce((a,c)=>a+c,0):0;
    if (ts>0) { ctx.fillStyle='rgba(255,200,0,0.9)'; ctx.font='700 8px Arial,sans-serif'; ctx.fillText(`BOX ${ts}`,cx,y-4); }
  }
}

function drawBuildingDetails(b,cx,cy,cr) {
  const t=b.type;
  ctx.save(); ctx.lineWidth=1.2/G.cam.zoom;
  if (t==='farm') {
    ctx.strokeStyle='rgba(232,220,139,0.6)';
    for (let i=-2;i<=2;i++) { ctx.beginPath(); ctx.moveTo(cx-cr*0.62,cy+i*5); ctx.lineTo(cx+cr*0.62,cy+i*5); ctx.stroke(); }
  } else if (t==='forester') {
    ctx.fillStyle='rgba(16,64,37,0.7)';
    for (const [ox,oy,s] of [[-11,3,7],[0,-8,9],[11,4,7]]) { ctx.beginPath(); ctx.arc(cx+ox,cy+oy,s,0,Math.PI*2); ctx.fill(); }
  } else if (t==='town_hall') {
    ctx.fillStyle='rgba(52,42,31,0.55)'; ctx.fillRect(cx-18,cy-10,36,22);
    ctx.fillStyle='#d2b969'; ctx.beginPath(); ctx.moveTo(cx-22,cy-10); ctx.lineTo(cx,cy-24); ctx.lineTo(cx+22,cy-10); ctx.closePath(); ctx.fill();
    ctx.strokeStyle='#eadb9b'; ctx.beginPath(); ctx.moveTo(cx,cy-24); ctx.lineTo(cx,cy-34); ctx.stroke();
    ctx.fillStyle='#a94c3d'; ctx.fillRect(cx,cy-34,10,6);
  } else if (t==='house') {
    ctx.fillStyle='rgba(43,35,28,0.55)'; ctx.fillRect(cx-15,cy-8,30,20);
    ctx.fillStyle='#b96c4b'; ctx.beginPath(); ctx.moveTo(cx-19,cy-8); ctx.lineTo(cx,cy-21); ctx.lineTo(cx+19,cy-8); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#f0cf7b'; ctx.fillRect(cx-9,cy-2,5,6); ctx.fillRect(cx+4,cy-2,5,6);
  } else if (t.includes('storage')) {
    ctx.strokeStyle='rgba(235,220,174,0.55)'; ctx.strokeRect(cx-15,cy-13,30,26);
    ctx.beginPath(); ctx.moveTo(cx-15,cy); ctx.lineTo(cx+15,cy); ctx.moveTo(cx,cy-13); ctx.lineTo(cx,cy+13); ctx.stroke();
  } else if (t==='quarry'||t==='iron_mine') {
    ctx.fillStyle=t==='quarry'?'rgba(210,218,211,0.45)':'rgba(207,112,67,0.5)';
    for (const [ox,oy,s] of [[-10,6,8],[2,-5,10],[12,8,7]]) { ctx.beginPath(); ctx.arc(cx+ox,cy+oy,s,0,Math.PI*2); ctx.fill(); }
  } else if (t==='smelter') {
    ctx.fillStyle='rgba(48,37,30,0.7)'; ctx.fillRect(cx-15,cy-8,30,21); ctx.fillRect(cx+7,cy-23,8,18);
    ctx.fillStyle='rgba(255,190,70,0.8)'; ctx.beginPath(); ctx.arc(cx-4,cy+2,7,0,Math.PI*2); ctx.fill();
  } else if (t==='arrow_tower'||t==='auto_arrow_tower') {
    ctx.strokeStyle='rgba(240,226,185,0.65)'; ctx.beginPath(); ctx.arc(cx,cy,cr*0.55,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-cr*0.65,cy); ctx.lineTo(cx+cr*0.65,cy); ctx.moveTo(cx,cy-cr*0.65); ctx.lineTo(cx,cy+cr*0.65); ctx.stroke();
  } else if (t==='wall') {
    ctx.strokeStyle='rgba(238,238,225,0.38)';
    for (let yy=-6;yy<=6;yy+=6) { ctx.beginPath(); ctx.moveTo(cx-cr*0.65,cy+yy); ctx.lineTo(cx+cr*0.65,cy+yy); ctx.stroke(); }
    ctx.beginPath(); ctx.moveTo(cx,cy-12); ctx.lineTo(cx,cy-6); ctx.moveTo(cx-7,cy-6); ctx.lineTo(cx-7,cy); ctx.moveTo(cx+7,cy); ctx.lineTo(cx+7,cy+6); ctx.stroke();
  }
  ctx.restore();
}

function buildingColor(t) {

}

function drawResidentAxeIcon(x, y) {

  ctx.beginPath(); ctx.moveTo(x-3,y+5); ctx.lineTo(x+4,y-5); ctx.stroke();
  ctx.fillStyle='#c7d1cb'; ctx.beginPath(); ctx.moveTo(x+1,y-6); ctx.quadraticCurveTo(x+8,y-7,x+7,y); ctx.lineTo(x+3,y+2); ctx.closePath(); ctx.fill();

}
function drawResidentFoodIcon(x, y) {

}
function drawResidentSleepIcon(x, y) {

  ctx.fillStyle='#d7e7ef'; ctx.beginPath(); ctx.arc(x+4,y+4,1,0,Math.PI*2); ctx.fill();

function drawResident(r) {
  const bodyColor = r.isGuard
    ? {GUARD_SLEEPING:'#6688aa',GUARD_FIND_TOWER:'#ff6644',GUARD_MANNING:'#4488ff',
       GUARD_FIGHTING:'#ff3333',GUARD_RETURNING:'#ff8800',GUARD_HEALING:'#44cc44'}[r.state]||'#ff6644'
    : !r.home && (G.phase==='night'||G.phase==='dusk')?'#ff4444'
    :r.state==='SLEEPING'||r.state==='GOING_HOME'?'#8899cc'
    :r.state==='GOING_TO_EAT'||r.state==='EATING'?'#ffcc44'
    :r.state==='HAULING'?'#44ccff'
    :r.state==='WORKING'||r.state==='GOING_TO_WORK'?'#44cc88'
	    :r.state==='GATHERING'?'#ff8800'
	    :r.state==='BUILDING'?'#ff6600'
		    :r.state==='CONSTRUCTING'?'#cc6600'
	    :r.isEngineer?'#ff8800'
    :'#aaaaaa';
  const cr = RESIDENT_RADIUS;
  ctx.fillStyle='rgba(255,255,255,0.15)'; ctx.beginPath(); ctx.arc(r.x,r.y,cr,0,Math.PI*2); ctx.fill();
  ctx.save(); ctx.translate(r.x, r.y + cr/2 - 10); ctx.scale(0.5, 1.0);
  ctx.fillStyle=bodyColor; ctx.beginPath(); ctx.arc(0,0,10,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.5)'; ctx.lineWidth=0.8; ctx.stroke();
  ctx.restore();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(r.x+2, r.y-14, 1.5, 0, Math.PI*2); ctx.fill();
  if (r.carrying) { ctx.fillStyle=rc(r.carrying.type); ctx.beginPath(); ctx.arc(r.x, r.y-22, 3, 0, Math.PI*2); ctx.fill(); }
  if (r.isGuard) {
    // Compact shield silhouette above guards.
    ctx.fillStyle='#e6d49a'; ctx.beginPath(); ctx.moveTo(r.x,r.y-29); ctx.lineTo(r.x+5,r.y-26); ctx.lineTo(r.x+4,r.y-20); ctx.lineTo(r.x,r.y-17); ctx.lineTo(r.x-4,r.y-20); ctx.lineTo(r.x-5,r.y-26); ctx.closePath(); ctx.fill();
    // Guard HP bar
    const gbw = 14, gbh = 2;
    ctx.fillStyle = '#333'; ctx.fillRect(r.x - gbw/2, r.y + cr + 4, gbw, gbh);
    const gpct = Math.max(0, r.guardHP / r.guardMaxHP);
    ctx.fillStyle = gpct > 0.5 ? '#4a4' : gpct > 0.25 ? '#fa4' : '#f44';
    ctx.fillRect(r.x - gbw/2, r.y + cr + 4, gbw * gpct, gbh);
  }
  const iconY=r.y-31;
  if (r.hunger>CFG.HUNGER_THRESHOLD*0.8) drawResidentFoodIcon(r.x,iconY);
  else if (r.state==='GOING_HOME' || r.state==='SLEEPING') drawResidentSleepIcon(r.x,iconY);
  else if (!r.workplace && r.state==='GOING_TO_CHOP') drawResidentAxeIcon(r.x,iconY);
  if (r.starvationDays >= 2) { ctx.fillStyle='#f07162'; ctx.font='700 9px Arial,sans-serif'; ctx.fillText('!',r.x-5,r.y-24); }
  else if (r.starvationDays >= 1) { ctx.fillStyle='#e1a056'; ctx.font='700 9px Arial,sans-serif'; ctx.fillText('!',r.x-5,r.y-22); }
}

function drawEnemy(e) {
  const a=Math.atan2(e.targetY-e.y,e.targetX-e.x), s=e.size;
  ctx.save(); ctx.translate(e.x,e.y); ctx.rotate(a);
  ctx.fillStyle=e.attacking?'#ff4444':'#ff6633';
  ctx.beginPath(); ctx.moveTo(s,0); ctx.lineTo(-s,-s*0.7); ctx.lineTo(-s,s*0.7); ctx.closePath();
  ctx.fill(); ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1; ctx.stroke(); ctx.restore();

  if (e.hp<e.maxHp) {
    const bw=16; ctx.fillStyle='#333'; ctx.fillRect(e.x-bw/2,e.y-s-8,bw,3);
    ctx.fillStyle='#f44'; ctx.fillRect(e.x-bw/2,e.y-s-8,bw*(e.hp/e.maxHp),3);
  }
}

function rc(t) { return {food:'#ffcc44',wood:'#aa8844',stone:'#aaaaaa',iron:'#cc8866'}[t]||'#fff'; }

function lerpColor(c1,c2,t) {
  const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
  const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
  return `rgb(${Math.round(lerp(r1,r2,t))},${Math.round(lerp(g1,g2,t))},${Math.round(lerp(b1,b2,t))})`;
}

function drawClock() {
  const cx = CFG.CANVAS_W - 55, cy = 55, r = 38;
  const cycleLen = CFG.DAY_DURATION + CFG.NIGHT_DURATION + CFG.TRANSITION*2;
  const hour24 = ((G.totalTime / cycleLen * 24) + 6) % 24;

  // Clock face background
  ctx.fillStyle = 'rgba(0,0,0,0.7)';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#888'; ctx.lineWidth = 2;
  ctx.stroke();

  // Night sector: 10 PM (330°) to 6 AM (90°) = 120°
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, r-3, -Math.PI/2 + (22/24)*Math.PI*2, -Math.PI/2 + (6/24)*Math.PI*2);
  ctx.closePath(); ctx.fill();

  // Day sector: 6 AM (90°) to 10 PM (330°) = 240° — grey
  ctx.fillStyle = '#999';
  ctx.beginPath(); ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, r-3, -Math.PI/2 + (6/24)*Math.PI*2, -Math.PI/2 + (22/24)*Math.PI*2);
  ctx.closePath(); ctx.fill();

  // Hour markers
  ctx.font = '9px sans-serif'; ctx.textAlign = 'center';
  for (let h=0; h<24; h+=3) {
    const a = -Math.PI/2 + (h/24)*Math.PI*2;
    const lx = cx + Math.cos(a)*(r-14), ly = cy + Math.sin(a)*(r-14);
    const label = h===0?'0':h===6?'6':h===12?'12':h===18?'18':String(h);
    const isNight = (h>=22||h<6); // 10pm-6am
    ctx.fillStyle = isNight ? '#fff' : '#000';
    ctx.fillText(label, lx, ly+3);
  }

  // Hour hand — pure white
  const ha = -Math.PI/2 + (hour24/24)*Math.PI*2;
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 2.5;
  ctx.beginPath(); ctx.moveTo(cx,cy);
  ctx.lineTo(cx+Math.cos(ha)*(r-18), cy+Math.sin(ha)*(r-18)); ctx.stroke();

  // Center dot — pure white
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(cx, cy, 2.5, 0, Math.PI*2); ctx.fill();
}
