function clearGuardPost(r, b) {
  if (!r.isGuard) return;
  if (r.assignedTower === b) r.assignedTower = null;
  if (r.manningTower === b) r.manningTower = null;
  r.state = (G.phase==='night'||G.phase==='dusk') ? 'GUARD_FIGHTING' : 'GUARD_SLEEPING';
  r.hidden = !(G.phase==='night'||G.phase==='dusk');
}

function demolishBuilding(b) {
  if (b.type==='town_hall') return; // 大本营不可拆除
  const idx = G.buildings.indexOf(b);
  if (idx===-1) return;
  b.outputHauler = null;
  invalidateNavigation();
  for (const r of G.residents) {
    if (r.workplace===b) { r.workplace=null; r.chopTarget=null; r.state=r.carrying?'HAULING':'IDLE'; }
    if (r.home===b) { assignHome(r, findNearestHome(r, r.isGuard, b)); }
    if (r.assignedTower===b || r.manningTower===b) clearGuardPost(r,b);
    if (r.buildTarget===b) { r.buildTarget=null; r.state=r.carrying?'HAULING':'IDLE'; }
  }
  if (b.type==='house') G.maxPop = Math.max(CFG.MAX_POP_BASE, G.maxPop - BLD_DEFS[b.type].popBonus - (b.level-1)*2);
  if (b.type==='barracks') G.maxGuards = Math.max(CFG.MAX_GUARD_BASE, G.maxGuards - BLD_DEFS[b.type].guardBonus - (b.level-1)*2);
  G.buildings.splice(idx,1);
  if (b.assignedGuard) b.assignedGuard = null;
  if (b.type==='forester') {
    for (const node of G.resourceNodes) if (node.ownerForester===b) { node.ownerForester=null; node.marked=false; }
  }
  if (isStorage(b.type)) updateAllResourceTotals();
  if (b.type==='farm') refreshFarmAdjacency();
  refreshFogVisibility();
}
function scaledResourceCost(cost, ratio, round=Math.ceil) {
  const result={};
  for(const [type,amount] of Object.entries(cost||{})) {
    const scaled=round(amount*ratio);
    if(scaled>0) result[type]=scaled;
  }
  return result;
}
function ruinRebuildCost(b) { return scaledResourceCost(b.ruinCost||BLD_DEFS[b.type].cost,0.7,Math.ceil); }
function ruinSalvage(b) { return scaledResourceCost(b.ruinCost||BLD_DEFS[b.type].cost,0.2,Math.floor); }
function clearBuildingAssignments(b) {
  b.outputHauler=null; b.upgrading=false; b.upgradeProgress=0; b.assignedEngineer=null;
  for (const r of G.residents) {
    if (r.workplace===b) { r.workplace=null; r.chopTarget=null; r.state=r.carrying?'HAULING':'IDLE'; }
    if (r.home===b) assignHome(r,findNearestHome(r,r.isGuard,b));
    if (r.assignedTower===b || r.manningTower===b) clearGuardPost(r,b);
    if (r.buildTarget===b) { r.buildTarget=null; r.state=r.carrying?'HAULING':'IDLE'; }
  }
  if (b.type==='forester') for (const node of G.resourceNodes) if (node.ownerForester===b) { node.ownerForester=null; node.marked=false; }
}
function turnBuildingIntoRuin(b) {
  if (b.ruin||b.type==='town_hall') return;
  b.ruin=true; b.ruinCost=cloneResourceMap(BLD_DEFS[b.type].cost);
  b.hp=0; b.blueprint=false; b.constructCost=null; b.constructDelivered=null; b.constructionTimer=0;
  b.stored={}; b.pendingOutput=0;
  clearBuildingAssignments(b);
  recalculatePopulationLimits();
  invalidateNavigation(); refreshFarmAdjacency(); updateAllResourceTotals(); refreshFogVisibility();
}
function findNearestRepairTarget(resident) {
  let best=null, bestDistance=Infinity;
  for(const b of G.buildings) {
    if(b.ruin||b.blueprint||b.constructionTimer>0||b.hp<=0||b.hp>=b.maxHp||b.assignedEngineer) continue;
    const distance=Math.hypot(resident.x-b.center().x,resident.y-b.center().y);
    if(distance<bestDistance) { best=b; bestDistance=distance; }
  }
  return best;
}
function addRuinSalvage(b) {
  for(const [type,amount] of Object.entries(ruinSalvage(b))) {
    let remaining=amount;
    const stores=G.buildings.filter(store=>isStorage(store.type)&&!store.ruin&&store.hp>0&&!store.blueprint&&store.constructionTimer<=0)
      .sort((a,c)=>Math.hypot(a.center().x-b.center().x,a.center().y-b.center().y)-Math.hypot(c.center().x-b.center().x,c.center().y-b.center().y));
    for(const store of stores) {
      remaining-=depositToStorage(store,type,remaining);
      if(remaining<=0) break;
    }
  }
}

// ============================================================
// UPDATE
// ============================================================
function gameDayDuration() { return CFG.DAY_DURATION+CFG.NIGHT_DURATION+CFG.TRANSITION*2; }
function scheduledMealOffset(hour) { return ((hour-6+24)%24)/24*gameDayDuration(); }
function triggerScheduledMeals(startTime,endTime) {
  const cycle=gameDayDuration();
  const startCycle=Math.floor(startTime/cycle), endCycle=Math.floor(endTime/cycle);
  const offsets=[scheduledMealOffset(CFG.MEAL_TIME_LUNCH),scheduledMealOffset(CFG.MEAL_TIME_DINNER)];
  for(let cycleIndex=startCycle;cycleIndex<=endCycle;cycleIndex++) {
    for(const offset of offsets) {
      const mealTime=cycleIndex*cycle+offset;
      if(mealTime>startTime&&mealTime<=endTime) {
        for(const r of G.residents) if(!r.isGuard&&!r.hidden) r.mealPending=true;
      }
    }
  }
}
function updateDayNight(dt) {
  const phaseDuration = G.phase==='day' ? CFG.DAY_DURATION :
    G.phase==='night' ? CFG.NIGHT_DURATION : CFG.TRANSITION;
  G.dayTime += dt;
  const previousTime=G.totalTime;
  G.totalTime += dt;
  triggerScheduledMeals(previousTime,G.totalTime);
  if (G.dayTime >= phaseDuration) {
    G.dayTime = 0;
    if (G.phase==='day') {
      G.phase='dusk'; showTimeIndicator('黄昏');
      // 让居民回家睡觉
      for (const r of G.residents) {
        if (r.isGuard) continue; // guards handle their own sleep
        if (r.carrying) { r.state = 'HAULING'; continue; }
        r.tired = CFG.TIRED_THRESHOLD;
        const home = r.home || findNearestHome(r, r.isGuard);
        if (home) {
          r.state = 'GOING_HOME';
          const hc = home.center();
          r.targetX = hc.x; r.targetY = hc.y;
          if (!r.home) assignHome(r, home);
        }
      }
      // Guards: wake up for night duty (unless already active)
      for (const r of G.residents) {
        if (r.isGuard) {
          r.state = 'GUARD_FIND_TOWER'; r.hidden = false;
          r.guardHealTimer = 0;
        }
      }
    } else if (G.phase==='dusk') {
      G.phase='night'; showTimeIndicator('夜晚');
      // Guards that were still sleeping (e.g. newly assigned): wake up
      for (const r of G.residents) {
        if (r.isGuard && r.state === 'GUARD_SLEEPING') {
          r.state = 'GUARD_FIND_TOWER'; r.hidden = false;
        }
      }
      spawnEnemyWave();
    } else if (G.phase==='night') {
      G.phase='dawn'; showTimeIndicator('黎明');
      G.enemies=[]; G.projectiles=[]; G.enemySpawnQueue=[];
    } else if (G.phase==='dawn') {
      G.phase='day'; G.day++; showTimeIndicator('第 '+G.day+' 天');
      for (const r of G.residents) {
        if (r.isGuard) {
          // Guards: go sleep for the day, heal fully
          r.controlMode='auto'; r.manualTarget=null; r.manualTargetEnemy=null;
          r.state = 'GUARD_SLEEPING'; r.hidden = true;
          r.guardHP = r.guardMaxHP;
          r.manningTower = null;
        } else {
          r.state=r.carrying?'HAULING':'IDLE'; r.tired=0; r.hidden=false;
        }
      }
    }
  }
}

function spawnEnemyWave() {
  refreshFogVisibility();
  const candidates=collectFogSpawnCandidates();
  G.enemySpawnTimer = 0;
  G.enemySpawnQueue = [];
  if (!candidates.length) return;
  const count = CFG.ENEMY_WAVE_BASE_COUNT + G.day * CFG.ENEMY_WAVE_PER_DAY;
  const waves=clamp(1+Math.floor((G.day-1)/CFG.ENEMY_WAVE_DAY_STEP),1,CFG.ENEMY_WAVE_MAX);
  let remaining=count;
  for(let wave=0;wave<waves;wave++) {
    const waveCount=Math.ceil(remaining/(waves-wave));
    remaining-=waveCount;
    const waveStart=1+wave*(CFG.ENEMY_WAVE_DURATION+CFG.ENEMY_WAVE_INTERVAL);
    const reserved=[];
    for(let i=0;i<waveCount;i++) {
      const slot=(i+0.5+(Math.random()-0.5)*CFG.ENEMY_SPAWN_JITTER)/waveCount;
      const point=pickFogSpawnCandidate(candidates,reserved);
      if (!point) continue;
      reserved.push(point);
      G.enemySpawnQueue.push({delay:waveStart+clamp(slot,0,1)*CFG.ENEMY_WAVE_DURATION,x:point.x,y:point.y,wave,type:pickEnemyType(G.day)});
    }
  }
}

function pickEnemyType(day) {
  const eligible=Object.entries(ENEMY_DEFS).filter(([type, def])=>type==='normal'||day>=def.unlockDay);
  const total=eligible.reduce((sum,[,def])=>sum+Math.max(0,def.spawnWeight||0),0);
  if (total<=0) return 'normal';
  let roll=Math.random()*total;
  for (const [type, def] of eligible) {
    roll-=Math.max(0,def.spawnWeight||0);
    if (roll<=0) return type;
  }
  return eligible[eligible.length-1][0];
}

function collectFogSpawnCandidates() {
  const candidates=[];
  const minDepth=CFG.ENEMY_SPAWN_FOG_DEPTH;
  const maxDepth=minDepth+1;
  const radius=Math.ceil(maxDepth);
  for(let col=0;col<CFG.WORLD_COLS;col++) for(let row=0;row<CFG.WORLD_ROWS;row++) {
    if (isFogCellVisible(col,row)) continue;
    let nearest=Infinity;
    for(let dc=-radius;dc<=radius;dc++) for(let dr=-radius;dr<=radius;dr++) {
      const distance=Math.hypot(dc,dr);
      if (distance>=nearest||distance>maxDepth) continue;
      if (isFogCellVisible(col+dc,row+dr)) nearest=distance;
    }
    if (nearest>=minDepth&&nearest<=maxDepth) {
      candidates.push({x:gridX(col)+CFG.CELL/2+(Math.random()-0.5)*CFG.CELL*0.45,y:gridY(row)+CFG.CELL/2+(Math.random()-0.5)*CFG.CELL*0.45});
    }
  }
  return candidates;
}

function pickFogSpawnCandidate(candidates,reserved) {
  if (!candidates.length) return null;
  for(let attempt=0;attempt<16;attempt++) {
    const point=candidates[Math.floor(Math.random()*candidates.length)];
    if (reserved.every(other=>Math.hypot(point.x-other.x,point.y-other.y)>=CFG.CELL*1.5)) return point;
  }
  return candidates[Math.floor(Math.random()*candidates.length)];
}

function spawnEnemy(entry) {
  if (!entry || isWorldVisible(entry.x,entry.y)) return false;
  G.enemies.push(new Enemy(entry.x,entry.y,entry.type));
  return true;
}

function enemyRouteBlocker(e) {
  const dx=e.targetX-e.x, dy=e.targetY-e.y;
  const routeLength=Math.hypot(dx,dy);
  if (routeLength<0.01) return null;
  let best=null, bestAlong=Infinity, bestDistance=Infinity;
  let preferred=null, preferredAlong=Infinity, preferredDistance=Infinity;
  for (const b of G.buildings) {
    if (!buildingBlocksMovement(b)) continue;
    const c=b.center();
    const along=((c.x-e.x)*dx+(c.y-e.y)*dy)/routeLength;
    if (along < -0.01 || along > routeLength+0.01) continue;
    const side=Math.abs((c.x-e.x)*dy-(c.y-e.y)*dx)/routeLength;
    const reach=b.collisionRadius()+CFG.ENEMY_ATTACK_RANGE+5;
    if (side>reach) continue;
    const distance=Math.hypot(c.x-e.x,c.y-e.y);
    if (along<bestAlong-0.01 || (Math.abs(along-bestAlong)<0.01 && distance<bestDistance)) {
      best=b; bestAlong=along; bestDistance=distance;
    }
    if (e.type==='breaker' && BLD_DEFS[b.type].cat==='defense' &&
        (along<preferredAlong-0.01 || (Math.abs(along-preferredAlong)<0.01 && distance<preferredDistance))) {
      preferred=b; preferredAlong=along; preferredDistance=distance;
    }
  }
  return preferred || best;
}

function enemyCanAttackBuilding(e,b) {
  if (!b || b.hp<=0) return false;
  const c=b.center();
  return Math.hypot(e.x-c.x,e.y-c.y) <= b.collisionRadius()+e.attackRange+5;
}

function enemyAggroGuard(e, guard) {
  if (!e || !e.alive || !guard || !guard.isGuard || guard.guardHP<=0 || guard.hidden) return;
  e.guardTarget=guard;
  e.attacking=null;
}

function enemyCanChaseGuard(e, guard) {
  if (!guard || !guard.isGuard || guard.guardHP<=0 || guard.hidden) return false;
  if (guard.state==='GUARD_RETURNING' || guard.state==='GUARD_HEALING' || guard.state==='GUARD_SLEEPING') return false;
  return Math.hypot(e.x-guard.x,e.y-guard.y)<=CFG.ENEMY_GUARD_LEASH;
}

function updateEnemyGuardCombat(e, dt) {
  const guard=e.guardTarget || e.fightingGuard;
  if (!enemyCanChaseGuard(e,guard)) {
    e.guardTarget=null; e.fightingGuard=null;
    return false;
  }
  e.attacking=null;
  const distance=Math.hypot(e.x-guard.x,e.y-guard.y);
  if (distance>e.attackRange+4) {
    e.fightingGuard=null;
    moveViaFlow(e,guard.x,guard.y,e.speed,dt);
    return true;
  }
  e.fightingGuard=guard;
  e.attackTimer += dt;
  if (e.attackTimer >= 0.5) {
    e.attackTimer = 0;
    guard.guardHP -= e.damage;
    spawnParticles(e.x, e.y, '#ff4444', 2);
    if (guard.guardHP <= 0) {
      guard.guardHP=0;
      guard.controlMode='auto'; guard.manualTarget=null; guard.manualTargetEnemy=null;
      guard.state='GUARD_RETURNING'; guard.manningTower=null;
      e.guardTarget=null; e.fightingGuard=null;
    }
  }
  return true;
}

function updateEnemies(dt) {
  G.enemySpawnTimer += dt;
  for (let i=G.enemySpawnQueue.length-1; i>=0; i--) {
    if (G.enemySpawnQueue[i].delay <= G.enemySpawnTimer) {
      if (spawnEnemy(G.enemySpawnQueue[i])) G.enemySpawnQueue.splice(i,1);
    }
  }
  for (const e of G.enemies) {
    if (!e.alive) continue;
    if (updateEnemyGuardCombat(e,dt)) continue;
    // Building attack
    if (e.attacking && e.attacking.hp>0) {
      e.attackTimer += dt;
      if (e.attackTimer >= 0.5) {
        e.attackTimer = 0;
        e.attacking.hp -= buildingDamageTaken(e.attacking, e.damage);
        spawnParticles(e.x,e.y,'#ff4444',3);
        if (e.attacking.hp <= 0) { e.attacking.hp = 0; e.attacking = null; }
      }
    } else {
      e.attacking = null;
      // Attack the first building that physically blocks the route
      // to the town hall. This makes walls and front-line buildings reliable.
      const blocker=enemyRouteBlocker(e);
      if (enemyCanAttackBuilding(e, blocker)) {
        e.attacking=blocker; e.attackTimer=0;
      } else {
        moveViaFlow(e,e.targetX,e.targetY,e.speed,dt);
      }
    }
  }
  G.enemies = G.enemies.filter(e=>e.alive && e.hp>0);

  // Homeless residents at night can be attacked (exclude guards)
  if (G.phase==='night') {
    for (const e of G.enemies) {
      if (!e.alive || e.attacking || e.fightingGuard || e.guardTarget) continue;
      for (const r of G.residents) {
        if (r.isGuard) continue;
        if (r.state==='SLEEPING') continue;
        if (r.home) continue;
        const d = Math.hypot(e.x-r.x, e.y-r.y);
        if (d < 20) {
          removeResident(r);
          spawnParticles(r.x, r.y, '#ff0000', 8);
          break;
        }
      }
    }
  }
}

function getGuardPatrol() {
  let cx = 0, cy = 0, n = 0;
  for (const b of G.buildings) {
    if (b.hp <= 0 || b.blueprint) continue;
    const c = b.center();
    cx += c.x; cy += c.y; n++;
  }
  if (n === 0) { const th = G.townHall; if (!th) return { x:3000, y:3000, r:500 }; const tc = th.center(); return { x: tc.x, y: tc.y, r: 200 }; }
  cx /= n; cy /= n;
  let maxR = 0;
  for (const b of G.buildings) {
    if (b.hp <= 0 || b.blueprint) continue;
    const c = b.center();
    const d = Math.hypot(c.x - cx, c.y - cy) + b.collisionRadius();
    if (d > maxR) maxR = d;
  }
  return { x: cx, y: cy, r: maxR + 100 };
}

function isPatrolPointClear(x,y) {
  const padding=RESIDENT_RADIUS+2;
  for(const b of G.buildings) {
    const width=b.size[0]*CFG.CELL,height=b.size[1]*CFG.CELL;
    if(x>=b.x-padding&&x<=b.x+width+padding&&y>=b.y-padding&&y<=b.y+height+padding) return false;
  }
  return true;
}

function choosePatrolTarget(r,boundary=null) {
  for(let attempt=0;attempt<24;attempt++) {
    const angle=Math.random()*Math.PI*2,distance=45+Math.random()*85;
    let x=r.x+Math.cos(angle)*distance,y=r.y+Math.sin(angle)*distance;
    if(boundary) {
      const dx=x-boundary.x,dy=y-boundary.y,fromCenter=Math.hypot(dx,dy);
      const limit=Math.max(10,boundary.r-RESIDENT_RADIUS-4);
      if(fromCenter>limit){x=boundary.x+dx/fromCenter*limit;y=boundary.y+dy/fromCenter*limit;}
    }
    x=clamp(x,RESIDENT_RADIUS,CFG.WORLD_W-RESIDENT_RADIUS);
    y=clamp(y,RESIDENT_RADIUS,CFG.WORLD_H-RESIDENT_RADIUS);
    if(isStaticPatrolVisible(x,y)&&isPatrolPointClear(x,y)) return {x,y};
  }
  return null;
}

function releaseGuardTower(r) {
  const tower=r.manningTower || r.assignedTower;
  if (tower && tower.assignedGuard===r) tower.assignedGuard=null;
  r.manningTower=null;
  r.assignedTower=null;
}

function setGuardControlMode(r, mode) {
  if (!r || !r.isGuard || r.guardHP<=0 || r.hidden) return false;
  clearNavigation(r);r.patrolTarget=null;r.formationCommandId=0;
  if (mode==='manual') {
    releaseGuardTower(r);
    r.controlMode='manual'; r.manualTarget=null; r.manualTargetEnemy=null;
    r.targetX=r.x;r.targetY=r.y;r.navDebugTarget={x:r.x,y:r.y};r.navDebugTick=G.tick;
    r.state='GUARD_MANUAL';
  } else {
    r.controlMode='auto'; r.manualTarget=null; r.manualTargetEnemy=null;
    r.targetX=r.x;r.targetY=r.y;r.navDebugTarget={x:r.x,y:r.y};r.navDebugTick=G.tick;
    r.state=(G.phase==='night'||G.phase==='dusk') ? 'GUARD_FIGHTING' : 'GUARD_SLEEPING';
    r.hidden=G.phase!=='night'&&G.phase!=='dusk';
  }
  return true;
}

function guardAttackEnemy(r, enemy, dt) {
  r.guardAttackCD -= dt;
  if (r.guardAttackCD > 0) return;
  r.guardAttackCD=CFG.GUARD_ATTACK_COOLDOWN;
  enemy.hp-=CFG.GUARD_DAMAGE;
  enemyAggroGuard(enemy,r);
  spawnParticles(enemy.x,enemy.y,'#ffaa00',2);
  if (enemy.hp<=0) {
    enemy.alive=false;
    spawnParticles(enemy.x,enemy.y,'#ff6600',5);
  }
}

function finishManualGuardCommand(r,point={x:r.x,y:r.y}) {
  r.manualTarget=null;r.manualTargetEnemy=null;
  r.targetX=point.x;r.targetY=point.y;
  r.navDebugTarget={x:point.x,y:point.y};r.navDebugTick=G.tick;
  clearNavigation(r);
}

function updateManualGuard(r, dt) {
  let target=r.manualTargetEnemy;
  if (target && (!target.alive || target.hp<=0 || !isWorldVisible(target.x,target.y))) {
    finishManualGuardCommand(r);target=null;
  }
  if (target) {
    const distance=Math.hypot(target.x-r.x,target.y-r.y);
    if (distance<=20) guardAttackEnemy(r,target,dt);
    else moveViaFlow(r,target.x,target.y,CFG.GUARD_SPEED,dt);
    return;
  }
  if (!r.manualTarget) return;
  if(r.navBlockedGoal&&r.navResolvedPoint&&Math.hypot(r.navResolvedPoint.x-r.x,r.navResolvedPoint.y-r.y)<=4) {
    finishManualGuardCommand(r,r.navResolvedPoint);return;
  }
  const distance=Math.hypot(r.manualTarget.x-r.x,r.manualTarget.y-r.y);
  if (distance<=3) { finishManualGuardCommand(r,r.manualTarget);return; }
  moveViaFlow(r,r.manualTarget.x,r.manualTarget.y,CFG.GUARD_SPEED,dt);
}

function guardFormationAssignments(guards,target) {
  if(!guards.length) return [];
  const center=guards.reduce((sum,guard)=>({x:sum.x+guard.x,y:sum.y+guard.y}),{x:0,y:0});
  center.x/=guards.length; center.y/=guards.length;
  const dx=target.x-center.x,dy=target.y-center.y,length=Math.hypot(dx,dy)||1;
  const forward={x:dx/length,y:dy/length}, right={x:-forward.y,y:forward.x};
  const columns=Math.ceil(Math.sqrt(guards.length)), rows=Math.ceil(guards.length/columns), spacing=RESIDENT_RADIUS*3;
  const slots=[];
  for(let index=0;index<guards.length;index++) {
    const col=index%columns,row=Math.floor(index/columns);
    const lateral=(col-(columns-1)/2)*spacing,depth=(row-(rows-1)/2)*spacing;
    slots.push({
      x:clamp(target.x+right.x*lateral+forward.x*depth,RESIDENT_RADIUS,CFG.WORLD_W-RESIDENT_RADIUS),
      y:clamp(target.y+right.y*lateral+forward.y*depth,RESIDENT_RADIUS,CFG.WORLD_H-RESIDENT_RADIUS),
      lateral,depth
    });
  }
  const orderedGuards=guards.map((guard,index)=>({
    guard,index,
    depth:(guard.x-center.x)*forward.x+(guard.y-center.y)*forward.y,
    lateral:(guard.x-center.x)*right.x+(guard.y-center.y)*right.y
  })).sort((a,b)=>a.depth-b.depth||a.lateral-b.lateral||a.index-b.index);
  const orderedSlots=[...slots].sort((a,b)=>a.depth-b.depth||a.lateral-b.lateral);
  return orderedGuards.map((entry,index)=>({guard:entry.guard,target:orderedSlots[index]}));
}
function guardMovementClusters(guards,maxSize=25,joinDistance=320) {
  const remaining=new Set(guards),clusters=[];
  while(remaining.size) {
    const seed=remaining.values().next().value,cluster=[seed];
    remaining.delete(seed);
    while(cluster.length<maxSize&&remaining.size) {
      const center=cluster.reduce((sum,guard)=>({x:sum.x+guard.x/cluster.length,y:sum.y+guard.y/cluster.length}),{x:0,y:0});
      let nearest=null,nearestDistance=Infinity;
      for(const guard of remaining) {
        const distance=Math.hypot(guard.x-center.x,guard.y-center.y);
        if(distance<nearestDistance){nearestDistance=distance;nearest=guard;}
      }
      if(!nearest||nearestDistance>joinDistance) break;
      cluster.push(nearest);remaining.delete(nearest);
    }
    clusters.push(cluster);
  }
  return clusters;
}
function assignGuardGroupMove(guards,target) {
  const assignments=guardFormationAssignments(guards,target);
  if(!assignments.length) return assignments;
  const commandId=++G.guardMoveCommandSequence;
  const assignmentByGuard=new Map(assignments.map(assignment=>[assignment.guard,assignment]));
  const grid=ensureNavigationGrid();
  for(const cluster of guardMovementClusters(guards)) {
    const center=cluster.reduce((sum,guard)=>({x:sum.x+guard.x/cluster.length,y:sum.y+guard.y/cluster.length}),{x:0,y:0});
    const clusterTarget=cluster.reduce((sum,guard)=>{
      const slot=assignmentByGuard.get(guard).target;
      return {x:sum.x+slot.x/cluster.length,y:sum.y+slot.y/cluster.length};
    },{x:0,y:0});
    const leader={x:center.x,y:center.y,workplace:null,home:null,buildTarget:null};
    const blocker=firstBlockingObstacle(leader,clusterTarget.x,clusterTarget.y);
    const sharedPlan=blocker?findNavigationPath(center.x,center.y,clusterTarget.x,clusterTarget.y):null;
    for(const guard of cluster) {
      const slot=assignmentByGuard.get(guard).target;
      clearNavigation(guard);
      guard.manualTargetEnemy=null; guard.manualTarget=slot;
      guard.formationCommandId=commandId;
      guard.targetX=slot.x;guard.targetY=slot.y;guard.navDebugTarget={x:slot.x,y:slot.y};guard.navDebugTick=G.tick;
      guard.navTargetX=slot.x;guard.navTargetY=slot.y;guard.navRevision=G.navigationRevision;
      let route=[];
      if(sharedPlan&&sharedPlan.points.length&&navigationLineClear(guard,sharedPlan.points[0],grid)) route=sharedPlan.points.map(point=>({x:point.x,y:point.y}));
      const routeEnd=route.length?route[route.length-1]:guard;
      if(navigationLineClear(routeEnd,slot,grid)) route.push({x:slot.x,y:slot.y});
      if(route.length) {
        guard.navPath=route;guard.navPathIndex=0;
        guard.navResolvedPoint=route[route.length-1];
        guard.navBlockedGoal=!navigationLineClear(guard.navResolvedPoint,slot,grid);
      }
    }
  }
  return assignments;
}

function guardUpdateAI(r, dt) {
  const th = G.townHall; if (!th) return;
  if (r.controlMode==='manual') { updateManualGuard(r,dt); return; }
  const thCenter = th.center();
  const cycleLen = CFG.DAY_DURATION + CFG.NIGHT_DURATION + CFG.TRANSITION * 2;
  const twoGameHours = cycleLen * 2 / 24;

  switch (r.state) {
    case 'GUARD_FIND_TOWER': {
      const tower = r.assignedTower;
      if (tower && tower.hp > 0 && !tower.blueprint && BLD_DEFS[tower.type].needsManning) {
        if (tower.assignedGuard && tower.assignedGuard !== r) {
          r.assignedTower = null; r.state = 'GUARD_FIGHTING'; break;
        }
        const tc = tower.guardSpot();
        r.targetX = tc.x; r.targetY = tc.y;
        const dx = tc.x - r.x, dy = tc.y - r.y, dd = Math.hypot(dx, dy) || 1;
        if (Math.hypot(r.x - tc.x, r.y - tc.y) < tower.collisionRadius() + RESIDENT_RADIUS + 5) {
          r.state = 'GUARD_MANNING'; r.manningTower = tower; tower.assignedGuard = r;
        } else {
          moveViaFlow(r, tc.x, tc.y, CFG.GUARD_SPEED, dt);
        }
      } else {
        r.assignedTower = null;
        r.state = 'GUARD_FIGHTING';
      }
      break;
    }
    case 'GUARD_MANNING': {
      if (!r.manningTower || r.manningTower.hp <= 0 || r.manningTower.blueprint || r.assignedTower !== r.manningTower) {
        if (r.manningTower && r.manningTower.assignedGuard === r) r.manningTower.assignedGuard = null;
        r.manningTower = null; r.state = r.assignedTower ? 'GUARD_FIND_TOWER' : 'GUARD_FIGHTING'; break;
      }
      // Stand at tower center
      const tc = r.manningTower.guardSpot();
      const dx = tc.x - r.x, dy = tc.y - r.y, dd = Math.hypot(dx, dy) || 1;
      if (Math.hypot(r.x - tc.x, r.y - tc.y) > 3) {
        const nx = r.x + (dx / dd) * CFG.RESIDENT_SPEED * 0.5 * dt;
        const ny = r.y + (dy / dd) * CFG.RESIDENT_SPEED * 0.5 * dt;
        r.x = nx; r.y = ny;
      }
      break;
    }
    case 'GUARD_FIGHTING': {
      // Seek nearest enemy within vision range (450px)
      let targetEnemy = null, bestD = 450;
      for (const e of G.enemies) {
        if (!e.alive) continue;
        const d = Math.hypot(r.x - e.x, r.y - e.y);
        if (d < bestD) { bestD = d; targetEnemy = e; }
      }
      // If no enemy in vision, prioritize enemies attacking buildings
      if (!targetEnemy) {
        for (const e of G.enemies) {
          if (!e.alive) continue;
          if (e.attacking && e.attacking.hp > 0) {
            targetEnemy = e; break;
          }
        }
      }
      if (targetEnemy) {
        const dx = targetEnemy.x - r.x, dy = targetEnemy.y - r.y, dd = Math.hypot(dx, dy) || 1;
        if (dd < 20) {
          guardAttackEnemy(r,targetEnemy,dt);
        } else {
          // Move toward enemy
          moveViaFlow(r, targetEnemy.x, targetEnemy.y, CFG.GUARD_SPEED, dt);
        }
      } else {
        // Patrol within building boundary
        const pb = getGuardPatrol();
        r.patrolTimer-=dt;
        const targetInvalid=!r.patrolTarget||Math.hypot(r.x-r.patrolTarget.x,r.y-r.patrolTarget.y)<6||
          Math.hypot(r.patrolTarget.x-pb.x,r.patrolTarget.y-pb.y)>pb.r||!isStaticPatrolVisible(r.patrolTarget.x,r.patrolTarget.y);
        if(r.patrolTimer<=0||targetInvalid) {
          r.patrolTarget=choosePatrolTarget(r,pb);
          r.patrolTimer=2+Math.random()*3;
        }
        if(r.patrolTarget) {
          r.targetX=r.patrolTarget.x;r.targetY=r.patrolTarget.y;
          moveViaFlow(r,r.targetX,r.targetY,CFG.GUARD_SPEED,dt);
        }
      }
      break;
    }
    case 'GUARD_RETURNING': {
      // Return to town hall
      const dx = thCenter.x - r.x, dy = thCenter.y - r.y, dd = Math.hypot(dx, dy) || 1;
      if (Math.hypot(r.x - thCenter.x, r.y - thCenter.y) < th.collisionRadius() + RESIDENT_RADIUS + 3) {
        r.state = 'GUARD_HEALING'; r.guardHealTimer = twoGameHours; r.hidden = true;
      } else {
        moveViaFlow(r, thCenter.x, thCenter.y, CFG.GUARD_SPEED, dt);
      }
      break;
    }
    case 'GUARD_HEALING': {
      r.guardHealTimer = Math.max(0, r.guardHealTimer - dt);
      if (r.guardHealTimer <= 0) {
        r.guardHP = r.guardMaxHP;
        r.hidden = false;
        // Go back to fighting or find a tower
        if (r.assignedTower && r.assignedTower.hp > 0 && !r.assignedTower.blueprint) { r.state = 'GUARD_FIND_TOWER'; }
        else { r.assignedTower = null; r.state = 'GUARD_FIGHTING'; }
      }
      break;
    }
  }
}

function updateTowers(dt) {
  for (const b of G.buildings) {
    const def = buildingRuntimeDef(b);
    if (!def.range || b.hp <= 0) continue;
    // Arrow tower: needs manning by a guard
    if (def.needsManning) {
      const guard=b.assignedGuard;
      const manned = guard && guard.manningTower === b && guard.state === 'GUARD_MANNING';
      if (!manned) continue;
    }
    b.attackCooldown -= dt;
    if (b.attackCooldown > 0) continue;
    const center = b.center();
    const range = towerRange(b);
    const damage = towerDamage(b);
    let closest = null, closestD = Infinity;
    for (const e of G.enemies) {
      if (!e.alive || !isWorldVisible(e.x,e.y)) continue;
      const d = dist(center, e);
      if (d < range && d < closestD) { closestD = d; closest = e; }
    }
    if (closest) {
      fireArrow(center,closest,damage);
      b.attackCooldown = def.cooldown;
    }
  }
}

function updateResidents(dt) {
  rebuildResidentSpatialHash();
  G.targetedTrees = new Set(G.residents.map(r=>r.chopTarget).filter(Boolean));
  for (const r of G.residents) {
    if (r.isGuard) continue;
    if (r.state!=='SLEEPING') {
      r.tired += CFG.TIRED_RATE * dt;
      if (G.phase==='night') r.tired += CFG.TIRED_RATE*2*dt;
    }
  }

  for (const r of G.residents) {
    if (r.state==='SLEEPING') {
      if (G.phase==='day'||G.phase==='dawn') { r.state='IDLE'; r.tired=0; }
      continue;
    }
    if (r.state==='GUARD_SLEEPING') {
      if (G.phase==='day'||G.phase==='dawn') { r.guardHP = r.guardMaxHP; }
      continue;
    }

    // === Guard AI ===
    if (r.isGuard) {
      guardUpdateAI(r, dt);
      continue;
    }

    // Priority 1: scheduled meal
    if (r.mealPending && r.state!=='GOING_TO_EAT' && r.state!=='EATING') {
      if (r.finishBeforeEating) {
        if (!isFinishableResidentTask(r)) eatAfterFinishingTask(r);
      } else if (isFinishableResidentTask(r)) {
        r.finishBeforeEating=true;
      } else {
        beginEating(r);
      }
    }

    // Priority 2: Tired
    if (r.tired >= CFG.TIRED_THRESHOLD && r.state!=='GOING_HOME' && r.state!=='SLEEPING'
        && r.state!=='GOING_TO_EAT' && r.state!=='EATING' && !r.finishBeforeEating) {
      const home = r.home || findNearestHome(r, r.isGuard);
      if (home) {
        r.state = 'GOING_HOME';
        const hc = home.center();
        r.targetX = hc.x; r.targetY = hc.y;
        assignHome(r, home);
      }
    }

    // Execute state
    switch (r.state) {
      case 'GOING_TO_EAT': {
        // Recalculate target each frame
        const storage = findNearestStorage(r, 'food', {requireAmount:1});
        if (!storage) { r.state='EATING'; r.eatTimer=0.5; break; }
        const sc=storage.center(); r.targetX=sc.x; r.targetY=sc.y;
        if (Math.hypot(r.x-sc.x, r.y-sc.y) < storage.collisionRadius() + RESIDENT_RADIUS + 2) { r.state='EATING'; r.eatTimer=1.5; }
        else { moveViaFlow(r, r.targetX, r.targetY, CFG.RESIDENT_SPEED, dt); }
        break;
      }
      case 'EATING':
        if ((r.eatTimer-=dt)<=0) {
          const storage = findNearestStorage(r, 'food', {requireAmount:1});
          if (storage && withdrawFromStorage(storage, 'food', 1) === 1) r.mealPending=false;
          r.state = (G.phase==='night'||G.phase==='dusk') ? 'IDLE'
            : r.carrying?'HAULING' : r.workplace?'GOING_TO_WORK':'IDLE';
        }
        break;
      case 'GOING_HOME': {
        const home = r.home || findNearestHome(r, r.isGuard);
        if (home) { const hc=home.center(); r.targetX=hc.x; r.targetY=hc.y; }
        const dx=r.targetX-r.x, dy=r.targetY-r.y, dd=Math.hypot(dx,dy)||1;
        if (home && Math.hypot(r.x-home.center().x, r.y-home.center().y) < home.collisionRadius() + RESIDENT_RADIUS + 2) { r.state='SLEEPING'; r.tired=0; r.hidden=true; }
        else { moveViaFlow(r, r.targetX, r.targetY, CFG.RESIDENT_SPEED, dt); }
        break;
      }
      case 'GOING_TO_WORK': {
        if (!r.workplace||r.workplace.hp<=0) { r.state='IDLE'; r.workplace=null; break; }
        const wc=r.workplace.center();
        const dx=wc.x-r.x, dy=wc.y-r.y, dd=Math.hypot(dx,dy)||1;
        r.targetX=wc.x; r.targetY=wc.y;
        if (Math.hypot(r.x-wc.x, r.y-wc.y) < workplaceWorkRange(r.workplace)) { r.state='WORKING'; r.prodTimer=0; }
        else { moveViaFlow(r, wc.x, wc.y, CFG.RESIDENT_SPEED, dt); }
        break;
      }
      case 'WORKING': {
        if (!r.workplace||r.workplace.hp<=0) { r.state='IDLE'; r.workplace=null; break; }
        const b=r.workplace, def=BLD_DEFS[b.type];
        if (b.type==='forester') {
          if (r.carrying && r.carrying.amount >= productionBufferCapacity(b)) { r.state='HAULING'; break; }
          const tree=findForesterTree(r,b);
          if (tree) {
            r.chopTarget=tree; r.targetX=tree.x; r.targetY=tree.y; r.state='GOING_TO_CHOP';
            G.targetedTrees.add(tree);
          }
          else if (r.carrying) r.state='HAULING';
          break;
        }
        if (r.carrying) { r.state='HAULING'; break; }
        const batchCapacity=productionBufferCapacity(b);
        if (b.pendingOutput >= batchCapacity && !b.outputHauler) {
          const batch = batchCapacity;
          const storage = findNearestStorage(r, def.produces, {requireSpace:batch});
          if (!storage) break;
          b.pendingOutput -= batch;
          b.outputHauler = r;
          r.state = 'HAULING';
          r.carrying = { type:def.produces, amount:batch };
          r.carryingFrom = b;
          const sc=storage.center(); r.targetX=sc.x; r.targetY=sc.y;
        }
        break;
      }
      case 'HAULING': {
        if (!r.carrying) { r.carryingFrom=null; r.state='IDLE'; break; }
        const storage = findNearestStorage(r, r.carrying.type, {requireSpace:r.carrying.amount});
        if (!storage) break;
        const sc=storage.center(); r.targetX=sc.x; r.targetY=sc.y;
        if (Math.hypot(r.x-sc.x, r.y-sc.y) < storage.collisionRadius() + RESIDENT_RADIUS + 2) {
          const deposited = depositToStorage(storage, r.carrying.type, r.carrying.amount);
          r.carrying.amount -= deposited;
          if (r.carrying.amount > 0) break;
          const source = r.carryingFrom;
          if (source && source.outputHauler === r) source.outputHauler = null;
          r.carrying=null;
          r.carryingFrom=null;
          if (!eatAfterFinishingTask(r)) {
            r.state = (G.phase==='night'||G.phase==='dusk') ? 'IDLE'
              : r.workplace&&r.workplace.hp>0?'GOING_TO_WORK':'IDLE';
          }
        } else { moveViaFlow(r, r.targetX, r.targetY, CFG.RESIDENT_SPEED, dt); }
        break;
      }
      case 'GOING_TO_CHOP': {
        if (!r.chopTarget || !r.chopTarget.alive || !r.chopTarget.marked) { r.chopTarget = null; r.state = 'IDLE'; break; }
        const ctx = r.chopTarget.x, cty = r.chopTarget.y;
        if (Math.hypot(r.x - ctx, r.y - cty) < RESIDENT_RADIUS + 10) { r.state = 'CHOPPING'; r.chopTimer = 0; r.chopShakeBeat = -1; }
        else moveViaFlow(r, ctx, cty, CFG.RESIDENT_SPEED, dt);
        break;
      }
      case 'CHOPPING': {
        if (!r.chopTarget || !r.chopTarget.alive || !r.chopTarget.marked) { r.chopTarget = null; r.state = 'IDLE'; break; }
        r.chopTimer += dt;
        const shakeBeat=Math.floor(r.chopTimer/0.55);
        if (shakeBeat !== r.chopShakeBeat) {
          r.chopShakeBeat=shakeBeat;
          r.chopTarget.shakeUntil=G.totalTime+0.12;
        }
        const forester=r.workplace&&r.workplace.type==='forester' ? r.workplace : {type:'forester',level:1};
        const chopTime=buildingRuntimeDef(forester).chopTime/productionSpeedMultiplier(forester);
        if (r.chopTimer >= chopTime) {
          const carried = r.carrying ? r.carrying.amount : 0;
          const carryCapacity=productionBufferCapacity(r.workplace||{level:1});
          const s2 = findNearestStorage(r, 'wood', {requireSpace:Math.max(1, carryCapacity - carried)});
          if (!s2) {
            r.chopTarget=null; r.chopTimer=0;
            r.state=r.workplace?'GOING_TO_WORK':'IDLE';
            break;
          }
          r.chopTarget.alive = false; r.chopTarget.marked = false;
          G.treesChopped++;
          G.buildingPanelDirty=true;
          spawnParticles(r.chopTarget.x, r.chopTarget.y, '#8B4513', 5);
          if (!r.carrying) r.carrying = { type: 'wood', amount: 1 };
          else r.carrying.amount++;
          r.chopTarget = null;
          const nextTree = findForesterTree(r, r.workplace);
          r.state = !r.finishBeforeEating && nextTree && r.carrying.amount < carryCapacity ? 'WORKING' : 'HAULING';
          if (r.state === 'HAULING') { const sc = s2.center(); r.targetX = sc.x; r.targetY = sc.y; }
        }
        break;
      }
      case 'GATHERING': {
        if (!r.buildTarget || r.buildTarget.hp <= 0) { if(r.buildTarget)r.buildTarget.assignedEngineer=null; r.buildTarget=null; r.state='IDLE'; break; }
        const need = neededMaterials(r.buildTarget);
        if (!need) { if(r.buildTarget.constructionTimer>0){r.state='CONSTRUCTING';}else{r.buildTarget.assignedEngineer=null;r.buildTarget=null;if(!eatAfterFinishingTask(r))r.state=(r.workplace&&r.workplace.hp>0)?'GOING_TO_WORK':'IDLE';} break; }
        const gs = findNearestStorage(r, need.type, {requireAmount:1});
        if (!gs) { r.buildTarget.assignedEngineer=null; r.buildTarget=null; r.state='PATROL'; break; }
        const gsc = gs.center(); r.targetX = gsc.x; r.targetY = gsc.y;
        if (Math.hypot(r.x-gsc.x, r.y-gsc.y) < gs.collisionRadius() + RESIDENT_RADIUS + 3) {
          const take = Math.min(5, need.amount, storedAmount(gs, need.type));
          if (take <= 0) break;
          if (!r.carrying) r.carrying = { type: need.type, amount: 0 };
          r.carrying.type = need.type; r.carrying.amount = take;
          withdrawFromStorage(gs, need.type, take);
          r.state = 'BUILDING'; break;
        }
        moveViaFlow(r, r.targetX, r.targetY, CFG.RESIDENT_SPEED, dt);
        break;
      }
      case 'BUILDING': {
        if (!r.buildTarget || r.buildTarget.hp <= 0) { if(r.buildTarget)r.buildTarget.assignedEngineer=null; r.buildTarget=null; r.state=r.carrying?'HAULING':'IDLE'; break; }
        const bc = r.buildTarget.center(); r.targetX = bc.x; r.targetY = bc.y;
        if (Math.hypot(r.x-bc.x, r.y-bc.y) < r.buildTarget.collisionRadius() + RESIDENT_RADIUS + 3) {
          if (r.carrying && r.carrying.amount > 0) {
            const t = r.carrying.type;
            r.buildTarget.constructDelivered[t] = (r.buildTarget.constructDelivered[t]||0) + r.carrying.amount;
            r.carrying = null;
            let done = true;
            for (const [k, v] of Object.entries(r.buildTarget.constructCost)) {
              if ((r.buildTarget.constructDelivered[k]||0) < v) { done = false; break; }
            }
            if (done) {
              r.buildTarget.blueprint = false;
              r.buildTarget.constructCost = null; r.buildTarget.constructDelivered = null;
              r.buildTarget.constructionTimer = BLD_DEFS[r.buildTarget.type].buildTime || 2;
              r.state = 'CONSTRUCTING';
              break;
            }
          }
          r.state = 'GATHERING'; break;
        }
        moveViaFlow(r, r.targetX, r.targetY, CFG.RESIDENT_SPEED, dt);
        break;
      }
      case 'CONSTRUCTING': {
        if (!r.buildTarget || r.buildTarget.hp <= 0 || r.buildTarget.constructionTimer <= 0) {
          if (r.buildTarget && r.buildTarget.hp>0) r.buildTarget.assignedEngineer = null;
          r.buildTarget = null;
          if (eatAfterFinishingTask(r)) break;
          const nbp = findNearestBlueprint(r);
          if (nbp) { r.buildTarget = nbp; nbp.assignedEngineer = r; r.state = 'GATHERING'; }
          else { r.state = 'IDLE'; }
          break;
        }
        const cc = r.buildTarget.center();
        if (Math.hypot(r.x-cc.x, r.y-cc.y) < r.buildTarget.collisionRadius() + RESIDENT_RADIUS + 5) {
          // Stay near building while timer counts down
        } else {
          moveViaFlow(r, cc.x, cc.y, CFG.RESIDENT_SPEED, dt);
        }
        break;
      }
      case 'GOING_TO_REPAIR': {
        const target=r.buildTarget;
        if(G.phase!=='day'||!target||target.ruin||target.hp<=0||target.hp>=target.maxHp) {
          if(target) target.assignedEngineer=null;
          r.buildTarget=null; r.state='IDLE'; break;
        }
        const center=target.center(); r.targetX=center.x; r.targetY=center.y;
        if(Math.hypot(r.x-center.x,r.y-center.y)<target.collisionRadius()+RESIDENT_RADIUS+4) r.state='REPAIRING';
        else moveViaFlow(r,center.x,center.y,CFG.RESIDENT_SPEED,dt);
        break;
      }
      case 'REPAIRING': {
        const target=r.buildTarget;
        if(G.phase!=='day'||!target||target.ruin||target.hp<=0||target.hp>=target.maxHp) {
          if(target) target.assignedEngineer=null;
          r.buildTarget=null; r.state='IDLE'; break;
        }
        target.hp=Math.min(target.maxHp,target.hp+CFG.ENGINEER_REPAIR_RATE*dt);
        break;
      }
      default: { // IDLE / PATROL
        if (G.phase==='night' || G.phase==='dusk') {
          const home = r.home || findNearestHome(r, r.isGuard);
          if (home) { r.state='GOING_HOME'; r.targetX=home.center().x; r.targetY=home.center().y; }
          else r.state='SLEEPING';
          break;
        }
        if (r.workplace && r.workplace.hp>0) { r.state='GOING_TO_WORK'; break; }
        if (r.isEngineer) {
          if (r.buildTarget && r.buildTarget.hp>0 && r.buildTarget.constructionTimer>0) { r.state='CONSTRUCTING'; break; }
          const constructionTarget=findNearestConstruction(r);
          if (constructionTarget) { r.buildTarget=constructionTarget; constructionTarget.assignedEngineer=r; r.state='CONSTRUCTING'; break; }
          const repairTarget=findNearestRepairTarget(r);
          if(repairTarget) { r.buildTarget=repairTarget; repairTarget.assignedEngineer=r; r.state='GOING_TO_REPAIR'; break; }
          const ebp = findNearestBlueprint(r);
          if (ebp) { r.buildTarget = ebp; ebp.assignedEngineer = r; r.state = 'GATHERING'; break; }
        }
        // Only idle non-engineers chop trees
        if (!r.isEngineer && findNearestStorage(r,'wood',{requireSpace:1})) {
          let treeTarget = null, treeDist = Infinity;
          for (const node of G.resourceNodes) {
            if (canResidentHandHarvest(node) && node.marked && !node.ownerForester) {
              // Skip trees already targeted by another villager
              if (G.targetedTrees.has(node)) continue;
              const d = Math.hypot(r.x - node.x, r.y - node.y);
              if (d < treeDist) { treeDist = d; treeTarget = node; }
            }
          }
          if (treeTarget) {
            r.state = 'GOING_TO_CHOP'; r.targetX = treeTarget.x; r.targetY = treeTarget.y; r.chopTarget = treeTarget;
            G.targetedTrees.add(treeTarget); break;
          }
        }
        r.state='PATROL';r.patrolTimer-=dt;
        const targetInvalid=!r.patrolTarget||Math.hypot(r.x-r.patrolTarget.x,r.y-r.patrolTarget.y)<5||!isStaticPatrolVisible(r.patrolTarget.x,r.patrolTarget.y);
        if(r.patrolTimer<=0||targetInvalid) {
          r.patrolTarget=choosePatrolTarget(r);
          r.patrolTimer=2+Math.random()*4;
        }
        if(r.patrolTarget) {
          r.targetX=r.patrolTarget.x;r.targetY=r.patrolTarget.y;
          moveViaFlow(r,r.targetX,r.targetY,30,dt);
        }
        break;
      }
    }
  }

  // Population growth is manual via town hall recruitment
}

function updateBuildings(dt) {
  const activeWorkersByBuilding = new Map();
  const growingSaplingCount = new Map();
  for (const r of G.residents) {
    if (r.isGuard || r.state!=='WORKING' || !r.workplace) continue;
    if (!activeWorkersByBuilding.has(r.workplace)) activeWorkersByBuilding.set(r.workplace, []);
    activeWorkersByBuilding.get(r.workplace).push(r);
  }
  for (const node of G.resourceNodes) {
    if (!node.alive || node.type!=='sapling' || !node.ownerForester) continue;
    growingSaplingCount.set(node.ownerForester, (growingSaplingCount.get(node.ownerForester)||0)+1);
  }
  for (const b of G.buildings) {
    if (b.constructionTimer > 0) {
      const hasEng = G.residents.some(r => r.buildTarget === b && (r.state==='CONSTRUCTING'||r.state==='GATHERING'||r.state==='BUILDING'));
      if (hasEng) {
        b.constructionTimer -= dt;
        if (b.constructionTimer <= 0) {
          b.constructionTimer = 0; b.hp = b.maxHp; b.assignedEngineer = null;
          if (b.type==='house') G.maxPop += houseCapacity(b);
          if (b.type==='barracks') G.maxGuards += guardCapacity(b);
          if (b.type==='farm') refreshFarmAdjacency();
          if (isStorage(b.type)) updateAllResourceTotals();
        }
      }
    }
    if (b.upgrading) {
      b.upgradeProgress += dt/(buildingRuntimeDef(b).buildTime||15);
      if (b.upgradeProgress>=1) {
        b.upgradeProgress=0; b.upgrading=false;
        const oldPop=houseCapacity(b), oldGuard=guardCapacity(b);
        b.level++;
        b.maxHp=Math.floor(buildingLevelValue(b.type,b.level,'hp'));
        b.hp=b.maxHp;
        if (b.type==='house'||b.type==='town_hall') G.maxPop += houseCapacity(b)-oldPop;
        if (b.type==='barracks'||b.type==='town_hall') G.maxGuards += guardCapacity(b)-oldGuard;
        if (b.type==='town_hall') { updateBuildingPanel(); refreshFogVisibility(); }
        if (isStorage(b.type)) updateAllResourceTotals();
      }
    }
    // Recruitment belongs to its dedicated building, not the town hall.
    const recruitDef=buildingRuntimeDef(b);
    if (recruitDef.recruits && b.recruitQueue > 0 && !b.blueprint && b.constructionTimer<=0 && b.hp>0) {
      b.recruitProgress += dt / recruitDef.recruitTime;
      if (b.recruitProgress >= 1) {
        b.recruitProgress = 0; b.recruitQueue--;
        const isGuard=recruitDef.recruits==='guard';
        if (residentCount(isGuard) < (isGuard ? G.maxGuards : G.maxPop)) {
          const hc = b.center();
          const nr = new Resident(hc.x+(Math.random()-0.5)*40, hc.y+(Math.random()-0.5)*40);
          if (isGuard) {
            nr.isGuard = true;
            nr.state = (G.phase==='night'||G.phase==='dusk') ? 'GUARD_FIND_TOWER' : 'GUARD_SLEEPING';
            nr.hidden = (G.phase!=='night'&&G.phase!=='dusk');
          }
          assignHome(nr, findNearestHome(nr, nr.isGuard));
          G.residents.push(nr);
        }
      }
    }
    // Production advances once per building, based on workers currently on site.
    const def = buildingRuntimeDef(b);
    if (def.cat === 'production' && b.type !== 'forester' && !b.blueprint && b.constructionTimer <= 0 && b.hp > 0) {
      const activeWorkers = activeWorkersByBuilding.get(b) || [];
      const efficiency = def.maxWorkers > 0 ? Math.min(1, activeWorkers.length / def.maxWorkers) : 0;
      if (efficiency > 0 && b.pendingOutput < productionBufferCapacity(b)) {
        const adjacency = b.type === 'farm' ? getFarmAdjacencyBonus(b) : 1;
        b.productionProgress += dt / def.baseTime * efficiency * adjacency * productionSpeedMultiplier(b);
        if (b.productionProgress >= 1) {
          const sourceNode = def.sourceType ? findResourceNode(b, def.sourceType) : null;
          const hasSource = !def.sourceType || !!sourceNode;
          const hasInputs = !def.inputs || canAfford(def.inputs);
          if (hasSource && hasInputs) {
            if (def.inputs) payCost(def.inputs);
            b.productionProgress -= 1;
            b.pendingOutput++;
          } else {
            b.productionProgress = 1;
          }
        }
      }
    }
    // Forester: automatically refill empty cells with staggered saplings.
    if (b.type==='forester' && !b.blueprint && b.constructionTimer<=0 && b.hp>0) {
      const def=buildingRuntimeDef(b), growthSlots=foresterGrowthSlots(b);
      if ((growingSaplingCount.get(b)||0) < growthSlots) {
        b.foresterPlantCooldown-=dt;
        if (b.foresterPlantCooldown<=0) {
          const cell=findForesterPlantCell(b);
          if (cell) {
            const growDuration=def.saplingGrowTime*(1+(Math.random()*2-1)*def.growJitter);
            G.resourceNodes.push({type:'sapling',col:cell.col,row:cell.row,x:cell.x,y:cell.y,hp:1,alive:true,marked:false,growTimer:growDuration,growDuration,ownerForester:b});
            growingSaplingCount.set(b,(growingSaplingCount.get(b)||0)+1);
            b.foresterPlantCooldown=foresterPlantInterval(b);
          } else {
            b.foresterPlantCooldown=1;
          }
        }
      }
    }
  }
  // Grow saplings
  updateWildTreeRegrowth(dt);
  for (const node of G.resourceNodes) {
    if (node.type==='sapling' && node.alive) {
      node.growTimer -= dt;
      if (node.growTimer <= 0) {
        node.type = 'tree'; node.marked = !!node.ownerForester;
      }
    }
  }
  G.resourceCleanupTimer += dt;
  if (G.resourceCleanupTimer >= 5) {
    G.resourceCleanupTimer = 0;
    G.resourceNodes = G.resourceNodes.filter(node => node.alive);
  }
  for(const b of G.buildings) {
    if(b.hp>0||b.ruin) continue;
    if(b.type==='town_hall') { gameOver('大本营被摧毁！'); continue; }
    turnBuildingIntoRuin(b);
  }
}

function updateParticles(dt) {
  for (const p of G.particles) { p.life-=dt; p.x+=p.vx*dt; p.y+=p.vy*dt; }

}

function fireArrow(source,target,damage) {
  G.projectiles.push(new ArrowProjectile(source,target,damage));
}

function updateProjectiles(dt) {
  for(const arrow of G.projectiles) {
    const target=arrow.target;
    arrow.life+=dt;
    if (!target || !target.alive || !isWorldVisible(target.x,target.y) || arrow.life>=arrow.maxLife) { arrow.alive=false; continue; }
    const dx=target.x-arrow.x, dy=target.y-arrow.y;
    const distance=Math.hypot(dx,dy);
    const step=arrow.speed*dt;
    if (distance<=step+target.size*0.45) {
      arrow.x=target.x; arrow.y=target.y;
      target.hp-=arrow.damage;
      spawnParticles(target.x,target.y,'#ffaa00',2);
      if (target.hp<=0) { target.alive=false; spawnParticles(target.x,target.y,'#ff6600',6); }
      arrow.alive=false;
      continue;
    }
    arrow.angle=Math.atan2(dy,dx);
    arrow.x+=Math.cos(arrow.angle)*step;
    arrow.y+=Math.sin(arrow.angle)*step;
  }
  G.projectiles=G.projectiles.filter(arrow=>arrow.alive);
}

  th.level = maxBuildingLevel('town_hall'); th.maxHp = Math.floor(buildingLevelValue('town_hall',th.level,'hp')); th.hp = th.maxHp;

function upgradeTH() {
  const th = G.townHall; if (!th) return;
  const oldPop=houseCapacity(th), oldGuard=guardCapacity(th);
  th.level=Math.min(th.level+1,maxBuildingLevel('town_hall')); th.maxHp=Math.floor(buildingLevelValue('town_hall',th.level,'hp')); th.hp=th.maxHp;

}

    button.style.cssText='background:#2d3a32;color:#e5c66c;border:1px solid #536158;padding:6px 8px;cursor:pointer;font:inherit;';
    button.onclick=()=>beginShortcutCapture(action.id);
    row.append(label,button); container.appendChild(row);
  }
}
function openSettingsPanel() {
  pendingShortcutAction=null;
  document.getElementById('settings-overlay').style.display='flex';
  setCameraDragThreshold(gameSettings.cameraDragThreshold);
  renderShortcutSettings();
  settingsSetStatus('修改会自动保存。');
}
function closeSettingsPanel() {
  pendingShortcutAction=null;
  document.getElementById('settings-overlay').style.display='none';
}
function beginShortcutCapture(actionId) {
  pendingShortcutAction=actionId;
  renderShortcutSettings();
  settingsSetStatus('按下新的按键，按 Esc 取消录制。');
}
function assignShortcut(actionId, code) {
  const conflict=Object.keys(gameSettings.shortcuts).find(id => id!==actionId && gameSettings.shortcuts[id]===code);
  if (conflict) gameSettings.shortcuts[conflict]=DEFAULT_SHORTCUTS[conflict];
  gameSettings.shortcuts[actionId]=code;
  saveGameSettings();
  pendingShortcutAction=null;
  renderShortcutSettings();
  const conflictText=conflict ? '；原快捷键已恢复默认。' : '。';
  settingsSetStatus('已保存“'+SHORTCUT_ACTIONS.find(a=>a.id===actionId).label+'”快捷键'+conflictText,'ok');
}
function resetShortcuts() {
  gameSettings.shortcuts={...DEFAULT_SHORTCUTS};
  saveGameSettings();
  pendingShortcutAction=null;
  renderShortcutSettings();
  settingsSetStatus('已恢复默认快捷键并自动保存。','ok');
}
function closeAllOverlays() {

}
function cancelCurrentAction() {

  clearChopCommand();

function runShortcut(actionId) {
  if (actionId==='pause') togglePause();
  else if (actionId==='speedNormal') setSpeed(1);
  else if (actionId==='speed2') setSpeed(2);
  else if (actionId==='speed4') setSpeed(4);
  else if (actionId==='cancel') cancelCurrentAction();
  else if (actionId==='chop') toggleChopMode();
  else if (actionId==='unchop') toggleUnchopMode();
  else if (actionId==='settings') openSettingsPanel();
  else if (actionId==='config') openConfigPanel();
}

function syncCfgBuildingLevelOptions(type) {
  const select=document.getElementById('cfg-building-level');
  const def=BLD_DEFS[type];
  if (!def) { select.style.display='none'; return 1; }
  const previous=Number(select.value)||1;
  select.innerHTML='';
  for(let level=1;level<=def.maxLevel;level++) {
    const option=document.createElement('option'); option.value=level; option.textContent='等级 '+level;
    if(level===Math.min(previous,def.maxLevel)) option.selected=true;
    select.appendChild(option);
  }
  select.style.display='block';
  return Number(select.value)||1;
}

    const opt=document.createElement('option'); opt.value='nightRaids'; opt.textContent='夜袭波次'; sel.appendChild(opt);

function cfgApply() {
  const cat=document.getElementById('cfg-category').value;
  const key=document.getElementById('cfg-item').value;
  if(cat==='unlocks') {
    for(const [type,def] of Object.entries(BLD_DEFS)) {
      if(type==='town_hall') continue;
      const level=Number(document.getElementById('cfg-unlock-'+type)?.value);
      if(!Number.isInteger(level)||level<1) { cfgSetStatus(def.name+'的解锁等级无效','error'); return false; }
      def.unlock=level;
    }
    updateBuildingPanel();
    cfgSetStatus('大本营解锁规则已应用到当前游戏。','ok');
    return true;
  } else if(cat==='globals') {
    for(const f of GLOBAL_EDIT_FIELDS) {
      const value=Number(document.getElementById('cfg-global-'+f.k)?.value);
      if(!Number.isFinite(value)||value<f.min||(f.max!==undefined&&value>f.max)) { cfgSetStatus(f.label+'不是有效数值','error'); return false; }
      CFG[f.k]=value;
    }
    if(CFG.MEAL_TIME_LUNCH===CFG.MEAL_TIME_DINNER) { cfgSetStatus('两次用餐时间不能相同','error'); return false; }
    cfgSetStatus('全局数值已应用；标记“重开生效”的项目需要重新开始。','ok');
    return true;
  } else if(cat==='professions') {
    const fields=PROFESSION_EDIT_FIELDS[key]||[];
    for(const f of fields) {
      const value=Number(document.getElementById('cfg-profession-'+f.k)?.value);
      if(!Number.isFinite(value)||value<f.min||(f.max!==undefined&&value>f.max)) { cfgSetStatus(f.label+'不是有效数值','error'); return false; }
      CFG[f.k]=value;
    }
    if(key==='guard') {
      for(const r of G.residents) if(r.isGuard) {
        r.guardMaxHP=CFG.GUARD_MAX_HP;
        r.guardHP=Math.min(r.guardHP,r.guardMaxHP);
      }
      refreshFogVisibility();
    }
    cfgSetStatus((key==='guard'?'守卫':'工程师')+'参数已应用到当前游戏。','ok');
    return true;
  } else if(cat==='enemySpawns') {
    for(const f of ENEMY_SPAWN_EDIT_FIELDS) {
      const value=Number(document.getElementById('cfg-spawn-'+f.k)?.value);
      if(!Number.isFinite(value)||value<f.min||(f.max!==undefined&&value>f.max)) { cfgSetStatus(f.label+'不是有效数值','error'); return false; }
      CFG[f.k]=value;
    }
    cfgSetStatus('敌人生成配置已应用，将在下一次进入夜晚时生效。','ok');
    return true;
  } else if(cat==='enemies'&&ENEMY_DEFS[key]) {
    const d=ENEMY_DEFS[key];
    for(const f of ENEMY_EDIT_FIELDS) {
      const el=document.getElementById('cfg-enemy-'+f.k);
      if (!el) continue;
      const value=f.type==='text'?el.value.trim():Number(el.value);
      if (f.type==='num' && (!Number.isFinite(value)||value<f.min)) { cfgSetStatus(f.label+'不是有效数值','error'); return false; }
      d[f.k]=value;
    }
    cfgSetStatus(d.name+'已应用；下一次夜晚的新敌人会使用该数值。','ok');
    return true;
  } else if(cat==='worldResources') {
    for(const f of WORLD_RESOURCE_EDIT_FIELDS) {
      const value=Number(document.getElementById('cfg-world-'+f.k)?.value);
      if(!Number.isFinite(value)||value<f.min||(f.max!==undefined&&value>f.max)) { cfgSetStatus(f.label+'不是有效数值','error'); return false; }
      CFG[f.k]=value;
    }
    if (CFG.TREE_CLUSTER_AVERAGE>CFG.TREE_CLUSTER_MAX||CFG.STONE_CLUSTER_AVERAGE>CFG.STONE_CLUSTER_MAX||CFG.IRON_CLUSTER_AVERAGE>CFG.IRON_CLUSTER_MAX) { cfgSetStatus('资源簇平均数量不能大于对应最大数量','error'); return false; }
    if (CFG.TREE_WILD_MIN_COUNT>CFG.TREE_WILD_MAX_COUNT) { cfgSetStatus('野生树木补充下限不能大于上限','error'); return false; }
    if (CFG.WILD_TREE_SPAWN_INTERVAL_MIN>CFG.WILD_TREE_SPAWN_INTERVAL_MAX||CFG.WILD_TREE_GROW_TIME_MIN>CFG.WILD_TREE_GROW_TIME_MAX) { cfgSetStatus('野生树木的随机时间下限不能大于上限','error'); return false; }
    if (CFG.START_VISIBLE_TREE_MIN>CFG.TREE_INITIAL_COUNT) { cfgSetStatus('初始可见树木下限不能大于初始树木总数','error'); return false; }
    if (CFG.START_VISIBLE_TREE_MIN>0&&CFG.TREE_MIN_SPAWN_RADIUS>=buildingLevelValue('town_hall',1,'vision')) { cfgSetStatus('树木最小半径必须小于大本营视野，才能保证初始可见树木','error'); return false; }
    cfgSetStatus('初始地图资源配置已应用，重新开始游戏后生成新分布。','ok');
    return true;
  } else if(cat==='buildings'&&BLD_DEFS[key]) {
    const d=BLD_DEFS[key];
    const level=Number(document.getElementById('cfg-building-level').value)||1;
    const fields=buildingEditFields(key,level).filter(field=>level===1||!['name','icon','maxLevel','cost'].includes(field.k));
    if(level>1) fields.push({k:'upgradeCost',label:'升至本级消耗',type:'resources'});
    const target=level===1 ? d : (d.levels||(d.levels={}))[level]||((d.levels||(d.levels={}))[level]={});
    for(const f of fields) {
      const el=document.getElementById('cfg-fld-'+f.k);
      if(!el) continue;
      const raw=el.value.trim();
      if(f.type==='num') {
        const value=Number(raw);
        if(!Number.isFinite(value)||value<f.min||(f.max!==undefined&&value>f.max)) { cfgSetStatus(f.label+'不是有效数值','error'); return false; }
        target[f.k]=value;
      } else if(f.type==='resources') {
        target[f.k]={};
        if(raw) {
          for(const p of raw.split(/[,;\s]+/)) {
            const [resource,amount]=p.split(':');
            const value=Number(amount);
            if(!resource||!Number.isFinite(value)||value<0) { cfgSetStatus(f.label+'格式无效','error'); return false; }
            target[f.k][resource.trim()]=value;
          }
        }
      } else { target[f.k]=raw; }
    }
    for(const b of G.buildings) {
      if(b.type!==key) continue;
      b.maxHp=Math.floor(buildingLevelValue(key,b.level,'hp'));
      b.hp=Math.min(b.hp,b.maxHp);
    }
    if(key==='town_hall'||key==='house'||key==='barracks') recalculatePopulationLimits();
    if(key==='town_hall') updateAllResourceTotals();
    const btn=document.querySelector(`.bld-btn[data-type="${key}"]`);
    if(btn&&d.cost) {
      const costDiv=btn.querySelector('.cost');
      if(costDiv) costDiv.innerHTML=formatResourceCost(d.cost);
    }
    if(key==='lamp'||key==='town_hall') refreshFogVisibility();
    updateBuildingPanel();
    showTimeIndicator(d.name+' 配置已应用');
    cfgSetStatus(key==='town_hall'&&level===1 ? '大本营配置已应用；初始资源将在重新开始游戏后使用。' : d.name+'已应用到当前游戏。','ok');
  } else if (cat==='initialResources') {
    const popVal=Number(document.getElementById('cfg-initial-POP')?.value);
    if(!Number.isFinite(popVal)||popVal<0) { cfgSetStatus('初始人口不是有效数值','error'); return false; }
    CFG.START_POP=Math.floor(popVal);
    const engineerVal=Number(document.getElementById('cfg-initial-ENGINEERS')?.value);
    if(!Number.isFinite(engineerVal)||engineerVal<0||engineerVal>CFG.START_POP) { cfgSetStatus('初始工程师必须介于 0 和初始人口之间','error'); return false; }
    CFG.START_ENGINEERS=Math.floor(engineerVal);
    const maxpopVal=Number(document.getElementById('cfg-initial-MAXPOP')?.value);
    if(!Number.isFinite(maxpopVal)||maxpopVal<1) { cfgSetStatus('人口上限基数不是有效数值','error'); return false; }
    CFG.MAX_POP_BASE=Math.floor(maxpopVal);
    const maxguardVal=Number(document.getElementById('cfg-initial-MAXGUARD')?.value);
    if(!Number.isFinite(maxguardVal)||maxguardVal<0) { cfgSetStatus('初始守卫上限不是有效数值','error'); return false; }
    CFG.MAX_GUARD_BASE=Math.floor(maxguardVal);
    cfgSetStatus('初始人口配置已更新，重新开始游戏后生效。','ok');
  }
  return true;
}
function collectBalanceData() {
  const globals={};
  for(const field of GLOBAL_EDIT_FIELDS) globals[field.k]=CFG[field.k];
  for(const fields of Object.values(PROFESSION_EDIT_FIELDS)) for(const field of fields) globals[field.k]=CFG[field.k];
  for(const field of ENEMY_SPAWN_EDIT_FIELDS) globals[field.k]=CFG[field.k];
  for(const field of WORLD_RESOURCE_EDIT_FIELDS) globals[field.k]=CFG[field.k];
  globals.START_POP=CFG.START_POP; globals.START_ENGINEERS=CFG.START_ENGINEERS; globals.MAX_POP_BASE=CFG.MAX_POP_BASE; globals.MAX_GUARD_BASE=CFG.MAX_GUARD_BASE;
  return {version:1, savedAt:new Date().toISOString(), globals, enemies:ENEMY_DEFS, buildings:BLD_DEFS};
}

function assignEngineer() {
  const idle = G.residents.find(r => (r.state === 'IDLE' || r.state === 'PATROL') && !r.workplace && !r.isEngineer);
  if (idle) {
    idle.isEngineer = true;
    const construction=findNearestConstruction(idle);
    if (construction) {
      idle.buildTarget=construction; construction.assignedEngineer=idle; idle.state='CONSTRUCTING';
    } else {
      const bp = findNearestBlueprint(idle);
      if (bp) {
        idle.buildTarget = bp; bp.assignedEngineer = idle; idle.state = 'GATHERING';
      }
    }
  }
}
function unassignEngineer() {
  const priority={IDLE:0,PATROL:0,GOING_HOME:1,SLEEPING:1,GOING_TO_REPAIR:2,REPAIRING:2,GATHERING:3,BUILDING:3,CONSTRUCTING:3};
  const eng=G.residents.filter(r=>r.isEngineer).sort((a,b)=>(priority[a.state]??2)-(priority[b.state]??2))[0];
  if (eng) {
    const target=eng.buildTarget;
    eng.isEngineer = false;
    if (target && target.assignedEngineer===eng) target.assignedEngineer = null;
    eng.buildTarget = null; eng.state = eng.carrying ? 'HAULING' : 'IDLE';
    // Keep an in-progress build staffed immediately when another idle engineer exists.
    if (target && target.constructionTimer>0 && target.hp>0 && !target.assignedEngineer) {
      const replacement=G.residents.find(r=>r.isEngineer && !r.buildTarget && (r.state==='IDLE'||r.state==='PATROL'));
      if (replacement) {
        replacement.buildTarget=target; target.assignedEngineer=replacement; replacement.state='CONSTRUCTING';
      }
    }
  }
}
function addPop(n) {
  if (n > 0) {
    for (let i=0; i<n; i++) {
      const th = G.townHall;
      const r = new Resident(th.x+40+(Math.random()-0.5)*60, th.y+40+(Math.random()-0.5)*60);
      assignHome(r, findNearestHome(r, r.isGuard)); G.residents.push(r);
    }
  } else {
    for (let i=0; i<-n; i++) {
      const r = [...G.residents].reverse().find(resident=>!resident.isGuard);
      if (!r) break;
      removeResident(r);
    }
  }
  G.popGrowthTimer = 0;
}
function addDebugGuard(n) {
  const th=G.townHall;
  if (!th) return;
  if (n>0) {
    for (let i=0;i<n;i++) {
      const r=new Resident(th.x+55+(Math.random()-0.5)*60,th.y+45+(Math.random()-0.5)*60);
      r.isGuard=true;
      r.state=(G.phase==='night'||G.phase==='dusk') ? 'GUARD_FIND_TOWER' : 'GUARD_SLEEPING';
      r.hidden=G.phase!=='night'&&G.phase!=='dusk';
      assignHome(r,findNearestHome(r,true));
      G.residents.push(r);
    }
  } else {
    for (let i=0;i<-n;i++) {
      const guard=[...G.residents].reverse().find(resident=>resident.isGuard);
      if (!guard) break;
      removeResident(guard);
    }
  }
}
